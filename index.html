n their opinion.\n\n*NOTE: Words like {{police, vermin, cattle, clergy, gentry, poultry, folk, peasantry, people, infantry, and cavalry}} are plural nouns, not collective nouns, and always take a plural verb.\n\nThe police are investigating the case.\nCattle are wandering in the farm.\nPeople want to attain all worldly pleasures.\n\n*NOTE: When \"people\" means \"a country/nation\" rather than \"persons,\" it can take a singular verb, and \"peoples\" (meaning multiple nations or ethnic groups) is then a valid plural.", "expl": "When a collective noun refers to the whole group acting together as one unit, we use a singular verb.\n\nWhen a collective noun refers to the group's members acting individually/differently, we use a plural verb.\n\n*NOTE: Words like {{police, vermin, cattle, clergy, gentry, poultry, folk, peasantry, people, infantry, and cavalry}} are plural nouns, not collective nouns, and always take a plural verb.\n\n*NOTE: When \"people\" means \"a country/nation\" rather than \"persons,\" it can take a singular verb, and \"peoples\" (meaning multiple nations or ethnic groups) is then a valid plural.", "ex": ["The audience is watching the movie. [The whole audience watches together]", "The army is marching towards the Himalayas.", "The jury is taking a decision. [All members decide together]", "The audience are taking their seats.", "The army are changing their dresses.", "The jury are divided in their opinion.", "The police are investigating the case.", "Cattle are wandering in the farm.", "People want to attain all worldly pleasures."]}, {"n": 31, "t": "Words always followed by the preposition \"to\"", "b": "Certain words are always followed by the preposition \"to\": {{injurious, junior, ancillary, superior, inferior, senior, prior, prefer, preferable, similar}}, and any word ending in \"-ior.\"\n\n*NOTE: Any word suffixed with \"-ior\" will always be followed by \"to.\"\n\nFor babies, breastfeeding is superior to bottle-feeding.\nToo much alcohol is injurious to your health.\nWould you prefer to pay by cash, cheque, or credit card?\nThey promoted a man who was junior to me and made him my boss.\nParagraph 19 was merely ancillary to paragraph 16.\nI prefer tea to coffee.\n\n*NOTE: \"Marry\" and \"known\" always take \"to\" in the passive voice.\n\nRama is married to Sita.\nI am known to him. [Correct]\nI am known by him. [Incorrect]", "expl": "Certain words are always followed by the preposition \"to\": {{injurious, junior, ancillary, superior, inferior, senior, prior, prefer, preferable, similar}}, and any word ending in \"-ior.\"\n\n*NOTE: Any word suffixed with \"-ior\" will always be followed by \"to.\"\n\n*NOTE: \"Marry\" and \"known\" always take \"to\" in the passive voice.", "ex": ["For babies, breastfeeding is superior to bottle-feeding.", "Too much alcohol is injurious to your health.", "Would you prefer to pay by cash, cheque, or credit card?", "They promoted a man who was junior to me and made him my boss.", "Paragraph 19 was merely ancillary to paragraph 16.", "I prefer tea to coffee.", "Rama is married to Sita.", "I am known to him. [Correct]", "I am known by him. [Incorrect]"]}, {"n": 32, "t": "\"as...as\" and \"so...as\"", "b": "Both blanks are filled with the positive degree of an adjective.\n\nIf we pass on the information, he's as good as dead.\nI'm not so desperate as to agree to that.\n\n*NOTE: \"As...as\" can be used to make both positive and negative statements, while \"so...as\" can only be used for negative statements.\n\nHe is as good as Ram. [Correct]\nHe is not as good as Ram. [Correct]\nHe is not so good as Ram. [Correct]\nHe is so good as Ram. [Incorrect]", "expl": "Both blanks are filled with the positive degree of an adjective.\n\n*NOTE: \"As...as\" can be used to make both positive and negative statements, while \"so...as\" can only be used for negative statements.", "ex": ["If we pass on the information, he's as good as dead.", "I'm not so desperate as to agree to that.", "He is as good as Ram. [Correct]", "He is not as good as Ram. [Correct]", "He is not so good as Ram. [Correct]", "He is so good as Ram. [Incorrect]"]}, {"n": 33, "t": "\"Times\" is never followed by a comparative degree", "b": "In a comparison, whenever the word \"times\" is used, it can never be followed by a comparative degree adjective (like \"larger,\" \"heavier\").\n\nThis book is three times larger than that book. [Incorrect]\nThis book is three times heavier than that book. [Incorrect]\nIt is a bit cheaper than that. [Correct — \"times\" is not used here]\nThis book is three times as large as that book. [Correct]\nIt is twice costlier than that. [Correct — \"times\" is not used]\nIt is two times as costly as that. [Correct]\n\nIn the first two examples, \"times\" and a comparative degree cannot be combined; they should instead follow the \"as...as\" pattern. Where \"times\" isn't used at all, a comparative degree is fine.", "expl": "In a comparison, whenever the word \"times\" is used, it can never be followed by a comparative degree adjective (like \"larger,\" \"heavier\").\n\nIn the first two examples, \"times\" and a comparative degree cannot be combined; they should instead follow the \"as...as\" pattern. Where \"times\" isn't used at all, a comparative degree is fine.", "ex": ["This book is three times larger than that book. [Incorrect]", "This book is three times heavier than that book. [Incorrect]", "It is a bit cheaper than that. [Correct — \"times\" is not used here]", "This book is three times as large as that book. [Correct]", "It is twice costlier than that. [Correct — \"times\" is not used]", "It is two times as costly as that. [Correct]"]}, {"n": 34, "t": "Common errors of narration (direct/indirect speech)", "b": "Indirect speech is always framed as a statement.\n\nStructure of a statement: Subject + Helping Verb + Main Verb + ...\nStructure of a question: Question word + Helping Verb + Subject + Main Verb + ...\n\nSo a helping verb comes after the subject in a statement, but before the subject in a question. When we convert a question into indirect speech, it must still follow statement word order.\n\nHe asked me where are you going. [Incorrect]\nHe asked me where I was going. [Correct]\nHe asked me what was my name. [Incorrect]\nHe asked me what my name was. [Correct]\n\nShe says that she is a little bit nervous. [Direct speech was Assertive]\nThe teacher ordered me to shut the door. [Direct speech was Imperative]\nHe exclaimed with great joy that he had won the match. [Direct speech was Exclamatory]\nWe asked him if he was ill. [Direct speech was Interrogative]\nHe prayed that I might live long. [Direct speech was Optative]\nShe wished she had been rich. [Direct speech was Optative]\n\nBut regardless of the type of direct speech, the indirect/reported version is always phrased as a statement.", "expl": "Indirect speech is always framed as a statement.\n\nStructure of a statement: Subject + Helping Verb + Main Verb + ...\nStructure of a question: Question word + Helping Verb + Subject + Main Verb + ...\n\nSo a helping verb comes after the subject in a statement, but before the subject in a question. When we convert a question into indirect speech, it must still follow statement word order.\n\nBut regardless of the type of direct speech, the indirect/reported version is always phrased as a statement.", "ex": ["He asked me where are you going. [Incorrect]", "He asked me where I was going. [Correct]", "He asked me what was my name. [Incorrect]", "He asked me what my name was. [Correct]", "She says that she is a little bit nervous. [Direct speech was Assertive]", "The teacher ordered me to shut the door. [Direct speech was Imperative]", "He exclaimed with great joy that he had won the match. [Direct speech was Exclamatory]", "We asked him if he was ill. [Direct speech was Interrogative]", "He prayed that I might live long. [Direct speech was Optative]", "She wished she had been rich. [Direct speech was Optative]"]}, {"n": 35, "t": "Verb agreement with 'or', 'nor', 'either/or', 'neither/nor'", "b": "If two subjects are connected by \"or,\" \"nor,\" \"neither/nor,\" \"either/or,\" or \"not only/but also,\" the verb agrees with the nearer subject.\n\nEither the bears or the lion has escaped from the zoo. [Nearest subject \"lion\" is singular]\nNeither the lion nor the bears have escaped from the zoo. [Nearest subject \"bears\" is plural]\nNot only the teachers but also the Principal is happy. [Nearest subject \"Principal\" is singular]\nNot only dogs but also cats are available at the animal shelter. [Nearest subject \"cats\" is plural]", "expl": "If two subjects are connected by \"or,\" \"nor,\" \"neither/nor,\" \"either/or,\" or \"not only/but also,\" the verb agrees with the nearer subject.", "ex": ["Either the bears or the lion has escaped from the zoo. [Nearest subject \"lion\" is singular]", "Neither the lion nor the bears have escaped from the zoo. [Nearest subject \"bears\" is plural]", "Not only the teachers but also the Principal is happy. [Nearest subject \"Principal\" is singular]", "Not only dogs but also cats are available at the animal shelter. [Nearest subject \"cats\" is plural]"]}, {"n": 36, "t": "Comparing two qualities of the same object", "b": "When two qualities of the same object are being compared, we always use \"more\" — not the comparative (\"-er\") form of the adjective.\n\nThis pen is redder than white. [Incorrect]\nThis book is heavier than larger. [Incorrect]\nThis shirt is more white than red. [Correct]\nThis umbrella is more beautiful than strong. [Correct]", "expl": "When two qualities of the same object are being compared, we always use \"more\" — not the comparative (\"-er\") form of the adjective.", "ex": ["This pen is redder than white. [Incorrect]", "This book is heavier than larger. [Incorrect]", "This shirt is more white than red. [Correct]", "This umbrella is more beautiful than strong. [Correct]"]}, {"n": 37, "t": "\"More than one\" and \"many a\"", "b": "\"More than one\" and \"many a\" are always followed by a singular noun and a singular verb.\n\n\"Many,\" \"a good many,\" and \"a great many\" are always followed by a plural noun and a plural verb.\n\nStructure:\nMore than one + singular noun + singular verb\nMany a + singular noun + singular verb\nA great many / a good many + plural noun + plural verb\n\nMore than one student is absent today. [Singular]\nMany a student is absent today. [Singular]\nA great many devotees are protesting to build Ram Mandir. [Plural]\nMany tigers are missing from the national park. [Plural]\n\n*NOTE: Compare also:\n\nOne student is absent today. [Singular]\nA great many students are absent today. [Plural]\nMany students are absent today. [Plural]", "expl": "\"More than one\" and \"many a\" are always followed by a singular noun and a singular verb.\n\n\"Many,\" \"a good many,\" and \"a great many\" are always followed by a plural noun and a plural verb.\n\n*NOTE: Compare also:", "ex": ["Structure:", "More than one + singular noun + singular verb", "Many a + singular noun + singular verb", "A great many / a good many + plural noun + plural verb", "More than one student is absent today. [Singular]", "Many a student is absent today. [Singular]", "A great many devotees are protesting to build Ram Mandir. [Plural]", "Many tigers are missing from the national park. [Plural]", "One student is absent today. [Singular]", "A great many students are absent today. [Plural]", "Many students are absent today. [Plural]"]}, {"n": 38, "t": "\"Doubt\"/\"doubtful\" vs. \"no doubt\"/\"not doubtful\"", "b": "When a sentence contains \"doubt\" or \"doubtful,\" we use the connector \"if\" or \"whether.\" When it contains \"no doubt\" or \"not doubtful,\" we use the connector \"that.\"\n\nI have no doubt whether it will rain or not. [Incorrect]\nI have no doubt that it will rain or not. [Correct]\nThere is a doubt that he goes there or not. [Incorrect]\nThere is a doubt whether he goes there or not. [Correct]\nHe has no doubt if Shyam is his best friend. [Incorrect]\nHe has no doubt that Shyam is his best friend. [Correct]", "expl": "When a sentence contains \"doubt\" or \"doubtful,\" we use the connector \"if\" or \"whether.\" When it contains \"no doubt\" or \"not doubtful,\" we use the connector \"that.\"", "ex": ["I have no doubt whether it will rain or not. [Incorrect]", "I have no doubt that it will rain or not. [Correct]", "There is a doubt that he goes there or not. [Incorrect]", "There is a doubt whether he goes there or not. [Correct]", "He has no doubt if Shyam is his best friend. [Incorrect]", "He has no doubt that Shyam is his best friend. [Correct]"]}, {"n": 39, "t": "Narration: sequence of tenses (unchanging cases)", "b": "The tense of the reported verb does not change, even if the reporting verb is in the past, for these cases:\n\n(1) Universal truths:\n\nHe told me that honey was sweet. [Incorrect]\nHe told me that honey is sweet. [Correct — universal truth stays in Simple Present]\nHe told me that the honey is sweet. [Incorrect]\nHe told me that the honey was sweet. [Correct — \"the honey\" refers to a particular batch, not a universal truth, so normal sequence of tenses applies]\n\n*NOTE: The sequence of tenses says that if the main clause is in the past tense, the subordinate clause should also be in the past — except for universal truths, historical facts, proverbs, and habitual facts.\n\n(2) Historical facts:\n\nThe teacher said, \"Kalidas is the Shakespeare of India.\" [Direct]\nThe teacher said that Kalidas is the Shakespeare of India. [Indirect — tense unchanged]\n\n(3) Proverbs:\n\nRohit said, \"Where there is a will there is a way.\" [Direct]\nRohit said that where there is a will there is a way. [Indirect]\n\n(4) Habitual facts:\n\nHe said, \"I snooze my alarm every day.\" [Direct]\nHe said that he snoozes his alarm every day. [Indirect]", "expl": "The tense of the reported verb does not change, even if the reporting verb is in the past, for these cases:\n\n(1) Universal truths:\n\n*NOTE: The sequence of tenses says that if the main clause is in the past tense, the subordinate clause should also be in the past — except for universal truths, historical facts, proverbs, and habitual facts.\n\n(2) Historical facts:\n\n(3) Proverbs:\n\n(4) Habitual facts:", "ex": ["He told me that honey was sweet. [Incorrect]", "He told me that honey is sweet. [Correct — universal truth stays in Simple Present]", "He told me that the honey is sweet. [Incorrect]", "He told me that the honey was sweet. [Correct — \"the honey\" refers to a particular batch, not a universal truth, so normal sequence of tenses applies]", "The teacher said, \"Kalidas is the Shakespeare of India.\" [Direct]", "The teacher said that Kalidas is the Shakespeare of India. [Indirect — tense unchanged]", "Rohit said, \"Where there is a will there is a way.\" [Direct]", "Rohit said that where there is a will there is a way. [Indirect]", "He said, \"I snooze my alarm every day.\" [Direct]", "He said that he snoozes his alarm every day. [Indirect]"]}, {"n": 40, "t": "\"Little\", \"a little\", \"the little\" / \"few\", \"a few\", \"the few\"", "b": "These quantifiers are used with uncountable nouns:\n\nLittle = hardly any\nA little = some, but not much\nThe little = all that is available\n\nI cannot make tea since there is little milk. [Hardly any milk]\nA little knowledge is dangerous. [Some but not much]\nHe utilized the little water that was available. [All that was available]\n\n*NOTE: The equivalent quantifiers for countable nouns are few, a few, and the few:\n\nFew = hardly any\nA few = some but not many (has a positive connotation)\nThe few = all that are available\n\nFew members attended the meeting. [Hardly any member attended]\nA few members were present. [Some members were present]\nHe lost the few friends he had. [All the friends he had]\n\n*NOTE: \"Some\" is generally used in positive sentences, and \"any\" in questions and negative sentences. Both can be used with countable and uncountable nouns.\n\nDo we need any rice?\nNo, we don't need any rice.\nWe have some rice in the cupboard.\nWould you like some water?\nMay I have some more chocolate?\n\nHowever, \"some\" can also be used in a question when we already expect the answer to be \"yes\":\n\nDo you have some water?", "expl": "These quantifiers are used with uncountable nouns:\n\n*NOTE: The equivalent quantifiers for countable nouns are few, a few, and the few:\n\n*NOTE: \"Some\" is generally used in positive sentences, and \"any\" in questions and negative sentences. Both can be used with countable and uncountable nouns.\n\nHowever, \"some\" can also be used in a question when we already expect the answer to be \"yes\":\n\nDo you have some water?", "ex": ["Little = hardly any", "A little = some, but not much", "The little = all that is available", "I cannot make tea since there is little milk. [Hardly any milk]", "A little knowledge is dangerous. [Some but not much]", "He utilized the little water that was available. [All that was available]", "Few = hardly any", "A few = some but not many (has a positive connotation)", "The few = all that are available", "Few members attended the meeting. [Hardly any member attended]", "A few members were present. [Some members were present]", "He lost the few friends he had. [All the friends he had]", "Do we need any rice?", "No, we don't need any rice.", "We have some rice in the cupboard.", "Would you like some water?", "May I have some more chocolate?"]}, {"n": 41, "t": "Objective case after a preposition", "b": "The objective case of a pronoun comes after a preposition.\n\nSubjective → Objective: I → me, we → us, you → you, they → them, he → him, she → her, it → it\n\nNone but he is going to the party. [Incorrect]\nNone but him is going to the party. [Correct]\nAll except he liked the performance. [Incorrect]\nAll except him liked the performance. [Correct]\n\n\"But\" here functions as a preposition, so it takes the objective case. Likewise, \"except\" is a preposition and is followed by the objective case.\n\n*NOTE: \"But\" can function as both a conjunction and a preposition.\n\nA verb is also followed by the objective case of a pronoun.\n\nLet him do that work. [\"Let\" is a verb here]\nThey agreed to let us live there rent-free. [\"Let\" is a verb here]\n\nRam as well as he is going to the party. [Correct — \"as well as\" is not a preposition here, so the subjective case \"he\" is correctly used]\nThere is a good friendship between you and him. [Correct — \"between\" is a preposition, so objective case follows]", "expl": "The objective case of a pronoun comes after a preposition.\n\nSubjective → Objective: I → me, we → us, you → you, they → them, he → him, she → her, it → it\n\n\"But\" here functions as a preposition, so it takes the objective case. Likewise, \"except\" is a preposition and is followed by the objective case.\n\n*NOTE: \"But\" can function as both a conjunction and a preposition.\n\nA verb is also followed by the objective case of a pronoun.", "ex": ["None but he is going to the party. [Incorrect]", "None but him is going to the party. [Correct]", "All except he liked the performance. [Incorrect]", "All except him liked the performance. [Correct]", "Let him do that work. [\"Let\" is a verb here]", "They agreed to let us live there rent-free. [\"Let\" is a verb here]", "Ram as well as he is going to the party. [Correct — \"as well as\" is not a preposition here, so the subjective case \"he\" is correctly used]", "There is a good friendship between you and him. [Correct — \"between\" is a preposition, so objective case follows]"]}, {"n": 42, "t": "Order of pronouns as subject: positive sense", "b": "(1) When all three persons are used together as the subject, connected by \"and,\" and the sentence has a positive sense, the order 2-3-1 is followed (2nd person, then 3rd person, then 1st person), with a plural verb.\n\nYou, he and I are good friends. [Order 2-3-1]\n\n(2) When only two persons are the subject, connected by \"and,\" with a positive sense, the order follows (2,3), (2,1), or (3,1), with a plural verb.\n\nYou and she are good friends. [Order 2,3]\nYou and I are playing chess. [Order 2,1]\nHe and I were watching TV. [Order 3,1]\n\n(3) When all three persons are the subject, connected by \"and,\" and the sentence has a negative sense (talking about a mistake, blame, or guilt), the order 1-2-3 is followed, with a plural verb.\n\nI, you and he are guilty. [Order 1-2-3]\nI, you and he are robbers. [Order 1-2-3]\n\n(4) When only two persons are the subject, connected by \"and,\" with a negative sense, the order follows (1,2), (2,3), or (1,3).\n\nI and you have committed a crime. [Order 1,2]\nYou and he are sinners. [Order 2,3]\nI and he were guilty. [Order 1,3]\n\nIf all the pronouns are plural, we use the order 1-2-3 in all cases.\n\nWe, you and they are going to watch a movie.", "expl": "(1) When all three persons are used together as the subject, connected by \"and,\" and the sentence has a positive sense, the order 2-3-1 is followed (2nd person, then 3rd person, then 1st person), with a plural verb.\n\nYou, he and I are good friends. [Order 2-3-1]\n\n(2) When only two persons are the subject, connected by \"and,\" with a positive sense, the order follows (2,3), (2,1), or (3,1), with a plural verb.\n\n(3) When all three persons are the subject, connected by \"and,\" and the sentence has a negative sense (talking about a mistake, blame, or guilt), the order 1-2-3 is followed, with a plural verb.\n\n(4) When only two persons are the subject, connected by \"and,\" with a negative sense, the order follows (1,2), (2,3), or (1,3).\n\nIf all the pronouns are plural, we use the order 1-2-3 in all cases.\n\nWe, you and they are going to watch a movie.", "ex": ["You and she are good friends. [Order 2,3]", "You and I are playing chess. [Order 2,1]", "He and I were watching TV. [Order 3,1]", "I, you and he are guilty. [Order 1-2-3]", "I, you and he are robbers. [Order 1-2-3]", "I and you have committed a crime. [Order 1,2]", "You and he are sinners. [Order 2,3]", "I and he were guilty. [Order 1,3]"]}, {"n": 43, "t": "Superfluous errors (redundant wording)", "b": "\"Superfluous\" means more words are given than are actually needed — extra, redundant wording.\n\nIndia broke all previous records in today's match. [Incorrect — \"records\" already implies \"previous\"]\nIndia broke all records in today's match. [Correct]\nI want wet water. [Incorrect — water is inherently wet]\nI want water. [Correct]\nSuppose if you won the Oscar, what would you do? [Incorrect — \"if\" is redundant with \"suppose\"]\nSuppose you won the Oscar, what would you do? [Correct]\n\n*NOTE: \"Supposing if\" is also wrong — \"if\" is not needed with \"supposing.\"\n\nThe army retreated back from the conflict zone in Kashmir. [Incorrect — \"retreat\" already means to withdraw]\nThe army retreated from the conflict zone in Kashmir. [Correct]\nThe sage was reborn again in Vijayanagar. [Incorrect]\nThe sage was reborn in Vijayanagar. [Correct]\n\n*NOTE: Never use \"again\" after verbs like rebirth/reborn/rebuild/regain/reiterate/recast, etc.\n\nManu is equally as good as Sharma. [Incorrect]\nManu and Sharma are equally good. [Correct]\nManu is as good as Sharma. [Correct]\n\n(\"Equally\" and \"as good as\" should not be combined — use one or the other.)\n\nThe manager and the chairman decided on a mutual agreement on profit. [Incorrect — agreement is always mutual]\nThe manager and the chairman decided on an agreement on profit. [Correct]\n\n*NOTE: \"Mutual friend\" is also wrong — say \"common friend\" instead. Likewise, say \"common interest,\" not \"mutual interest.\"\n\nShe forbade me not to leave her alone. [Incorrect]\nShe forbade me to leave her alone. [Correct]\n\n*NOTE: \"Not\" is never used after until/unless/forbid/prohibit/prevent/dissuade/deny/refuse/lest.\n\nHe's a coward man/person. [Incorrect — \"coward\" already means someone who lacks courage]\nHe is a coward. [Correct]\nShe left the house with bag and baggage. [Incorrect]\nShe left the house, bag and baggage. [Correct — \"bag and baggage\" is an idiom meaning \"with all belongings\"; adding \"with\" is redundant]\nPassing marks are thirty-three. [Incorrect]\nPass marks are thirty-three. [Correct]\n\n(Similarly avoid \"passing marks\"/\"linking language\"/\"linking network\"/\"dressing sense\" — use \"pass marks\"/\"link language\"/\"link network\"/\"dress sense.\")\n\nI suddenly came across him on the train. [Incorrect — \"come across\" already means to meet suddenly]\nI came across him on the train. [Correct]\n\nSome more common superfluous errors:\n{{Final destination}} — destination is always final.\n{{Rough estimate}} — an estimate is always rough.\n{{Past history}} — history is always past.\n{{Return back}} — \"return\" already means \"come back.\"\n{{Coming future}} — the future is always coming.\n{{Reason because}} — \"reason\" already means \"cause,\" so \"because\" is redundant.\n{{Consensus opinion}} — \"consensus\" already means collective agreement.\n{{Final conclusion}} — a conclusion is always final.\n{{Funeral service}} — a funeral is already a ceremony/service.\n\n*NOTE: \"Enter into\" is also usually superfluous — except when used as a phrasal verb meaning \"to investigate\" or \"look into.\"", "expl": "\"Superfluous\" means more words are given than are actually needed — extra, redundant wording.\n\n*NOTE: \"Supposing if\" is also wrong — \"if\" is not needed with \"supposing.\"\n\n*NOTE: Never use \"again\" after verbs like rebirth/reborn/rebuild/regain/reiterate/recast, etc.\n\n(\"Equally\" and \"as good as\" should not be combined — use one or the other.)\n\n*NOTE: \"Mutual friend\" is also wrong — say \"common friend\" instead. Likewise, say \"common interest,\" not \"mutual interest.\"\n\n*NOTE: \"Not\" is never used after until/unless/forbid/prohibit/prevent/dissuade/deny/refuse/lest.\n\n(Similarly avoid \"passing marks\"/\"linking language\"/\"linking network\"/\"dressing sense\" — use \"pass marks\"/\"link language\"/\"link network\"/\"dress sense.\")\n\n*NOTE: \"Enter into\" is also usually superfluous — except when used as a phrasal verb meaning \"to investigate\" or \"look into.\"", "ex": ["India broke all previous records in today's match. [Incorrect — \"records\" already implies \"previous\"]", "India broke all records in today's match. [Correct]", "I want wet water. [Incorrect — water is inherently wet]", "I want water. [Correct]", "Suppose if you won the Oscar, what would you do? [Incorrect — \"if\" is redundant with \"suppose\"]", "Suppose you won the Oscar, what would you do? [Correct]", "The army retreated back from the conflict zone in Kashmir. [Incorrect — \"retreat\" already means to withdraw]", "The army retreated from the conflict zone in Kashmir. [Correct]", "The sage was reborn again in Vijayanagar. [Incorrect]", "The sage was reborn in Vijayanagar. [Correct]", "Manu is equally as good as Sharma. [Incorrect]", "Manu and Sharma are equally good. [Correct]", "Manu is as good as Sharma. [Correct]", "The manager and the chairman decided on a mutual agreement on profit. [Incorrect — agreement is always mutual]", "The manager and the chairman decided on an agreement on profit. [Correct]", "She forbade me not to leave her alone. [Incorrect]", "She forbade me to leave her alone. [Correct]", "He's a coward man/person. [Incorrect — \"coward\" already means someone who lacks courage]", "He is a coward. [Correct]", "She left the house with bag and baggage. [Incorrect]", "She left the house, bag and baggage. [Correct — \"bag and baggage\" is an idiom meaning \"with all belongings\"; adding \"with\" is redundant]", "Passing marks are thirty-three. [Incorrect]", "Pass marks are thirty-three. [Correct]", "I suddenly came across him on the train. [Incorrect — \"come across\" already means to meet suddenly]", "I came across him on the train. [Correct]", "Some more common superfluous errors:", "{{Final destination}} — destination is always final.", "{{Rough estimate}} — an estimate is always rough.", "{{Past history}} — history is always past.", "{{Return back}} — \"return\" already means \"come back.\"", "{{Coming future}} — the future is always coming.", "{{Reason because}} — \"reason\" already means \"cause,\" so \"because\" is redundant.", "{{Consensus opinion}} — \"consensus\" already means collective agreement.", "{{Final conclusion}} — a conclusion is always final.", "{{Funeral service}} — a funeral is already a ceremony/service."]}, {"n": 44, "t": "Use of the apostrophe (‘s)", "b": "The apostrophe ('s) is not used with non-living things.\n\nTable's legs. [Incorrect]\nDoor's bolt. [Incorrect]\nPen's ink. [Incorrect]\nBook's page. [Incorrect]\nChair's legs. [Incorrect]\n\nThese should be rewritten with \"of\":\n\nLegs of the table. [Correct]\nBolt of the door. [Correct]\nInk of the pen. [Correct]\nPage of the book. [Correct]\nLegs of the chair. [Correct]\n\n*NOTE: There are exceptions — for {{time, weight, distance, place, idiom, unit, personification, heavenly bodies}}, we can use the apostrophe with non-living nouns.\n\nOne week's vacation. [Correct]\nFour dollars' worth. [Correct]\nToday's date. [Correct]\nThe ship's bells. [Correct]\nThe city's parks. [Correct]\nMalaysia's land. [Correct]\nNature's call. [Correct]\nAt a stone's throw. [Correct]\n\n*NOTE: Some pronouns are already possessive and never take an apostrophe: {{yours, ours, its, theirs, his, hers, whose}}.", "expl": "The apostrophe ('s) is not used with non-living things.\n\nThese should be rewritten with \"of\":\n\n*NOTE: There are exceptions — for {{time, weight, distance, place, idiom, unit, personification, heavenly bodies}}, we can use the apostrophe with non-living nouns.\n\n*NOTE: Some pronouns are already possessive and never take an apostrophe: {{yours, ours, its, theirs, his, hers, whose}}.", "ex": ["Table's legs. [Incorrect]", "Door's bolt. [Incorrect]", "Pen's ink. [Incorrect]", "Book's page. [Incorrect]", "Chair's legs. [Incorrect]", "Legs of the table. [Correct]", "Bolt of the door. [Correct]", "Ink of the pen. [Correct]", "Page of the book. [Correct]", "Legs of the chair. [Correct]", "One week's vacation. [Correct]", "Four dollars' worth. [Correct]", "Today's date. [Correct]", "The ship's bells. [Correct]", "The city's parks. [Correct]", "Malaysia's land. [Correct]", "Nature's call. [Correct]", "At a stone's throw. [Correct]"]}, {"n": 45, "t": "A specific past time point requires the Simple Past", "b": "Whenever a specific point of time in the past is mentioned (yesterday, 10 days ago, etc.), we always use the Simple Past tense — not the Present Perfect.\n\nI have gone to the market yesterday to purchase a car. [Incorrect]\nI went to the market yesterday to purchase a car. [Correct]\nThe company's shares have dived by 90p to 165p on the stock market last week. [Incorrect]\nThe company's shares dived by 90p to 165p on the stock market last week. [Correct]", "expl": "Whenever a specific point of time in the past is mentioned (yesterday, 10 days ago, etc.), we always use the Simple Past tense — not the Present Perfect.", "ex": ["I have gone to the market yesterday to purchase a car. [Incorrect]", "I went to the market yesterday to purchase a car. [Correct]", "The company's shares have dived by 90p to 165p on the stock market last week. [Incorrect]", "The company's shares dived by 90p to 165p on the stock market last week. [Correct]"]}, {"n": 46, "t": "Adjectives never used with \"most\"", "b": "Certain absolute adjectives — {{unique, excellent, perfect, ideal, entire, complete}}, etc. — describe qualities that cannot logically have degrees, so they are never used with \"most.\"\n\nHe is the most excellent student. [Incorrect]\nHe is an excellent student. [Correct]\nThis is the most unique product of our company. [Incorrect]\nThis is a unique product of our company. [Correct]\nHe is completely perfect. [Incorrect]\nHe is perfect. [Correct]", "expl": "Certain absolute adjectives — {{unique, excellent, perfect, ideal, entire, complete}}, etc. — describe qualities that cannot logically have degrees, so they are never used with \"most.\"", "ex": ["He is the most excellent student. [Incorrect]", "He is an excellent student. [Correct]", "This is the most unique product of our company. [Incorrect]", "This is a unique product of our company. [Correct]", "He is completely perfect. [Incorrect]", "He is perfect. [Correct]"]}, {"n": 47, "t": "\"Quite\" and \"all\" are never used together", "b": "\"Quite\" and \"all\" cannot appear together in the same sentence.\n\nHe is quite all well. [Incorrect]\nHe is quite well. [Correct]\nHe has done quite all the work. [Incorrect]\nHe has done all the work. [Correct]\n\n*NOTE: Don't confuse the similarly spelled \"quiet\" and \"quite.\" \"Quiet\" is a noun/adjective meaning the state of being silent; \"quite\" is an adverb meaning \"completely.\"", "expl": "\"Quite\" and \"all\" cannot appear together in the same sentence.\n\n*NOTE: Don't confuse the similarly spelled \"quiet\" and \"quite.\" \"Quiet\" is a noun/adjective meaning the state of being silent; \"quite\" is an adverb meaning \"completely.\"", "ex": ["He is quite all well. [Incorrect]", "He is quite well. [Correct]", "He has done quite all the work. [Incorrect]", "He has done all the work. [Correct]"]}, {"n": 48, "t": "\"Ago\" (Simple Past) vs. \"before\" (Past Perfect)", "b": "When the word \"ago\" appears in a sentence, we generally use the Simple Past tense. When \"before\" is used to relate two past events, we use the Past Perfect for the earlier one.\n\nHe had gone two seconds ago. [Incorrect]\nHe went two seconds ago. [Correct]\nShe had submitted the work five hours ago. [Incorrect]\nShe submitted the work five hours ago. [Correct]\nThe patient died before the doctor came. [Incorrect]\nThe patient had died before the doctor came. [Correct]\n\nIn the last example, two past actions are involved — the earlier one (\"died\") takes \"had + V3,\" and the later one (\"came\") takes the Simple Past (\"V2\").", "expl": "When the word \"ago\" appears in a sentence, we generally use the Simple Past tense. When \"before\" is used to relate two past events, we use the Past Perfect for the earlier one.\n\nIn the last example, two past actions are involved — the earlier one (\"died\") takes \"had + V3,\" and the later one (\"came\") takes the Simple Past (\"V2\").", "ex": ["He had gone two seconds ago. [Incorrect]", "He went two seconds ago. [Correct]", "She had submitted the work five hours ago. [Incorrect]", "She submitted the work five hours ago. [Correct]", "The patient died before the doctor came. [Incorrect]", "The patient had died before the doctor came. [Correct]"]}, {"n": 49, "t": "Common vs. split possession", "b": "(1) Common Possession: When two nouns are closely connected and jointly possess something, the possessive sign ('s) is put on the last noun only.\n\nRam and Shyam's car is being decorated for Balram's marriage. [One shared car]\nRam and Shyam's cars are being decorated for Balram's marriage. [More than one shared car — still common possession]\n\n(2) Split Possession: When each of two or more connected nouns separately possesses something, each noun takes its own possessive sign.\n\nRam's and Shyam's car is being decorated for Balram's marriage. [Incorrect]\nRam's and Shyam's cars are being decorated for Balram's marriage. [Correct]\n\nHere, the possessive sign on each noun shows that at least two separate cars are involved — one belonging to Ram and one to Shyam — so the plural noun \"cars\" is used with a plural verb.", "expl": "(1) Common Possession: When two nouns are closely connected and jointly possess something, the possessive sign ('s) is put on the last noun only.\n\n(2) Split Possession: When each of two or more connected nouns separately possesses something, each noun takes its own possessive sign.\n\nHere, the possessive sign on each noun shows that at least two separate cars are involved — one belonging to Ram and one to Shyam — so the plural noun \"cars\" is used with a plural verb.", "ex": ["Ram and Shyam's car is being decorated for Balram's marriage. [One shared car]", "Ram and Shyam's cars are being decorated for Balram's marriage. [More than one shared car — still common possession]", "Ram's and Shyam's car is being decorated for Balram's marriage. [Incorrect]", "Ram's and Shyam's cars are being decorated for Balram's marriage. [Correct]"]}, {"n": 50, "t": "\"It's\" vs. \"its\"", "b": "\"It's\" is a contraction of \"it is.\" \"Its\" is the possessive form.\n\nThe child is carrying it's book. [Incorrect]\nThe child is carrying its book. [Correct]\nIts called a miracle. [Incorrect]\nIt's called a miracle. [Correct]", "expl": "\"It's\" is a contraction of \"it is.\" \"Its\" is the possessive form.", "ex": ["The child is carrying it's book. [Incorrect]", "The child is carrying its book. [Correct]", "Its called a miracle. [Incorrect]", "It's called a miracle. [Correct]"]}, {"n": 51, "t": "\"A number of\" vs. \"the number of\"", "b": "\"A number of + plural noun\" takes a plural verb. \"The number of + plural noun\" takes a singular verb. The same pattern applies to \"a variety of\" / \"the variety of.\"\n\nA number of students are waiting here.\nThe number of students is fifty.\nA number of tickets were sold almost immediately.\nThe number of employees taking legal action over work-related disease is increasing.", "expl": "\"A number of + plural noun\" takes a plural verb. \"The number of + plural noun\" takes a singular verb. The same pattern applies to \"a variety of\" / \"the variety of.\"", "ex": ["A number of students are waiting here.", "The number of students is fifty.", "A number of tickets were sold almost immediately.", "The number of employees taking legal action over work-related disease is increasing."]}, {"n": 52, "t": "\"It is time\" / \"it is high time\" / \"it is about time\"", "b": "(1) If there's no subject attached, the phrase is followed by \"to + V1\":\n\nIt is time to work hard.\nIt is time to ask for a raise.\n\n(2) If the phrase is directly followed by a subject, we use the past tense form (\"V2\") after the subject:\n\nIt is time he worked hard. [Followed by the subject \"he\"]\nGosh! It's almost midnight. It is time we went home. [Followed by the subject \"we\"]\n\n*NOTE: The construction \"it's time + subject + past verb form\" refers to the present moment, even though a past tense form is used.", "expl": "(1) If there's no subject attached, the phrase is followed by \"to + V1\":\n\n(2) If the phrase is directly followed by a subject, we use the past tense form (\"V2\") after the subject:\n\n*NOTE: The construction \"it's time + subject + past verb form\" refers to the present moment, even though a past tense form is used.", "ex": ["It is time to work hard.", "It is time to ask for a raise.", "It is time he worked hard. [Followed by the subject \"he\"]", "Gosh! It's almost midnight. It is time we went home. [Followed by the subject \"we\"]"]}, {"n": 53, "t": "Preposition with \"angry\"", "b": "(1) We use \"with\" after \"angry\" when referring to a person or living thing.\n\nI got really angry with her.\nI am angry with Shyam because he did not go to the class.\n\n(2) We use \"at\" after \"angry\" when referring to something other than a person or living thing.\n\nThe local residents were angry at the lack of parking spaces.\nThey are angry at the way they have been treated.\n\n*NOTE: The same rule applies to \"annoy.\"", "expl": "(1) We use \"with\" after \"angry\" when referring to a person or living thing.\n\n(2) We use \"at\" after \"angry\" when referring to something other than a person or living thing.\n\n*NOTE: The same rule applies to \"annoy.\"", "ex": ["I got really angry with her.", "I am angry with Shyam because he did not go to the class.", "The local residents were angry at the lack of parking spaces.", "They are angry at the way they have been treated."]}, {"n": 54, "t": "\"Know\" is not directly followed by \"to\"", "b": "\"Know\" is not directly followed by the infinitive \"to.\" We instead use words like {{how, when, why, where}}, etc. to complete the sentence.\n\nI do not know what all the fuss is about.\nI do not know how to make tea; hence you should help me out.\nI don't know to make tea. [Incorrect]\nDo you know where the Post Office is?", "expl": "\"Know\" is not directly followed by the infinitive \"to.\" We instead use words like {{how, when, why, where}}, etc. to complete the sentence.", "ex": ["I do not know what all the fuss is about.", "I do not know how to make tea; hence you should help me out.", "I don't know to make tea. [Incorrect]", "Do you know where the Post Office is?"]}, {"n": 55, "t": "\"Else\" + \"but\"; \"other/rather\" + \"than\"", "b": "The adverb \"else\" is always followed by \"but,\" while \"other\" and \"rather\" are always followed by \"than.\"\n\nIt is nothing else but mere foolishness.\nEverybody else has agreed but you.\nHe met no other person than Ram.\nI think I would rather stay at home this evening than go out.", "expl": "The adverb \"else\" is always followed by \"but,\" while \"other\" and \"rather\" are always followed by \"than.\"", "ex": ["It is nothing else but mere foolishness.", "Everybody else has agreed but you.", "He met no other person than Ram.", "I think I would rather stay at home this evening than go out."]}, {"n": 56, "t": "\"Sort\", \"type\", \"kind\" take a singular verb", "b": "Words like \"sort,\" \"type,\" and \"kind\" always take a singular verb.\n\nThis type of article is sold in the market.\nThis sort of camera is very expensive.\nAny kind of racism is abhorrent to me.", "expl": "Words like \"sort,\" \"type,\" and \"kind\" always take a singular verb.", "ex": ["This type of article is sold in the market.", "This sort of camera is very expensive.", "Any kind of racism is abhorrent to me."]}, {"n": 57, "t": "Prepositions \"in\", \"inside\", and \"into\"", "b": "(1) \"Inside\" implies movement — moving from outside to inside.\n\nI came inside the class.\nHe tried to get inside her mind.\n\n*NOTE: \"Inside out\" is a different, idiomatic expression. It literally means the usual inside is now on the outside; it can also mean \"completely.\"\n\nI know my husband inside out. [Completely]\nShe had her sweater inside out.\n\n(2) \"In\" implies a static state — something already inside.\n\nI am in the class.\nThe chlorine in the pool makes my eyes sore.\n\n(3) \"Into\" implies movement toward something, or a change of state.\n\nCome into the house.\nHe threw the letter into the fire.\nCan you translate this passage into German?\nThe fruit can be made into jam.\nHe jumped into the well.\nShe wove her ideas into a story.", "expl": "(1) \"Inside\" implies movement — moving from outside to inside.\n\n*NOTE: \"Inside out\" is a different, idiomatic expression. It literally means the usual inside is now on the outside; it can also mean \"completely.\"\n\n(2) \"In\" implies a static state — something already inside.\n\n(3) \"Into\" implies movement toward something, or a change of state.", "ex": ["I came inside the class.", "He tried to get inside her mind.", "I know my husband inside out. [Completely]", "She had her sweater inside out.", "I am in the class.", "The chlorine in the pool makes my eyes sore.", "Come into the house.", "He threw the letter into the fire.", "Can you translate this passage into German?", "The fruit can be made into jam.", "He jumped into the well.", "She wove her ideas into a story."]}, {"n": 58, "t": "Prepositions \"with\" and \"by\"", "b": "(1) We use \"with\" when referring to a non-living instrument.\n\nWe write with a pen. [Pen — non-living]\nShe wiped her lipstick off with a tissue.\nHe hit the dog with a stick.\n\n(2) We use \"by\" when referring to a living agent (the doer of the action).\n\nThe motorcycle was driven by a tiny bald man.\nThe book was translated by a well-known author.\nAny painting by Van Gogh is worth a fortune.\n\n*NOTE: When talking about a \"watch,\" we use \"by.\"\n\nWhat is the time by your watch? [\"In your watch\" would be incorrect]\n\n*NOTE: \"By\" is also used to refer to a deadline time.\n\nShe had promised to be back by five o'clock.\nI have got to be home by seven.", "expl": "(1) We use \"with\" when referring to a non-living instrument.\n\n(2) We use \"by\" when referring to a living agent (the doer of the action).\n\n*NOTE: When talking about a \"watch,\" we use \"by.\"\n\nWhat is the time by your watch? [\"In your watch\" would be incorrect]\n\n*NOTE: \"By\" is also used to refer to a deadline time.", "ex": ["We write with a pen. [Pen — non-living]", "She wiped her lipstick off with a tissue.", "He hit the dog with a stick.", "The motorcycle was driven by a tiny bald man.", "The book was translated by a well-known author.", "Any painting by Van Gogh is worth a fortune.", "She had promised to be back by five o'clock.", "I have got to be home by seven."]}, {"n": 59, "t": "\"Start\" is not used with \"from\"", "b": "We do not use the preposition \"from\" with the word \"start.\"\n\nMy exams start from Monday. [Incorrect]\nMy exams start on Monday. [Correct]\n\nUsing \"from\" implies the event will start again and again (on Monday, then Tuesday, and so on), which is illogical for a one-time start. \"On\" correctly implies a single starting point.\n\nHe will start his preparation from Monday. [Incorrect]\nHe will start his preparation on Monday. [Correct]\n\nHowever, the sentence can be rewritten using \"from\" if the meaning shifts to an ongoing process:\n\nHe will prepare for the exams from Monday. [Correct]\n\n*NOTE: \"From\" implies continuation, which is why it fits \"prepare\" (an ongoing action) but not \"start\" (a single point of beginning).", "expl": "We do not use the preposition \"from\" with the word \"start.\"\n\nUsing \"from\" implies the event will start again and again (on Monday, then Tuesday, and so on), which is illogical for a one-time start. \"On\" correctly implies a single starting point.\n\nHowever, the sentence can be rewritten using \"from\" if the meaning shifts to an ongoing process:\n\n*NOTE: \"From\" implies continuation, which is why it fits \"prepare\" (an ongoing action) but not \"start\" (a single point of beginning).", "ex": ["My exams start from Monday. [Incorrect]", "My exams start on Monday. [Correct]", "He will start his preparation from Monday. [Incorrect]", "He will start his preparation on Monday. [Correct]", "He will prepare for the exams from Monday. [Correct]"]}, {"n": 60, "t": "Infinitives that take \"to + V1+ing\"", "b": "Generally, an infinitive takes the form \"to + V1.\" But certain fixed expressions always take \"to + V1+ing\" instead:\n\nbe used to + V1+ing\naccustomed to + V1+ing\naddicted to + V1+ing\nwith a view to + V1+ing\nlook forward to + V1+ing\ngiven to + V1+ing\nprone to + V1+ing\ndevoted to + V1+ing\nin addition to + V1+ing\nconfess to + V1+ing\ndisposed to + V1+ing\ncome to + V1+ing\n\nShe was given to staying in bed till lunchtime.\nThese measures have been taken with a view to increasing the company's profits.\nI look forward to hearing from you.\nHe is rather prone to making tactless remarks.\nShe has devoted herself to getting justice for her son.\nI am not accustomed to being treated like this.\n\n*NOTE: When the \"V1+ing\" form is used as a noun, it is called a gerund.", "expl": "Generally, an infinitive takes the form \"to + V1.\" But certain fixed expressions always take \"to + V1+ing\" instead:\n\n*NOTE: When the \"V1+ing\" form is used as a noun, it is called a gerund.", "ex": ["be used to + V1+ing", "accustomed to + V1+ing", "addicted to + V1+ing", "with a view to + V1+ing", "look forward to + V1+ing", "given to + V1+ing", "prone to + V1+ing", "devoted to + V1+ing", "in addition to + V1+ing", "confess to + V1+ing", "disposed to + V1+ing", "come to + V1+ing", "She was given to staying in bed till lunchtime.", "These measures have been taken with a view to increasing the company's profits.", "I look forward to hearing from you.", "He is rather prone to making tactless remarks.", "She has devoted herself to getting justice for her son.", "I am not accustomed to being treated like this."]}, {"n": 61, "t": "Choosing between 'a' and 'an'", "b": "The choice between the indefinite articles \"a\" and \"an\" is determined by sound, not spelling. Words beginning with a consonant sound take \"a\"; words beginning with a vowel sound take \"an.\"\n\nVowel sounds: {{a, e, i, o, u}} (as sounds, not just letters)\n\nAn NCC cadet. [Vowel sound]\nA UNICEF participating nation. [Consonant sound — \"yoo\"]\nAn umbrella. [Vowel sound]\nAn M.Tech. graduate. [Vowel sound — \"em\"]\nA utensil. [Consonant sound — \"yoo\"]\nA university. [Consonant sound]\nA unicorn. [Consonant sound]\nA year. [Exception — words starting with the sounds \"y\" and \"w\" take \"a\"]\nA European university.\nA uniform.\nA one-rupee note.\nA union.\nA one-eyed girl.\nA unanimous decision.", "expl": "The choice between the indefinite articles \"a\" and \"an\" is determined by sound, not spelling. Words beginning with a consonant sound take \"a\"; words beginning with a vowel sound take \"an.\"\n\nVowel sounds: {{a, e, i, o, u}} (as sounds, not just letters)", "ex": ["An NCC cadet. [Vowel sound]", "A UNICEF participating nation. [Consonant sound — \"yoo\"]", "An umbrella. [Vowel sound]", "An M.Tech. graduate. [Vowel sound — \"em\"]", "A utensil. [Consonant sound — \"yoo\"]", "A university. [Consonant sound]", "A unicorn. [Consonant sound]", "A year. [Exception — words starting with the sounds \"y\" and \"w\" take \"a\"]", "A European university.", "A uniform.", "A one-rupee note.", "A union.", "A one-eyed girl.", "A unanimous decision."]}, {"n": 62, "t": "Usage of the definite article \"the\"", "b": "(1) {{Mountain ranges, bays/gulfs, groups of islands, canals, aeroplanes, ships, religious books, government branches, armed forces, deserts, political parties, musical instruments, rivers, oceans, seas}}, and things unique in themselves are always preceded by \"the.\"\n\nThe Sahara. [Desert]\nThe Pacific. [Ocean]\nThe Nile. [River]\nThe Coral Sea. [Sea]\nThe Himalayas. [Mountain range]\nThe Guitar. [Musical instrument, generically]\n\n*NOTE: Mountain ranges take \"the,\" but individual mountain peaks never do. \"The Himalayas\" is correct, but \"the Mount Everest\" is wrong — we simply say \"Everest.\"\n\n(2) Names of newspapers always take \"the\": The Times of India, The Hindu, The Indian Express.\n\n(3) Names of countries written in abbreviated form always take \"the\": The USA, The UK, The UAE, The USSR.\n\n(4) The superlative degree always takes \"the\": the best book, the darkest cloud.\n\n(5) Comparative constructions with \"the...the\": The higher you go, the cooler it is. / The faster you walk, the sooner you reach. / The more sugar you put in the dish, the sweeter it is.\n\nAlso, when comparing exactly two things: He is the better of the two. / She is the poorer of the two women. / He is the better candidate of the two for the job.\n\n(6) Metaphors sometimes take \"the,\" where one thing is described as another: He is the Mahatma Gandhi of our class. / Delhi is the Paris of India.\n\n(7) A phrase combining a common noun and a proper noun takes \"the\": the river Nile, the Muslim League Party, the New York City.\n\n(8) \"The\" is mandatory before something that is the only one of its kind in the universe: The moon is shining tonight. / The earth is moving around the sun.\n\n(9) Names of government organisations take \"the\": The Society for the Protection of Child's Rights.", "expl": "(1) {{Mountain ranges, bays/gulfs, groups of islands, canals, aeroplanes, ships, religious books, government branches, armed forces, deserts, political parties, musical instruments, rivers, oceans, seas}}, and things unique in themselves are always preceded by \"the.\"\n\n*NOTE: Mountain ranges take \"the,\" but individual mountain peaks never do. \"The Himalayas\" is correct, but \"the Mount Everest\" is wrong — we simply say \"Everest.\"\n\n(2) Names of newspapers always take \"the\": The Times of India, The Hindu, The Indian Express.\n\n(3) Names of countries written in abbreviated form always take \"the\": The USA, The UK, The UAE, The USSR.\n\n(4) The superlative degree always takes \"the\": the best book, the darkest cloud.\n\n(5) Comparative constructions with \"the...the\": The higher you go, the cooler it is. / The faster you walk, the sooner you reach. / The more sugar you put in the dish, the sweeter it is.\n\nAlso, when comparing exactly two things: He is the better of the two. / She is the poorer of the two women. / He is the better candidate of the two for the job.\n\n(6) Metaphors sometimes take \"the,\" where one thing is described as another: He is the Mahatma Gandhi of our class. / Delhi is the Paris of India.\n\n(7) A phrase combining a common noun and a proper noun takes \"the\": the river Nile, the Muslim League Party, the New York City.\n\n(8) \"The\" is mandatory before something that is the only one of its kind in the universe: The moon is shining tonight. / The earth is moving around the sun.\n\n(9) Names of government organisations take \"the\": The Society for the Protection of Child's Rights.", "ex": ["The Sahara. [Desert]", "The Pacific. [Ocean]", "The Nile. [River]", "The Coral Sea. [Sea]", "The Himalayas. [Mountain range]", "The Guitar. [Musical instrument, generically]"]}, {"n": 63, "t": "Omission of \"the\"", "b": "We do not use any article before:\n\n(1) Names of cities: {{Los Angeles, Alaska, Sydney}}, etc.\n(2) Names of countries (except abbreviated forms): {{Australia, Bolivia, England, France, Spain}}, etc.\n(3) Names of continents: {{Asia, Europe, Africa, South America, North America, Antarctica}}.\n(4) Names of streets: {{George Street, Albion Street, Newtown Street}}, etc.\n(5) Names of singular lakes and bays: {{Lake Carey, Lake Eyre, Shark Bay}}, etc.\n(6) Names of mountain peaks: {{Mount Everest, Mount Fuji}}, etc.\n(7) Names of single islands: {{Easter Island, Bird Island}}, etc.\n(8) Names of languages: {{Spanish, Russian, English}}. (When \"the\" does precede these, it refers to the people who speak that language, not the language itself.)\n(9) Names of sports: {{cricket, football, basketball}}, etc.\n(10) Words like {{season, language, drinks, meals, God, life, money}}, etc. — unless we're particularizing the reference, in which case \"the\" is used.\n\nBreakfast should be light, but the breakfast I had this morning was heavy. [The second \"breakfast\" refers to one particular meal, so it takes \"the.\"]", "expl": "We do not use any article before:\n\n(1) Names of cities: {{Los Angeles, Alaska, Sydney}}, etc.\n(2) Names of countries (except abbreviated forms): {{Australia, Bolivia, England, France, Spain}}, etc.\n(3) Names of continents: {{Asia, Europe, Africa, South America, North America, Antarctica}}.\n(4) Names of streets: {{George Street, Albion Street, Newtown Street}}, etc.\n(5) Names of singular lakes and bays: {{Lake Carey, Lake Eyre, Shark Bay}}, etc.\n(6) Names of mountain peaks: {{Mount Everest, Mount Fuji}}, etc.\n(7) Names of single islands: {{Easter Island, Bird Island}}, etc.\n(8) Names of languages: {{Spanish, Russian, English}}. (When \"the\" does precede these, it refers to the people who speak that language, not the language itself.)\n(9) Names of sports: {{cricket, football, basketball}}, etc.\n(10) Words like {{season, language, drinks, meals, God, life, money}}, etc. — unless we're particularizing the reference, in which case \"the\" is used.\n\nBreakfast should be light, but the breakfast I had this morning was heavy. [The second \"breakfast\" refers to one particular meal, so it takes \"the.\"]", "ex": []}, {"n": 64, "t": "\"The + adjective\" as a plural noun", "b": "Whenever the article \"the\" is used before an adjective, it refers to the whole group of people described by that adjective — functioning as a plural noun.\n\nThe poor = poor people\nThe needy = needy people\nThe brave = brave people\nThe rich = rich people\n\nThe honest are respected. [\"The honest\" = honest people]\nThe poor are not always dishonest. [\"The poor\" = poor people]", "expl": "Whenever the article \"the\" is used before an adjective, it refers to the whole group of people described by that adjective — functioning as a plural noun.", "ex": ["The poor = poor people", "The needy = needy people", "The brave = brave people", "The rich = rich people", "The honest are respected. [\"The honest\" = honest people]", "The poor are not always dishonest. [\"The poor\" = poor people]"]}, {"n": 65, "t": "Repeated nouns joined by a preposition stay singular", "b": "When the same noun is repeated, joined by a preposition, both instances of the noun stay in the singular form.\n\nVillages after villages were destroyed by the terrorists. [Incorrect]\nVillage after village were destroyed by the terrorists. [Correct]\nBooks after books had been read by him. [Incorrect]\nBook after book had been read by him. [Correct]\nCity after city was set on fire. [Correct]\nPage after page was reviewed multiple times. [Correct]", "expl": "When the same noun is repeated, joined by a preposition, both instances of the noun stay in the singular form.", "ex": ["Villages after villages were destroyed by the terrorists. [Incorrect]", "Village after village were destroyed by the terrorists. [Correct]", "Books after books had been read by him. [Incorrect]", "Book after book had been read by him. [Correct]", "City after city was set on fire. [Correct]", "Page after page was reviewed multiple times. [Correct]"]}, {"n": 66, "t": "Irregular plurals to know", "b": "Some nouns form irregular plurals:\n\ndormouse → dormice; man → men; foot → feet; mouse → mice; louse → lice; woman → women\n\nSome compound nouns form the plural on the first word:\n\ndaughter-in-law → daughters-in-law\nhanger-on → hangers-on\nlooker-on → lookers-on\nbrother-in-law → brothers-in-law\n\nSome compound nouns form the plural on the second word:\n\nbook-case → book-cases\nclass-fellow → class-fellows\nrace-horse → race-horses\nstep-son → step-sons\ncastaway → castaways\ngrand-father → grand-fathers\nhorse-race → horse-races\n\nSome compound nouns pluralize both words:\n\nman-servant → men-servants\nwoman-servant → women-servants\nlord-justice → lords-justices\n\n*NOTE: To show possession on a compound noun, the apostrophe ('s) always goes at the very end.\n\nSister-in-law's car. [Possession of a compound noun]", "expl": "Some nouns form irregular plurals:\n\ndormouse → dormice; man → men; foot → feet; mouse → mice; louse → lice; woman → women\n\nSome compound nouns form the plural on the first word:\n\nSome compound nouns form the plural on the second word:\n\nSome compound nouns pluralize both words:\n\n*NOTE: To show possession on a compound noun, the apostrophe ('s) always goes at the very end.\n\nSister-in-law's car. [Possession of a compound noun]", "ex": ["daughter-in-law → daughters-in-law", "hanger-on → hangers-on", "looker-on → lookers-on", "brother-in-law → brothers-in-law", "book-case → book-cases", "class-fellow → class-fellows", "race-horse → race-horses", "step-son → step-sons", "castaway → castaways", "grand-father → grand-fathers", "horse-race → horse-races", "man-servant → men-servants", "woman-servant → women-servants", "lord-justice → lords-justices"]}, {"n": 67, "t": "\"Male/female\" vs. \"man/woman\" before a noun", "b": "When \"male\" or \"female\" is placed before a noun, it describes a characteristic or attribute of that thing.\n\nFemale watch [a watch designed for females]\nFemale doctor [a doctor's practice/product aimed at females]\nMale shoes [shoes designed for males]\n\nWhen \"man\" or \"woman\" is placed before a noun, it describes the profession or role of the person.\n\nMan soldier [the soldier is a man]\nWoman student [the student is a woman]\nWoman doctor [the doctor is a woman]\n\nShe went to a female doctor. [Correct]\nRaj went to a female doctor to get himself treated. [Incorrect — since Raj is describing the doctor's profession, not a product]\nRaj went to a woman doctor to get himself treated. [Correct]", "expl": "When \"male\" or \"female\" is placed before a noun, it describes a characteristic or attribute of that thing.\n\nWhen \"man\" or \"woman\" is placed before a noun, it describes the profession or role of the person.", "ex": ["Female watch [a watch designed for females]", "Female doctor [a doctor's practice/product aimed at females]", "Male shoes [shoes designed for males]", "Man soldier [the soldier is a man]", "Woman student [the student is a woman]", "Woman doctor [the doctor is a woman]", "She went to a female doctor. [Correct]", "Raj went to a female doctor to get himself treated. [Incorrect — since Raj is describing the doctor's profession, not a product]", "Raj went to a woman doctor to get himself treated. [Correct]"]}, {"n": 68, "t": "The Antecedent rule", "b": "The noun or pronoun that comes just before a relative pronoun is called an antecedent.\n\nRam met him who they say has helped us. [\"him\" is the antecedent]\nHe saw her whom everyone admires. [\"her\" is the antecedent]\n\n*NOTE: When there is no antecedent in the sentence, we use \"whoever,\" \"whomever,\" etc. as the relative pronoun instead.\n\nRam met whoever they have helped. [No antecedent needed]\nHe saw whomever everyone admires. [No antecedent needed]", "expl": "The noun or pronoun that comes just before a relative pronoun is called an antecedent.\n\n*NOTE: When there is no antecedent in the sentence, we use \"whoever,\" \"whomever,\" etc. as the relative pronoun instead.", "ex": ["Ram met him who they say has helped us. [\"him\" is the antecedent]", "He saw her whom everyone admires. [\"her\" is the antecedent]", "Ram met whoever they have helped. [No antecedent needed]", "He saw whomever everyone admires. [No antecedent needed]"]}, {"n": 69, "t": "Question tags — basic rule", "b": "A question tag is a short question added to the end of a statement. A question tag for a positive statement is always negative, and vice versa.\n\nHe has worked very hard on this project, hasn't he? [Negative tag for a positive statement]\nHe has not worked hard on this project, has he? [Positive tag for a negative statement]", "expl": "A question tag is a short question added to the end of a statement. A question tag for a positive statement is always negative, and vice versa.", "ex": ["He has worked very hard on this project, hasn't he? [Negative tag for a positive statement]", "He has not worked hard on this project, has he? [Positive tag for a negative statement]"]}, {"n": 70, "t": "Question tags — common error with 'am'", "b": "Iam working very hard for my students, amn't I? [Incorrect — \"amn't\" doesn't exist]\nI am working very hard for my students, aren't I? [Correct]\nI am getting better at this, aren't I? [Correct]", "expl": "", "ex": ["Iam working very hard for my students, amn't I? [Incorrect — \"amn't\" doesn't exist]", "I am working very hard for my students, aren't I? [Correct]", "I am getting better at this, aren't I? [Correct]"]}, {"n": 71, "t": "Question tags after negative adverbs", "b": "Words like \"seldom,\" \"barely,\" \"hardly,\" \"scarcely,\" and \"never\" carry a negative meaning, so the statement should be followed by a positive question tag.\n\nHe seldom comes to my house, does he?\nThey have barely enough to pay the rent this month, have they?\nI never realized you knew my brother, did I?\nWe hardly ever go to concerts, do we?\nI seldom drive my car into the city, do I?\nI scarcely registered the fact that he was there, did I?", "expl": "Words like \"seldom,\" \"barely,\" \"hardly,\" \"scarcely,\" and \"never\" carry a negative meaning, so the statement should be followed by a positive question tag.", "ex": ["He seldom comes to my house, does he?", "They have barely enough to pay the rent this month, have they?", "I never realized you knew my brother, did I?", "We hardly ever go to concerts, do we?", "I seldom drive my car into the city, do I?", "I scarcely registered the fact that he was there, did I?"]}, {"n": 72, "t": "Question tags must match the tense of the statement", "b": "The question tag must be in the same tense as the main statement.\n\nI am doing the work which you gave me, don't I? [Incorrect]\nI am doing the work which you gave me, aren't I? [Correct]\n\nThe first version is wrong because the main statement is in the Present Continuous tense, which the tag doesn't follow — \"don't\" doesn't match \"am doing.\"", "expl": "The question tag must be in the same tense as the main statement.\n\nThe first version is wrong because the main statement is in the Present Continuous tense, which the tag doesn't follow — \"don't\" doesn't match \"am doing.\"", "ex": ["I am doing the work which you gave me, don't I? [Incorrect]", "I am doing the work which you gave me, aren't I? [Correct]"]}, {"n": 73, "t": "Question tags with 'each' or 'every'", "b": "When \"each\" or \"every\" is used in the main statement, it's followed by a singular noun/pronoun and singular verb. But in the question tag, the noun/pronoun following \"each\" or \"every\" is treated as plural, so the tag uses a plural verb.\n\nEvery girl is very talented, isn't she? [Incorrect]\nEvery girl is very talented, aren't they? [Correct]\nEach one has to work hard to make both ends meet, hasn't he? [Incorrect]\nEach one has to work hard to make both ends meet, haven't they? [Correct]", "expl": "When \"each\" or \"every\" is used in the main statement, it's followed by a singular noun/pronoun and singular verb. But in the question tag, the noun/pronoun following \"each\" or \"every\" is treated as plural, so the tag uses a plural verb.", "ex": ["Every girl is very talented, isn't she? [Incorrect]", "Every girl is very talented, aren't they? [Correct]", "Each one has to work hard to make both ends meet, hasn't he? [Incorrect]", "Each one has to work hard to make both ends meet, haven't they? [Correct]"]}, {"n": 74, "t": "Question tags with collective nouns", "b": "When a collective noun in the main statement refers to the group acting/behaving as one unit, we treat everything as singular in the tag. If the group's members are doing different things, we treat everything as plural.\n\nThe jury has taken the decision, hasn't it? [Only one decision is taken as a body]\nThe audience took the seats, didn't they? [Each member took their own seat]\nThe army changed the uniforms, didn't they? [Each soldier changed their own uniform]", "expl": "When a collective noun in the main statement refers to the group acting/behaving as one unit, we treat everything as singular in the tag. If the group's members are doing different things, we treat everything as plural.", "ex": ["The jury has taken the decision, hasn't it? [Only one decision is taken as a body]", "The audience took the seats, didn't they? [Each member took their own seat]", "The army changed the uniforms, didn't they? [Each soldier changed their own uniform]"]}, {"n": 75, "t": "Question tags for imperative/proposal sentences: \"shall we\"", "b": "For imperative sentences that are really proposals (\"let us...\"), the question tag is always \"shall we.\"\n\nLet us go for a walk, don't we? [Incorrect]\nLet us go for a walk, shall we? [Correct]\nLet us consider all the possibilities, shall we? [Correct]\nLet us hear from Sue at our travel desk, shall we? [Correct]\nLet us go out to dinner, shall we? [Correct]", "expl": "For imperative sentences that are really proposals (\"let us...\"), the question tag is always \"shall we.\"", "ex": ["Let us go for a walk, don't we? [Incorrect]", "Let us go for a walk, shall we? [Correct]", "Let us consider all the possibilities, shall we? [Correct]", "Let us hear from Sue at our travel desk, shall we? [Correct]", "Let us go out to dinner, shall we? [Correct]"]}, {"n": 76, "t": "Prepositions \"in\", \"on\", and \"at\" (place and time)", "b": "\"In\" refers to towns, cities, and countries in a wider sense (in Delhi, in Dubai, in Saudi Arabia). \"At\" is used for comparatively smaller, specific places (at Rohini in Delhi, at Laxmi Nagar).\n\nConcept: \"In\" implies area/volume, \"on\" implies surface, \"at\" implies a point.\n\nFollowing that logic, for time expressions we move from smallest to largest unit:\n\nAt (point of time) < on (day) < in (month) < in (year)\n\nAt 4 p.m. / On Sunday / In 1947 / On 15th August / In April / At night / In the morning.\n\nThere's a meeting at 2.30 this afternoon.\nAre you free at lunchtime?\nHair salons don't usually open on Sundays.\nMy birthday is on 30 May.\nI started working here in 2009.\nWe are going to Italy in April.\nBye, see you in the morning.\n\n*NOTE: Certain time expressions take no preposition at all: {{last Monday, coming Monday, today, tomorrow, yesterday}}, etc.\n\nI am having dinner with Rachel tomorrow night.\nI saw her yesterday afternoon.\nI have a checklist of things that I must do today.\nThe weather forecast said it would be fine and dry this coming Monday.", "expl": "\"In\" refers to towns, cities, and countries in a wider sense (in Delhi, in Dubai, in Saudi Arabia). \"At\" is used for comparatively smaller, specific places (at Rohini in Delhi, at Laxmi Nagar).\n\nConcept: \"In\" implies area/volume, \"on\" implies surface, \"at\" implies a point.\n\nFollowing that logic, for time expressions we move from smallest to largest unit:\n\nAt (point of time) < on (day) < in (month) < in (year)\n\nAt 4 p.m. / On Sunday / In 1947 / On 15th August / In April / At night / In the morning.\n\n*NOTE: Certain time expressions take no preposition at all: {{last Monday, coming Monday, today, tomorrow, yesterday}}, etc.", "ex": ["There's a meeting at 2.30 this afternoon.", "Are you free at lunchtime?", "Hair salons don't usually open on Sundays.", "My birthday is on 30 May.", "I started working here in 2009.", "We are going to Italy in April.", "Bye, see you in the morning.", "I am having dinner with Rachel tomorrow night.", "I saw her yesterday afternoon.", "I have a checklist of things that I must do today.", "The weather forecast said it would be fine and dry this coming Monday."]}, {"n": 77, "t": "\"Both\" is followed by \"and\", not \"as well as\"", "b": "The conjunction \"both\" is always paired with \"and\" — never with \"as well as.\"\n\nBoth Ram as well as Shyam are good at English. [Incorrect]\nBoth Ram and Shyam are good at English. [Correct]\nBoth men as well as women have complained about the advertisement. [Incorrect]\nBoth men and women have complained about the advertisement. [Correct]\nI felt both happy as well as sad at the same time. [Incorrect]\nI felt both happy and sad at the same time. [Correct]\n\n*NOTE: The word \"good\" is always followed by the preposition \"at.\"\n\nShe is very good at geography.\nRohan is good at football.", "expl": "The conjunction \"both\" is always paired with \"and\" — never with \"as well as.\"\n\n*NOTE: The word \"good\" is always followed by the preposition \"at.\"", "ex": ["Both Ram as well as Shyam are good at English. [Incorrect]", "Both Ram and Shyam are good at English. [Correct]", "Both men as well as women have complained about the advertisement. [Incorrect]", "Both men and women have complained about the advertisement. [Correct]", "I felt both happy as well as sad at the same time. [Incorrect]", "I felt both happy and sad at the same time. [Correct]", "She is very good at geography.", "Rohan is good at football."]}, {"n": 78, "t": "\"Lest\" (meaning \"otherwise\")", "b": "\"Lest\" means \"otherwise\" or \"for fear that.\" It is always followed by either \"should\" or no helping verb at all.\n\nWork hard, lest you would fail. [Incorrect]\nWork hard, lest you fail. [Correct]\nWork hard, lest you should fail. [Correct]\nHe cut the remark out of the final program lest it should offend listeners. [Correct]", "expl": "\"Lest\" means \"otherwise\" or \"for fear that.\" It is always followed by either \"should\" or no helping verb at all.", "ex": ["Work hard, lest you would fail. [Incorrect]", "Work hard, lest you fail. [Correct]", "Work hard, lest you should fail. [Correct]", "He cut the remark out of the final program lest it should offend listeners. [Correct]"]}, {"n": 79, "t": "\"Until\" (time-oriented) vs. \"unless\" (action-oriented)", "b": "\"Until\" relates to time; \"unless\" relates to a condition/action.\n\nWait for me until sunset. [Time]\nUnless the government reduces the tax, the tax-payer base will not increase. [Action/condition]\nI was up until three o'clock trying to get it finished! [Time]\nUnless you call me to say you're not coming, I will see you at the theatre. [Action/condition]\n\n*NOTE: \"Till\" and \"until\" mean the same thing (\"up to the time that\"), but \"till\" cannot be used at the start of a sentence, unlike \"until.\"\n\nUntil your next birthday, you will have to wait for a new bike. [Correct]\nWe did not eat till past midnight. [Correct — \"till\" mid-sentence is fine]", "expl": "\"Until\" relates to time; \"unless\" relates to a condition/action.\n\n*NOTE: \"Till\" and \"until\" mean the same thing (\"up to the time that\"), but \"till\" cannot be used at the start of a sentence, unlike \"until.\"", "ex": ["Wait for me until sunset. [Time]", "Unless the government reduces the tax, the tax-payer base will not increase. [Action/condition]", "I was up until three o'clock trying to get it finished! [Time]", "Unless you call me to say you're not coming, I will see you at the theatre. [Action/condition]", "Until your next birthday, you will have to wait for a new bike. [Correct]", "We did not eat till past midnight. [Correct — \"till\" mid-sentence is fine]"]}, {"n": 80, "t": "Error of Parallelism", "b": "The rule of Parallelism says that sentence elements that are alike in function should also be alike in grammatical form/construction.\n\nExamples of parallel elements:\nWords ({{thinking, running}}); Infinitives ({{to see, to understand}}); Prepositional phrases ({{at the time, in the house}}); Subordinate clauses ({{because I care, after they met}}); Linking word pairs ({{not only...but also..., either...or..., neither...nor..., if...then...}}); Nouns ({{honesty, originality, goodness}}); Adjectives ({{charming, courteous, beautiful}}).\n\nI like singing, dancing, and to walk. [Incorrect]\nI like singing, dancing, and walking. [Correct]\nHe asked his mother to cook, to rest and prepare the dish. [Incorrect]\nHe asked his mother to cook, to rest and to prepare the dish. [Correct]\nMy friends never judged me by my words or what I did. [Incorrect]\nMy friends never judged me by my words or my actions. [Correct]\nThe teacher not only wants his students to keep quiet but also to do the task. [Incorrect]\nThe teacher wants his students not only to keep quiet but also to do the task. [Correct]\nI like to read books over watching movies. [Incorrect]\nI like reading books over watching movies. [Correct]\nI would rather pay for my education than financial aid. [Incorrect]\nI would rather pay for my education than receive financial aid. [Correct]\nTom is known for his honesty and original ideas. [Incorrect]\nTom is known for his honesty and originality. [Correct]\nTo learn is understanding the world. [Incorrect]\nTo learn is to understand the world. [Correct]\nThis task can be done individually, in pairs, or can be done in groups of four. [Incorrect]\nThis task can be done individually, in pairs, or in groups of four. [Correct]", "expl": "The rule of Parallelism says that sentence elements that are alike in function should also be alike in grammatical form/construction.", "ex": ["Examples of parallel elements:", "Words ({{thinking, running}}); Infinitives ({{to see, to understand}}); Prepositional phrases ({{at the time, in the house}}); Subordinate clauses ({{because I care, after they met}}); Linking word pairs ({{not only...but also..., either...or..., neither...nor..., if...then...}}); Nouns ({{honesty, originality, goodness}}); Adjectives ({{charming, courteous, beautiful}}).", "I like singing, dancing, and to walk. [Incorrect]", "I like singing, dancing, and walking. [Correct]", "He asked his mother to cook, to rest and prepare the dish. [Incorrect]", "He asked his mother to cook, to rest and to prepare the dish. [Correct]", "My friends never judged me by my words or what I did. [Incorrect]", "My friends never judged me by my words or my actions. [Correct]", "The teacher not only wants his students to keep quiet but also to do the task. [Incorrect]", "The teacher wants his students not only to keep quiet but also to do the task. [Correct]", "I like to read books over watching movies. [Incorrect]", "I like reading books over watching movies. [Correct]", "I would rather pay for my education than financial aid. [Incorrect]", "I would rather pay for my education than receive financial aid. [Correct]", "Tom is known for his honesty and original ideas. [Incorrect]", "Tom is known for his honesty and originality. [Correct]", "To learn is understanding the world. [Incorrect]", "To learn is to understand the world. [Correct]", "This task can be done individually, in pairs, or can be done in groups of four. [Incorrect]", "This task can be done individually, in pairs, or in groups of four. [Correct]"]}, {"n": 81, "t": "Using the exact/proper preposition", "b": "It's important to use the precise preposition that idiomatically follows each word — especially when two coordinated words each need a different preposition.\n\nHe is superior to and older than me. [\"superior\" takes \"to\"; \"older\" takes \"than\"]\nThis book is different from and better than that book. [\"different\" takes \"from\"; \"better\" takes \"than\"]\n\nSome more idiomatic pairings:\nNobody seems to have responsibility for the budget.\nWhat's the reason for your unhappiness?\nThere's been a steady increase in the value of the euro.\nMy reaction to it all was to try to forget it.\nHer response to the criticism was very strong.\n18 is the age at which you are allowed to vote.\nThe police inquiry into the theft continues.\nShe did some research into the causes of back pain.\nWe need to find another way of doing things.\nI saw an advertisement for a teaching job in Malawi which looked interesting.\nThere is a growing awareness of the impact of climate change among the young.\nI'd like to do a course in computer programming if I could find a good one.\nDo you have any previous experience of working with children?\nHe has an amazing knowledge of European history.\nCan anyone become a member of your book club?\nI was a newcomer to windsurfing so I was very nervous.\nThe visit to the temple was the high point of the holiday.", "expl": "It's important to use the precise preposition that idiomatically follows each word — especially when two coordinated words each need a different preposition.", "ex": ["He is superior to and older than me. [\"superior\" takes \"to\"; \"older\" takes \"than\"]", "This book is different from and better than that book. [\"different\" takes \"from\"; \"better\" takes \"than\"]", "Some more idiomatic pairings:", "Nobody seems to have responsibility for the budget.", "What's the reason for your unhappiness?", "There's been a steady increase in the value of the euro.", "My reaction to it all was to try to forget it.", "Her response to the criticism was very strong.", "18 is the age at which you are allowed to vote.", "The police inquiry into the theft continues.", "She did some research into the causes of back pain.", "We need to find another way of doing things.", "I saw an advertisement for a teaching job in Malawi which looked interesting.", "There is a growing awareness of the impact of

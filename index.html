climate change among the young.", "I'd like to do a course in computer programming if I could find a good one.", "Do you have any previous experience of working with children?", "He has an amazing knowledge of European history.", "Can anyone become a member of your book club?", "I was a newcomer to windsurfing so I was very nervous.", "The visit to the temple was the high point of the holiday."]}, {"n": 82, "t": "\"too much\" (adjective) vs. \"much too\" (adverb)", "b": "\"Much\" indicates a large quantity of an uncountable noun. When preceded by \"too,\" we get \"too much + uncountable noun\" (an adjective use, describing an excessive quantity).\n\nA related but less common construction pairs \"much\" with an adjective: \"much too + adjective\" (an adverb use), where \"much\" intensifies \"too\" (roughly meaning \"far too\").\n\nHe is too much strong. [Incorrect]\nHe is much too strong. [Correct]\nThere is much too sugar. [Incorrect]\nThere is too much sugar. [Correct]\n\n\"Strong\" is an adjective, so it needs \"much too\"; \"sugar\" is a noun, so it needs \"too much.\"\n\nHe drank too much alcohol last night, and this morning he feels ill. [Adjective use]\nToo much work and not enough play make Jack a dull boy. [Adjective use]\nThis car is much too expensive for me to buy. [Adverb use]\nThis case is much too heavy; you can't carry it! [Adverb use]", "expl": "\"Much\" indicates a large quantity of an uncountable noun. When preceded by \"too,\" we get \"too much + uncountable noun\" (an adjective use, describing an excessive quantity).\n\nA related but less common construction pairs \"much\" with an adjective: \"much too + adjective\" (an adverb use), where \"much\" intensifies \"too\" (roughly meaning \"far too\").\n\n\"Strong\" is an adjective, so it needs \"much too\"; \"sugar\" is a noun, so it needs \"too much.\"", "ex": ["He is too much strong. [Incorrect]", "He is much too strong. [Correct]", "There is much too sugar. [Incorrect]", "There is too much sugar. [Correct]", "He drank too much alcohol last night, and this morning he feels ill. [Adjective use]", "Too much work and not enough play make Jack a dull boy. [Adjective use]", "This car is much too expensive for me to buy. [Adverb use]", "This case is much too heavy; you can't carry it! [Adverb use]"]}, {"n": 83, "t": "Possessive case is always followed by a noun", "b": "His belongings were lost. [Correct]\nHis earnings are not enough. [Correct]\nHis surroundings are not clean. [Correct]\n\nAll three words following the possessive \"his\" — belongings, earnings, surroundings — are nouns.\n\nSome nouns that are always plural: {{riches, premises, spectacles, bowels, valuables, proceeds, alms, billiards, movables, wages, thanks, annals, measles, trousers, goods, socks, fetters, shorts, pantaloons, tidings, mumps, eatables, scissors, stockings, surroundings, breeches, arms, tongs}}.\n\n*NOTE: Some verbs become nouns simply by adding \"s\": belong → belongings, earn → earnings, surround → surroundings.\n\nAll his goods were sold at throw-away prices.\nSpectacles have been broken.\nKindly give me a pair of scissors.", "expl": "All three words following the possessive \"his\" — belongings, earnings, surroundings — are nouns.\n\nSome nouns that are always plural: {{riches, premises, spectacles, bowels, valuables, proceeds, alms, billiards, movables, wages, thanks, annals, measles, trousers, goods, socks, fetters, shorts, pantaloons, tidings, mumps, eatables, scissors, stockings, surroundings, breeches, arms, tongs}}.\n\n*NOTE: Some verbs become nouns simply by adding \"s\": belong → belongings, earn → earnings, surround → surroundings.", "ex": ["His belongings were lost. [Correct]", "His earnings are not enough. [Correct]", "His surroundings are not clean. [Correct]", "All his goods were sold at throw-away prices.", "Spectacles have been broken.", "Kindly give me a pair of scissors."]}, {"n": 84, "t": "The word \"politics\"", "b": "When \"politics\" refers to a field/subject, it is treated as singular. When it refers to a set of political beliefs, it is treated as plural.\n\nPolitics is a very dirty game. [The field — singular]\nHis politics are different from mine. [His beliefs — plural]\nHer politics have become more liberal over the past few years. [Plural]\nHis politics are generally considered to be right of centre. [Plural]\nPolitics is the main subject at Leicester University. [Singular]\nJoe is very active in left-wing politics. [Singular, as a field of activity]", "expl": "When \"politics\" refers to a field/subject, it is treated as singular. When it refers to a set of political beliefs, it is treated as plural.", "ex": ["Politics is a very dirty game. [The field — singular]", "His politics are different from mine. [His beliefs — plural]", "Her politics have become more liberal over the past few years. [Plural]", "His politics are generally considered to be right of centre. [Plural]", "Politics is the main subject at Leicester University. [Singular]", "Joe is very active in left-wing politics. [Singular, as a field of activity]"]}, {"n": 85, "t": "\"Mathematics\" and \"Statistics\"", "b": "When \"mathematics\" or \"statistics\" refers to the subject/field, they're treated as uncountable and singular. When \"mathematics\" means \"calculations\" or \"statistics\" means \"data,\" they take a plural verb.\n\nMathematics is an interesting subject. [The subject]\nMathematics are telling that he has made a lot of money. [Meaning \"calculations\"]\nStatistics is difficult to understand. [The subject]\nStatistics tell us that it will rain today. [Meaning \"data\"]\n\n*NOTE: \"Data\" is itself a plural noun; its singular form is \"datum.\"\n\nData warns us and we will have to change our strategy. [Incorrect]\nData warn us and we will have to change our strategy. [Correct]\n\n*NOTE: \"Summons\" is a singular noun (a verb form also exists: to summon). Its plural is \"summonses.\"\n\nTwo summons were issued. [Incorrect]\nTwo summonses were issued. [Correct]", "expl": "When \"mathematics\" or \"statistics\" refers to the subject/field, they're treated as uncountable and singular. When \"mathematics\" means \"calculations\" or \"statistics\" means \"data,\" they take a plural verb.\n\n*NOTE: \"Data\" is itself a plural noun; its singular form is \"datum.\"\n\n*NOTE: \"Summons\" is a singular noun (a verb form also exists: to summon). Its plural is \"summonses.\"", "ex": ["Mathematics is an interesting subject. [The subject]", "Mathematics are telling that he has made a lot of money. [Meaning \"calculations\"]", "Statistics is difficult to understand. [The subject]", "Statistics tell us that it will rain today. [Meaning \"data\"]", "Data warns us and we will have to change our strategy. [Incorrect]", "Data warn us and we will have to change our strategy. [Correct]", "Two summons were issued. [Incorrect]", "Two summonses were issued. [Correct]"]}, {"n": 86, "t": "The article \"a\" (possessive) vs. \"the\" (objective)", "b": "We use \"a\" to mean \"one of many,\" and \"the\" to mean \"the only one.\" We also pair \"a\" with the possessive case, and \"the\" with the objective case, when rephrasing \"my X\" as \"X of me/mine.\"\n\nThe brother of me is a scientist. [Objective case — awkward/incorrect usage]\nA brother of mine is a scientist. [Possessive case — correct, and implies there are several brothers]\n\n\"The brother of me\" suggests there's only one brother; \"a brother of mine\" suggests there are several.\n\nA servant of theirs lives in Delhi. [Correct]\nThe servant of them lives in Delhi. [Awkward]\n\n*NOTE: Some equivalent possessive rewrites:\nMy car → a car of mine\nMy brother → a brother of mine\nOne of my brothers → a brother of mine", "expl": "We use \"a\" to mean \"one of many,\" and \"the\" to mean \"the only one.\" We also pair \"a\" with the possessive case, and \"the\" with the objective case, when rephrasing \"my X\" as \"X of me/mine.\"\n\n\"The brother of me\" suggests there's only one brother; \"a brother of mine\" suggests there are several.\n\n*NOTE: Some equivalent possessive rewrites:\nMy car → a car of mine\nMy brother → a brother of mine\nOne of my brothers → a brother of mine", "ex": ["The brother of me is a scientist. [Objective case — awkward/incorrect usage]", "A brother of mine is a scientist. [Possessive case — correct, and implies there are several brothers]", "A servant of theirs lives in Delhi. [Correct]", "The servant of them lives in Delhi. [Awkward]"]}, {"n": 87, "t": "\"too\", \"as well\", and \"also\"", "b": "When adding some extra information to a sentence, we use \"too,\" \"as well,\" or \"also.\" \"Also\" cannot be placed at the end of a sentence, but \"too\" and \"as well\" can.\n\nI have brought a bag too. [Correct]\nI have brought a bag as well. [Correct]\nI have brought a bag also. [Incorrect]\nI have also brought a bag. [Correct]\n\n*NOTE: In a different sense, \"too\" (like \"so\") can give a negative feel to a sentence — indicating an excessive degree — and in that sense it cannot stand alone at the end without qualification.\n\nShe is too beautiful. [Incomplete/incorrect on its own — \"too\" here needs a following clause]\nShe is very beautiful. [Correct]\nIt is too hot to go outside. [Correct — \"too\" + infinitive clause]\nIt is so hot that I cannot go outside. [Correct]\nThe question was too difficult to solve. [Correct]", "expl": "When adding some extra information to a sentence, we use \"too,\" \"as well,\" or \"also.\" \"Also\" cannot be placed at the end of a sentence, but \"too\" and \"as well\" can.\n\n*NOTE: In a different sense, \"too\" (like \"so\") can give a negative feel to a sentence — indicating an excessive degree — and in that sense it cannot stand alone at the end without qualification.", "ex": ["I have brought a bag too. [Correct]", "I have brought a bag as well. [Correct]", "I have brought a bag also. [Incorrect]", "I have also brought a bag. [Correct]", "She is too beautiful. [Incomplete/incorrect on its own — \"too\" here needs a following clause]", "She is very beautiful. [Correct]", "It is too hot to go outside. [Correct — \"too\" + infinitive clause]", "It is so hot that I cannot go outside. [Correct]", "The question was too difficult to solve. [Correct]"]}, {"n": 88, "t": "Optative sentences", "b": "An optative sentence expresses a prayer, a keen wish, or a curse. It typically begins with \"may\" or \"wish\" (sometimes \"may\" is hidden/implied). In optative sentences, we use the base form of the verb (V1) regardless of whether the subject is singular or plural.\n\nMay God bless you!\nLong live the king.\nMay the almighty help in this tragedy!\nWish you a happy journey together.", "expl": "An optative sentence expresses a prayer, a keen wish, or a curse. It typically begins with \"may\" or \"wish\" (sometimes \"may\" is hidden/implied). In optative sentences, we use the base form of the verb (V1) regardless of whether the subject is singular or plural.", "ex": ["May God bless you!", "Long live the king.", "May the almighty help in this tragedy!", "Wish you a happy journey together."]}, {"n": 89, "t": "Pseudo subjects", "b": "When a sentence needs to talk about something (like weather or a situation) that has no real grammatical subject of its own, we supply an artificial \"pseudo subject\" — usually \"it\" — to complete the sentence.\n\nBeing a rainy day, I did not go to school. [Incorrect — \"rainy day\" has no subject of its own]\nIt being a rainy day, I did not go to school. [Correct — \"it\" is the pseudo subject for \"rainy day\"]\n\nBeing ill, he did not come to class. [Correct — no pseudo subject needed, since \"he\" already covers both parts]\n\nBeing vacant, I did not enter the room. [Incorrect]\nIt being vacant, I did not enter the room. [Correct — \"vacant\" has no relation to \"I,\" so we need \"it\" as a pseudo subject]", "expl": "When a sentence needs to talk about something (like weather or a situation) that has no real grammatical subject of its own, we supply an artificial \"pseudo subject\" — usually \"it\" — to complete the sentence.\n\nBeing ill, he did not come to class. [Correct — no pseudo subject needed, since \"he\" already covers both parts]", "ex": ["Being a rainy day, I did not go to school. [Incorrect — \"rainy day\" has no subject of its own]", "It being a rainy day, I did not go to school. [Correct — \"it\" is the pseudo subject for \"rainy day\"]", "Being vacant, I did not enter the room. [Incorrect]", "It being vacant, I did not enter the room. [Correct — \"vacant\" has no relation to \"I,\" so we need \"it\" as a pseudo subject]"]}, {"n": 90, "t": "An infinitive describing a noun needs a preposition", "b": "Whenever an infinitive (\"to + V1\") in a sentence describes/refers back to a noun, it must be followed by an appropriate preposition.\n\nThe child has no bed to sleep in. [Infinitive describes the noun \"bed\"]\nI have a pen to write with. [Infinitive describes the noun \"pen\"]\nThe child wanted a toy to play with. [Infinitive describes the noun \"toy\"]", "expl": "Whenever an infinitive (\"to + V1\") in a sentence describes/refers back to a noun, it must be followed by an appropriate preposition.", "ex": ["The child has no bed to sleep in. [Infinitive describes the noun \"bed\"]", "I have a pen to write with. [Infinitive describes the noun \"pen\"]", "The child wanted a toy to play with. [Infinitive describes the noun \"toy\"]"]}, {"n": 91, "t": "Repeating the main verb with two different helping verbs", "b": "When two different helping verbs are needed in a sentence (e.g., one for past, one for future), the main verb must be repeated with each — you cannot share one main verb across two different helping verbs that require different forms.\n\nI have never and will never watch this movie. [Incorrect]\nI have never watched and will never watch this movie. [Correct]", "expl": "When two different helping verbs are needed in a sentence (e.g., one for past, one for future), the main verb must be repeated with each — you cannot share one main verb across two different helping verbs that require different forms.", "ex": ["I have never and will never watch this movie. [Incorrect]", "I have never watched and will never watch this movie. [Correct]"]}, {"n": 92, "t": "Words that are always plural", "b": "Certain words are always treated as plural and take a plural verb: {{belongings, savings, congratulations, scissors, proceeds, surroundings, regards, pliers, tongs, jeans, pyjamas, pantaloons, shorts, contents, outskirts, glasses, clothes, thanks, goggles, premises, earnings, earrings, tidings}}, etc.\n\nHis regards were conveyed to his parents.\nAll proceeds from the auction are donated to charity.\nHis belongings were lost.\nThese scissors are for cutting paper.\nYour clothes are dirty.\nHave you seen my glasses? I want to read the newspaper.\nThe table of contents should not contain any pictures.\nI live on the outskirts of the city.\nMy trousers are dirty. I need to wash them.\nHer thanks were clearly sincere.\nAre those your belongings?\nI would like two glasses of orange juice, please.\nPass me that pair of pliers, please.\nMy spectacles have been broken.", "expl": "Certain words are always treated as plural and take a plural verb: {{belongings, savings, congratulations, scissors, proceeds, surroundings, regards, pliers, tongs, jeans, pyjamas, pantaloons, shorts, contents, outskirts, glasses, clothes, thanks, goggles, premises, earnings, earrings, tidings}}, etc.", "ex": ["His regards were conveyed to his parents.", "All proceeds from the auction are donated to charity.", "His belongings were lost.", "These scissors are for cutting paper.", "Your clothes are dirty.", "Have you seen my glasses? I want to read the newspaper.", "The table of contents should not contain any pictures.", "I live on the outskirts of the city.", "My trousers are dirty. I need to wash them.", "Her thanks were clearly sincere.", "Are those your belongings?", "I would like two glasses of orange juice, please.", "Pass me that pair of pliers, please.", "My spectacles have been broken."]}, {"n": 93, "t": "Words that are always singular", "b": "Certain words look plural but are always treated as singular and require a singular verb: {{Mathematics, Physics, Statistics, News, Economics, Innings, Politics, Athletics, Gymnastics, Gallows, Mechanics, Summons, Classics}}, etc. (see Rules 84 and 85 for exceptions in special senses).\n\nMathematics are a difficult subject. [Incorrect]\nMathematics is a difficult subject. [Correct]\nPolitics are a game of compromise. [Incorrect]\nPolitics is a game of compromise. [Correct]\nThese news were broadcast from All India Radio only yesterday. [Incorrect]\nThis news was broadcast from All India Radio only yesterday. [Correct]", "expl": "Certain words look plural but are always treated as singular and require a singular verb: {{Mathematics, Physics, Statistics, News, Economics, Innings, Politics, Athletics, Gymnastics, Gallows, Mechanics, Summons, Classics}}, etc. (see Rules 84 and 85 for exceptions in special senses).", "ex": ["Mathematics are a difficult subject. [Incorrect]", "Mathematics is a difficult subject. [Correct]", "Politics are a game of compromise. [Incorrect]", "Politics is a game of compromise. [Correct]", "These news were broadcast from All India Radio only yesterday. [Incorrect]", "This news was broadcast from All India Radio only yesterday. [Correct]"]}, {"n": 94, "t": "Uncountable nouns with no plural form", "b": "Words like {{equipment, furniture, jewellery, luggage, machinery, poetry, scenery, information, advice, baggage, and hair}} are uncountable and have no plural form.\n\nHis luggages was booked. [Incorrect]\nHis luggage was booked. [Correct]\nFurniture sets off the beauty of a house. [Incorrect]\nFurniture set off the beauty of a house. [Correct]\nHe has given me good information. [Correct]\nHe has given me a good information. [Incorrect]\nThe poetries Society was founded in 1909. [Incorrect]\nThe Poetry Society was founded in 1909. [Correct]", "expl": "Words like {{equipment, furniture, jewellery, luggage, machinery, poetry, scenery, information, advice, baggage, and hair}} are uncountable and have no plural form.", "ex": ["His luggages was booked. [Incorrect]", "His luggage was booked. [Correct]", "Furniture sets off the beauty of a house. [Incorrect]", "Furniture set off the beauty of a house. [Correct]", "He has given me good information. [Correct]", "He has given me a good information. [Incorrect]", "The poetries Society was founded in 1909. [Incorrect]", "The Poetry Society was founded in 1909. [Correct]"]}, {"n": 95, "t": "Types of conditional sentences (structure table)", "b": "Condition (if-clause) → Result (main clause)\n\nSimple Present → will-future, or a modal (shall/can/may/must) + V1\nSimple Past → would/could/might/should + V1\nPast Perfect → would/could/might/should + have + V3 (past participle)\n\nAs soon as he comes, I will ask him this question.\nWhen he comes, I will ask him this question.\nHad he come earlier, I would have asked him this question.\nIf he studied, he would pass the exam.\n\n(See also Rule 4 for the three classic \"if\" conditional types.)", "expl": "Condition (if-clause) → Result (main clause)\n\n(See also Rule 4 for the three classic \"if\" conditional types.)", "ex": ["Simple Present → will-future, or a modal (shall/can/may/must) + V1", "Simple Past → would/could/might/should + V1", "Past Perfect → would/could/might/should + have + V3 (past participle)", "As soon as he comes, I will ask him this question.", "When he comes, I will ask him this question.", "Had he come earlier, I would have asked him this question.", "If he studied, he would pass the exam."]}, {"n": 96, "t": "Possessive case after 'all' and 'both'", "b": "The possessive case is placed after \"all\" and \"both,\" not before.\n\nMy all students are very talented. [Incorrect]\nAll my students are very talented. [Correct]\nMy both friends are very talented. [Incorrect]\nBoth my friends are very talented. [Correct]", "expl": "The possessive case is placed after \"all\" and \"both,\" not before.", "ex": ["My all students are very talented. [Incorrect]", "All my students are very talented. [Correct]", "My both friends are very talented. [Incorrect]", "Both my friends are very talented. [Correct]"]}, {"n": 97, "t": "More superfluous (redundant) sentence errors", "b": "(1) \"As soon as\" is never followed by \"than\" — \"than\" belongs after \"no sooner.\"\n\nAs soon as I complete the work than I will go to his house. [Incorrect]\nAs soon as I complete the work I will go to his house. [Correct]\nNo sooner had I started mowing the lawn than it started raining. [Correct]\n\n(2) \"As\" is not used together with \"so.\"\n\nAs he was unwell, so he didn't come to the class. [Incorrect]\nAs he was unwell, he didn't come to the class. [Correct]\n\n(3) \"Due to\" is not used together with \"the reason\" (and vice versa) — pick one.\n\nDue to the reason that he is not well, he did not come to the class. [Incorrect]\nHe did not come to the class due to sickness. [Correct]", "expl": "(1) \"As soon as\" is never followed by \"than\" — \"than\" belongs after \"no sooner.\"\n\n(2) \"As\" is not used together with \"so.\"\n\n(3) \"Due to\" is not used together with \"the reason\" (and vice versa) — pick one.", "ex": ["As soon as I complete the work than I will go to his house. [Incorrect]", "As soon as I complete the work I will go to his house. [Correct]", "No sooner had I started mowing the lawn than it started raining. [Correct]", "As he was unwell, so he didn't come to the class. [Incorrect]", "As he was unwell, he didn't come to the class. [Correct]", "Due to the reason that he is not well, he did not come to the class. [Incorrect]", "He did not come to the class due to sickness. [Correct]"]}, {"n": 98, "t": "The word \"quantity\" takes \"small\", not \"little\"/\"few\"", "b": "When the word \"quantity\" appears in a sentence, we cannot use \"little\" or \"few\" with it — only \"small.\"\n\nLittle quantity of food was wasted. [Incorrect]\nFew quantity of food was wasted. [Incorrect]\nA small quantity of food was wasted. [Correct]", "expl": "When the word \"quantity\" appears in a sentence, we cannot use \"little\" or \"few\" with it — only \"small.\"", "ex": ["Little quantity of food was wasted. [Incorrect]", "Few quantity of food was wasted. [Incorrect]", "A small quantity of food was wasted. [Correct]"]}, {"n": 99, "t": "Confusing verb forms: fly, flow, find, found, hang", "b": "V1 → V2 → V3\n\nfly → flew → flown\nflow → flowed → flowed\nfind → found → found\nfound (establish) → founded → founded\nhang (a prisoner) → hanged → hanged\nhang (other things) → hung → hung\n\nThe water overflown from the banks. [Incorrect]\nThe water overflowed from the banks. [Correct]\nThe secretary has found this organization. [Incorrect]\nThe secretary has founded this organization. [Correct]\nThe prisoner was hanged till death. [Correct]\nThe clock was hung on the wall. [Correct]\n\n\"Founded\" is used when something is established or discovered. \"Hanged\" is used specifically for executions; \"hung\" is used for objects like a clock.", "expl": "V1 → V2 → V3\n\n\"Founded\" is used when something is established or discovered. \"Hanged\" is used specifically for executions; \"hung\" is used for objects like a clock.", "ex": ["fly → flew → flown", "flow → flowed → flowed", "find → found → found", "found (establish) → founded → founded", "hang (a prisoner) → hanged → hanged", "hang (other things) → hung → hung", "The water overflown from the banks. [Incorrect]", "The water overflowed from the banks. [Correct]", "The secretary has found this organization. [Incorrect]", "The secretary has founded this organization. [Correct]", "The prisoner was hanged till death. [Correct]", "The clock was hung on the wall. [Correct]"]}, {"n": 100, "t": "Different forms of the verb \"lie\"", "b": "There are two distinct verbs that look alike:\n\n\"Lie\" (to say something untrue): lie → lied → lied\n\"Lay\" (to put something down carefully): lay → laid → laid\n\"Lie\" (to recline / be in a horizontal position): lie → lay → lain\n\nI suspect he lies about his age. [V1 — to say something untrue]\nShe lied to her parents about her new car. [V2]\nHe has never lied to me before, so I have no reason to doubt his word. [V3]\n\nHe lays the old man on the table. [V1 — to put down]\nShe laid the baby on the bed. [V2]\nHe has laid his bag on the ground. [V3]\n\nHe lies awake at night, worrying. [V1 — to recline]\nA pen lay on the desk. [V2]\nWomen have lain down their lives throughout history. [V3]", "expl": "There are two distinct verbs that look alike:", "ex": ["\"Lie\" (to say something untrue): lie → lied → lied", "\"Lay\" (to put something down carefully): lay → laid → laid", "\"Lie\" (to recline / be in a horizontal position): lie → lay → lain", "I suspect he lies about his age. [V1 — to say something untrue]", "She lied to her parents about her new car. [V2]", "He has never lied to me before, so I have no reason to doubt his word. [V3]", "He lays the old man on the table. [V1 — to put down]", "She laid the baby on the bed. [V2]", "He has laid his bag on the ground. [V3]", "He lies awake at night, worrying. [V1 — to recline]", "A pen lay on the desk. [V2]", "Women have lain down their lives throughout history. [V3]"]}, {"n": 101, "t": "\"Die of\" (disease) vs. \"die from\" (reason)", "b": "We use \"die of\" when talking about a disease, and \"die from\" when talking about a cause/reason other than disease.\n\nShe died from overwork. [Reason]\nHe died of cancer. [Disease]\nHe died of tuberculosis. [Disease]\nTrees are dying from acid rain. [Reason]", "expl": "We use \"die of\" when talking about a disease, and \"die from\" when talking about a cause/reason other than disease.", "ex": ["She died from overwork. [Reason]", "He died of cancer. [Disease]", "He died of tuberculosis. [Disease]", "Trees are dying from acid rain. [Reason]"]}, {"n": 102, "t": "\"Beside\" vs. \"besides\"", "b": "\"Beside\" is a preposition meaning \"at the side of, next to.\" \"Besides\" is a linking adverb meaning \"in addition to, also.\"\n\nCome and sit here beside me.\nShe knelt down beside the child.\nDo you play any other sports besides basketball?\nBesides being a doctor, he is also an actor.", "expl": "\"Beside\" is a preposition meaning \"at the side of, next to.\" \"Besides\" is a linking adverb meaning \"in addition to, also.\"", "ex": ["Come and sit here beside me.", "She knelt down beside the child.", "Do you play any other sports besides basketball?", "Besides being a doctor, he is also an actor."]}, {"n": 103, "t": "Adjectives that cannot be used as adverbs", "b": "Words like {{friendly, miserly, cowardly, monthly, yearly, weekly, manly, and orderly}} are adjectives only — they cannot be used as adverbs.\n\nHe behaved friendly. [Incorrect]\nHe behaved in a friendly manner. [Correct]\n\nThis was a particularly brutal and cowardly attack. [Adjective]\nThe workers are paid a miserly $2 a day. [Adjective]\nShe put the letters in three orderly piles. [Adjective]\nThere was a weekly dance on Wednesdays. [Adjective]\nNewspapers are constrained by a yearly licence required from the Home Ministry. [Adjective]\nOther than the monthly meeting, not much is going on at the association. [Adjective]", "expl": "Words like {{friendly, miserly, cowardly, monthly, yearly, weekly, manly, and orderly}} are adjectives only — they cannot be used as adverbs.", "ex": ["He behaved friendly. [Incorrect]", "He behaved in a friendly manner. [Correct]", "This was a particularly brutal and cowardly attack. [Adjective]", "The workers are paid a miserly $2 a day. [Adjective]", "She put the letters in three orderly piles. [Adjective]", "There was a weekly dance on Wednesdays. [Adjective]", "Newspapers are constrained by a yearly licence required from the Home Ministry. [Adjective]", "Other than the monthly meeting, not much is going on at the association. [Adjective]"]}, {"n": 104, "t": "Position of adverbs in a sentence", "b": "An adverb is generally placed in one of three positions: (a) at the start of the sentence, (b) between the helping verb and the main verb, or (c) at the end of the sentence.\n\n*NOTE: An adverb can never be placed between the main verb and its object.\n\nHe comes often to my house. [Incorrect]\nHe often comes to my house. [Correct]\nHe tells always the truth. [Incorrect]\nHe always tells the truth. [Correct]\nSuddenly the phone rang. [Correct]\nHe was probably late for the interview. [Correct]\n\nThere are a few exceptions — adverbs like \"too,\" \"even,\" and \"only\" can be placed almost anywhere in a sentence.", "expl": "An adverb is generally placed in one of three positions: (a) at the start of the sentence, (b) between the helping verb and the main verb, or (c) at the end of the sentence.\n\n*NOTE: An adverb can never be placed between the main verb and its object.\n\nThere are a few exceptions — adverbs like \"too,\" \"even,\" and \"only\" can be placed almost anywhere in a sentence.", "ex": ["He comes often to my house. [Incorrect]", "He often comes to my house. [Correct]", "He tells always the truth. [Incorrect]", "He always tells the truth. [Correct]", "Suddenly the phone rang. [Correct]", "He was probably late for the interview. [Correct]"]}, {"n": 105, "t": "Order of multiple adverbs (MPT rule)", "b": "When multiple adverbs appear in a sentence, they generally follow this order: Manner → Place → Time.\n\nI walked yesterday slowly. [Incorrect order]\nI walked slowly yesterday. [Correct order]\nI have to run quickly (manner) down the street (place) each morning (time) after breakfast. [Correct order]\nImpatiently (manner), I waited by the bank (place) yesterday (time) for my father to arrive. [Correct order]", "expl": "When multiple adverbs appear in a sentence, they generally follow this order: Manner → Place → Time.", "ex": ["I walked yesterday slowly. [Incorrect order]", "I walked slowly yesterday. [Correct order]", "I have to run quickly (manner) down the street (place) each morning (time) after breakfast. [Correct order]", "Impatiently (manner), I waited by the bank (place) yesterday (time) for my father to arrive. [Correct order]"]}, {"n": 106, "t": "\"Very\" vs. \"much\"", "b": "\"Very\" precedes the positive degree of an adjective, and emphasizes the exact quality of a person or thing. \"Much\" means \"large in amount or extent,\" and precedes a comparative degree or a past participle.\n\nIt is very interesting.\nHe is much weaker than Shyam.\nThe girl is very beautiful.\nThe weather changes very quickly.\nI am much better now.\nThey both talk too much.\nHe is much interested in the project.\nThank you so much for your help.\n\n*NOTE: We don't usually use \"very\" to modify superlative adjectives — we use \"much\" or \"by far\" instead. However, \"very\" can be used to emphasize superlatives, and with \"first,\" \"next,\" and \"last.\"\n\nThis is the very best wine I have tasted in my life.\nThis is your very last chance.", "expl": "\"Very\" precedes the positive degree of an adjective, and emphasizes the exact quality of a person or thing. \"Much\" means \"large in amount or extent,\" and precedes a comparative degree or a past participle.\n\n*NOTE: We don't usually use \"very\" to modify superlative adjectives — we use \"much\" or \"by far\" instead. However, \"very\" can be used to emphasize superlatives, and with \"first,\" \"next,\" and \"last.\"", "ex": ["It is very interesting.", "He is much weaker than Shyam.", "The girl is very beautiful.", "The weather changes very quickly.", "I am much better now.", "They both talk too much.", "He is much interested in the project.", "Thank you so much for your help.", "This is the very best wine I have tasted in my life.", "This is your very last chance."]}, {"n": 107, "t": "\"Between\" is followed by \"and\", not \"to\"", "b": "\"Between\" is always followed by \"and\" — never by \"to.\"\n\nHe will distribute these sweets between 4 pm to 5 pm. [Incorrect]\nHe will distribute these sweets between 4 pm and 5 pm. [Correct]\nHe will distribute these sweets from 4 pm to 5 pm. [Correct — \"from...to\" is a separate valid pairing]", "expl": "\"Between\" is always followed by \"and\" — never by \"to.\"", "ex": ["He will distribute these sweets between 4 pm to 5 pm. [Incorrect]", "He will distribute these sweets between 4 pm and 5 pm. [Correct]", "He will distribute these sweets from 4 pm to 5 pm. [Correct — \"from...to\" is a separate valid pairing]"]}, {"n": 108, "t": "Uncountable nouns that take a different meaning in the plural", "b": "Uncountable nouns generally have no plural. However, some take an \"-s\"/\"-es\" ending that doesn't pluralize them in the usual sense — instead, it changes the meaning of the word entirely.\n\nAdvice = suggestion → Advices = information (in some older/legal usage)\nAir = the mixture of gases around the earth → Airs = arrogance/affectation\nWood = timber → Woods = a forest\nIron = a chemical element/metal → Irons = fetters, chains\nForce = strength → Forces = troops/army\nArm = upper limb (part of the body) → Arms = weapons\nPain = ache → Pains = careful effort/trouble taken\nManner = method → Manners = behaviour/etiquette\nCustom = habit → Customs = duties on goods (or a nation's traditions)\nLetter = alphabet character → Letters = learning/literature (also: written correspondence)\nSpectacle = a sight → Spectacles = eyeglasses\nColour = hue → Colours = flags/regimental colours\nMinute = a unit of time → Minutes = the official record of a meeting\nMoral = a lesson → Morals = conduct/ethical behaviour\n\nWood is used in almost all wooden houses. [Timber]\nHe lives in the woods. [Forest]\nA force of ten persons attacked him. [A body of armed men]\nThe Indian Forces are known for their bravery and loyalty. [Troops]\nHe caught the old man by the arm. [Limb]\nPakistan is buying arms from the USA. [Weapons]\nPlease write your telegram in capital letters. [Alphabet characters]\nHe is a man of letters. [Learning]\nThe spectacle was horrible. [Sight]\nMy spectacles have broken. [Eyeglasses]\n\nSome further singular/plural pairs with distinct meanings:\nBrother (son of the same parents) → Brothers, or Brethren (members of the same community/profession)\nCloth (a kind of fabric) → Cloths (kinds/pieces of cloth), or Clothes (garments)\nDie (a stamp for coining) → Dies, or Dice (small cubes for playing games)\nGenius (a talented person) → Geniuses, or Genii (mythical spirits, in the older sense)\nIndex (a table of contents) → Indexes, or Indices (signs used in algebra)\nShot (a throw, stroke, or hit) → Shots, or Shots (firing from a gun — same spelling, context distinguishes)\nFish (considered collectively) → Fish, or Fishes (considered as separate/individual creatures)\n\nOther useful word pairs and their distinct senses:\nHabit (belongs to an individual) vs. Custom (belongs to a society or country) — Mohan is a victim of many bad habits. / The Nigerians have strange customs.\nHouse (a building to live in) vs. Home (the particular house one actually lives in) — This house is made of brick and stone. / You should go home now.\nCause (produces a result) vs. Reason (explains or justifies a cause) — The scientists have not been able to tell the cause of the earthquake. / You have good reason for going to the court.\nAir (what we breathe) vs. Wind (what makes the leaves move) — Water and air sustain life. / Everyone longs for a cool wind in summer.\nMen (plural of \"man,\" used in an ordinary sense) vs. People (persons in general) — Only men of character can make a nation great. / Most of the people are superstitious.\nMan (used in the ordinary sense) vs. Gentleman (a man of character) — The man in the red dress is my cousin. / Mr. Sohanlal is a gentleman.\nCost (amount paid by the shopkeeper/producer) vs. Price (amount paid by the customer) — The cost of production in every field has risen. / What is the price of this pen?\nCustomer (a buyer of goods) vs. Client (one who avails a service) — He is a good customer for a shopkeeper. / That lawyer has plenty of clients.\nShade (a place sheltered from the sun) vs. Shadow (the outline of a form or object) — The peepal tree makes a nice shade. / The lion saw its shadow in the water and roared at it.\nGround (outside the house) vs. Floor (part of a room) — The ground was slippery. / I saw my books lying on the floor.", "expl": "Uncountable nouns generally have no plural. However, some take an \"-s\"/\"-es\" ending that doesn't pluralize them in the usual sense — instead, it changes the meaning of the word entirely.", "ex": ["Advice = suggestion → Advices = information (in some older/legal usage)", "Air = the mixture of gases around the earth → Airs = arrogance/affectation", "Wood = timber → Woods = a forest", "Iron = a chemical element/metal → Irons = fetters, chains", "Force = strength → Forces = troops/army", "Arm = upper limb (part of the body) → Arms = weapons", "Pain = ache → Pains = careful effort/trouble taken", "Manner = method → Manners = behaviour/etiquette", "Custom = habit → Customs = duties on goods (or a nation's traditions)", "Letter = alphabet character → Letters = learning/literature (also: written correspondence)", "Spectacle = a sight → Spectacles = eyeglasses", "Colour = hue → Colours = flags/regimental colours", "Minute = a unit of time → Minutes = the official record of a meeting", "Moral = a lesson → Morals = conduct/ethical behaviour", "Wood is used in almost all wooden houses. [Timber]", "He lives in the woods. [Forest]", "A force of ten persons attacked him. [A body of armed men]", "The Indian Forces are known for their bravery and loyalty. [Troops]", "He caught the old man by the arm. [Limb]", "Pakistan is buying arms from the USA. [Weapons]", "Please write your telegram in capital letters. [Alphabet characters]", "He is a man of letters. [Learning]", "The spectacle was horrible. [Sight]", "My spectacles have broken. [Eyeglasses]", "Some further singular/plural pairs with distinct meanings:", "Brother (son of the same parents) → Brothers, or Brethren (members of the same community/profession)", "Cloth (a kind of fabric) → Cloths (kinds/pieces of cloth), or Clothes (garments)", "Die (a stamp for coining) → Dies, or Dice (small cubes for playing games)", "Genius (a talented person) → Geniuses, or Genii (mythical spirits, in the older sense)", "Index (a table of contents) → Indexes, or Indices (signs used in algebra)", "Shot (a throw, stroke, or hit) → Shots, or Shots (firing from a gun — same spelling, context distinguishes)", "Fish (considered collectively) → Fish, or Fishes (considered as separate/individual creatures)", "Other useful word pairs and their distinct senses:", "Habit (belongs to an individual) vs. Custom (belongs to a society or country) — Mohan is a victim of many bad habits. / The Nigerians have strange customs.", "House (a building to live in) vs. Home (the particular house one actually lives in) — This house is made of brick and stone. / You should go home now.", "Cause (produces a result) vs. Reason (explains or justifies a cause) — The scientists have not been able to tell the cause of the earthquake. / You have good reason for going to the court.", "Air (what we breathe) vs. Wind (what makes the leaves move) — Water and air sustain life. / Everyone longs for a cool wind in summer.", "Men (plural of \"man,\" used in an ordinary sense) vs. People (persons in general) — Only men of character can make a nation great. / Most of the people are superstitious.", "Man (used in the ordinary sense) vs. Gentleman (a man of character) — The man in the red dress is my cousin. / Mr. Sohanlal is a gentleman.", "Cost (amount paid by the shopkeeper/producer) vs. Price (amount paid by the customer) — The cost of production in every field has risen. / What is the price of this pen?", "Customer (a buyer of goods) vs. Client (one who avails a service) — He is a good customer for a shopkeeper. / That lawyer has plenty of clients.", "Shade (a place sheltered from the sun) vs. Shadow (the outline of a form or object) — The peepal tree makes a nice shade. / The lion saw its shadow in the water and roared at it.", "Ground (outside the house) vs. Floor (part of a room) — The ground was slippery. / I saw my books lying on the floor."]}, {"n": 109, "t": "Illogical noun combinations, and some important usage points", "b": "I am an English teacher. [Incorrect — literally suggests \"a teacher from England\"]\nHe is a Mathematics teacher. [Incorrect — literally suggests \"a teacher made of Mathematics\"]\nAll his family members were going to the temple. [Incorrect — literally \"members made of family\"]\n\nThese should be rewritten as:\n\nI am a teacher of English. [Correct]\nHe is a teacher of Mathematics. [Correct]\nAll the members of his family were going to the temple. [Correct]\n\nSome important usage points to remember:\n\"Brother\" or \"sister\" never follows \"cousin\" — there's no such word as \"cousin brother\" or \"cousin sister\"; just use \"cousin.\"\nThere's no word \"pick-pocketer\" — the correct word is \"pick-pocket.\"\n\"Boarding\" alone is wrong — it should be \"boarding house.\"\n\"Poor people\" is wrong in the generic sense — it should just be \"the poor.\"\n\"Signature,\" not the abbreviation \"sign,\" should be used for someone's written name.\nA meal taken once is \"a meal,\" not \"meals\" — \"meals\" (plural) refers to lunch and dinner together, which cannot be eaten at the same time.\n\"Alphabet\" is generally singular, but can be used in the plural when referring to the alphabets of different languages.\n\"Inning\" is not a word — the correct term is \"innings,\" which is always singular.\n\"English teacher\" (meaning \"teacher of English\") is best avoided — say \"the teacher of English.\"\n\"Agendum\" is not used in English; \"agenda\" (the programme of a meeting) is treated as singular.\n\"Mankind\" is not used in the plural.\n\"Room\" (as in spare space, e.g. in a compartment or on a bench) means \"an unoccupied space,\" not a literal room.\n\"Knowledge\" means information gained through learning; \"evidence\" means the means of proving an unknown or disputed fact.\n\"Family members\" is informal/slang — the correct form is \"members of the family.\"\n\"Goodnight\" is a parting salutation, while \"good evening\" is a greeting used from evening until midnight.\n\"Wage,\" in the singular, can sometimes mean \"punishment\" (as in \"the wages of sin\"); in the plural, it means payment/charges for labour.\nAvoid a \"double possessive\" — write \"the son of my uncle's friend\" rather than the clumsier \"my uncle's friend's son.\"", "expl": "These should be rewritten as:", "ex": ["I am an English teacher. [Incorrect — literally suggests \"a teacher from England\"]", "He is a Mathematics teacher. [Incorrect — literally suggests \"a teacher made of Mathematics\"]", "All his family members were going to the temple. [Incorrect — literally \"members made of family\"]", "I am a teacher of English. [Correct]", "He is a teacher of Mathematics. [Correct]", "All the members of his family were going to the temple. [Correct]", "Some important usage points to remember:", "\"Brother\" or \"sister\" never follows \"cousin\" — there's no such word as \"cousin brother\" or \"cousin sister\"; just use \"cousin.\"", "There's no word \"pick-pocketer\" — the correct word is \"pick-pocket.\"", "\"Boarding\" alone is wrong — it should be \"boarding house.\"", "\"Poor people\" is wrong in the generic sense — it should just be \"the poor.\"", "\"Signature,\" not the abbreviation \"sign,\" should be used for someone's written name.", "A meal taken once is \"a meal,\" not \"meals\" — \"meals\" (plural) refers to lunch and dinner together, which cannot be eaten at the same time.", "\"Alphabet\" is generally singular, but can be used in the plural when referring to the alphabets of different languages.", "\"Inning\" is not a word — the correct term is \"innings,\" which is always singular.", "\"English teacher\" (meaning \"teacher of English\") is best avoided — say \"the teacher of English.\"", "\"Agendum\" is not used in English; \"agenda\" (the programme of a meeting) is treated as singular.", "\"Mankind\" is not used in the plural.", "\"Room\" (as in spare space, e.g. in a compartment or on a bench) means \"an unoccupied space,\" not a literal room.", "\"Knowledge\" means information gained through learning; \"evidence\" means the means of proving an unknown or disputed fact.", "\"Family members\" is informal/slang — the correct form is \"members of the family.\"", "\"Goodnight\" is a parting salutation, while \"good evening\" is a greeting used from evening until midnight.", "\"Wage,\" in the singular, can sometimes mean \"punishment\" (as in \"the wages of sin\"); in the plural, it means payment/charges for labour.", "Avoid a \"double possessive\" — write \"the son of my uncle's friend\" rather than the clumsier \"my uncle's friend's son.\""]}, {"n": 110, "t": "Possessive adjectives: 'one's' vs. 'his'", "b": "Possessive adjectives modify a noun to show possession or belonging.\n\nEveryone should do one's duty. [Incorrect]\nEveryone should do his duty. [Correct]\nOne should do his duty. [Incorrect]\nOne should do one's duty. [Correct]\n\n\"One's\" and \"his\" here function as possessive adjectives describing \"duty,\" not as possessive pronouns. We use \"one's\" only when the subject is literally \"one.\" If the subject is \"every,\" \"each,\" etc., we use \"his\" or \"her\" as appropriate.\n\nEvery girl should do her duty. [Gender clearly indicated, so \"her\" is used]\n\nWhen gender is not specified, \"his\" is traditionally given priority (though modern usage increasingly favours \"their\").", "expl": "Possessive adjectives modify a noun to show possession or belonging.\n\n\"One's\" and \"his\" here function as possessive adjectives describing \"duty,\" not as possessive pronouns. We use \"one's\" only when the subject is literally \"one.\" If the subject is \"every,\" \"each,\" etc., we use \"his\" or \"her\" as appropriate.\n\nEvery girl should do her duty. [Gender clearly indicated, so \"her\" is used]\n\nWhen gender is not specified, \"his\" is traditionally given priority (though modern usage increasingly favours \"their\").", "ex": ["Everyone should do one's duty. [Incorrect]", "Everyone should do his duty. [Correct]", "One should do his duty. [Incorrect]", "One should do one's duty. [Correct]"]}, {"n": 111, "t": "\"Fewer\" (countable) vs. \"less\" (uncountable)", "b": "\"Fewer\" is used with countable nouns. \"Less\" is used with uncountable nouns.\n\nNo less than 50 students completed the work. [Incorrect]\nNo fewer than 50 students completed the work. [Correct]\nThere is no fewer than five litres of water in the vessel. [Incorrect]\nThere is no less than five litres of water in the vessel. [Correct]", "expl": "\"Fewer\" is used with countable nouns. \"Less\" is used with uncountable nouns.", "ex": ["No less than 50 students completed the work. [Incorrect]", "No fewer than 50 students completed the work. [Correct]", "There is no fewer than five litres of water in the vessel. [Incorrect]", "There is no less than five litres of water in the vessel. [Correct]"]}, {"n": 112, "t": "Elder/older, later/latter, farther/further, nearest/next, latest/last", "b": "\"Elder\" is used for someone within our own family; \"older\" is used for someone outside the family.\n\nA friend of mine in my company is elder than me. [Incorrect]\nA friend of mine in my company is older than me. [Correct]\nThe elder son of King John, Henry, was nine when his father died. [Correct]\n\n\"Later\" refers to time; \"latter\" refers to the second of two things/people previously mentioned.\n\nBran said that he would call me later.\nThere are two kinds of worries: those you can do something about and those you can't. Don't spend any time on the latter.\n\n\"Farther\" is used for physical distance; \"further\" is used for extra or additional distance/degree.\n\nVillagers saw a temple on the farther side of the river.\nSuman has appealed in the high court for further judgement.\n\n\"Nearest\" refers to space or distance; \"next\" refers to order or position.\n\nDelhi railway station is nearest to my house.\nMr. Gupta lives in the next house.\n\n\"Latest\" is the opposite of \"earliest\" and denotes time; \"last\" is the opposite of \"first\" and denotes order or position.\n\nShe is the last girl to stay in the office.\nWhat is the latest news today?\n\n\"Less\" denotes quantity and is used with a singular uncountable noun; \"fewer\" denotes number and is used with a plural countable noun.\n\nHe has less money than I. [Correct]\nHe has fewer money than I. [Incorrect — money is uncountable]\n\n\"Less\" denotes something smaller in size, measurement, duration, or number; \"lesser\" denotes something not as great in importance or degree as another.\n\nMaths is less difficult than English.\nShe agreed to plead guilty to a lesser charge.", "expl": "\"Elder\" is used for someone within our own family; \"older\" is used for someone outside the family.\n\n\"Later\" refers to time; \"latter\" refers to the second of two things/people previously mentioned.\n\nThere are two kinds of worries: those you can do something about and those you can't. Don't spend any time on the latter.\n\n\"Farther\" is used for physical distance; \"further\" is used for extra or additional distance/degree.\n\n\"Nearest\" refers to space or distance; \"next\" refers to order or position.\n\n\"Latest\" is the opposite of \"earliest\" and denotes time; \"last\" is the opposite of \"first\" and denotes order or position.\n\n\"Less\" denotes quantity and is used with a singular uncountable noun; \"fewer\" denotes number and is used with a plural countable noun.\n\n\"Less\" denotes something smaller in size, measurement, duration, or number; \"lesser\" denotes something not as great in importance or degree as another.", "ex": ["A friend of mine in my company is elder than me. [Incorrect]", "A friend of mine in my company is older than me. [Correct]", "The elder son of King John, Henry, was nine when his father died. [Correct]", "Bran said that he would call me later.", "Villagers saw a temple on the farther side of the river.", "Suman has appealed in the high court for further judgement.", "Delhi railway station is nearest to my house.", "Mr. Gupta lives in the next house.", "She is the last girl to stay in the office.", "What is the latest news today?", "He has less money than I. [Correct]", "He has fewer money than I. [Incorrect — money is uncountable]", "Maths is less difficult than English.", "She agreed to plead guilty to a lesser charge."]}, {"n": 113, "t": "Comparisons must be made on common ground", "b": "When comparing two things, both sides of the comparison must belong to the same category — you can't compare an attribute of one thing directly with the whole of another.\n\nThe weather of Delhi is far better than Mumbai. [Incorrect — comparing \"weather\" with a city]\nThe weather of Delhi is far better than the weather of Mumbai. [Correct]\nThe weather of Delhi is far better than that of Mumbai. [Correct — \"that\" stands in for \"the weather\"]\nThe apples of Shimla are tastier than Ooty. [Incorrect]\nThe apples of Shimla are tastier than those of Ooty. [Correct]", "expl": "When comparing two things, both sides of the comparison must belong to the same category — you can't compare an attribute of one thing directly with the whole of another.", "ex": ["The weather of Delhi is far better than Mumbai. [Incorrect — comparing \"weather\" with a city]", "The weather of Delhi is far better than the weather of Mumbai. [Correct]", "The weather of Delhi is far better than that of Mumbai. [Correct — \"that\" stands in for \"the weather\"]", "The apples of Shimla are tastier than Ooty. [Incorrect]", "The apples of Shimla are tastier than those of Ooty. [Correct]"]}, {"n": 114, "t": "\"One of the\", \"either of\", \"neither of\", \"each of\" + plural noun", "b": "The phrases \"one of the,\" \"either of,\" \"neither of,\" and \"each of\" are always followed by a plural noun (even though the verb itself is typically singular, per Rule 5's structure).\n\nOne of the student was selected to visit NASA. [Incorrect]\nOne of the students was selected to visit NASA. [Correct]\nA person can turn on either of the light bulb. [Incorrect]\nA person can turn on either of the light bulbs. [Correct]\nDo you go to each of the meetings? [Correct]", "expl": "The phrases \"one of the,\" \"either of,\" \"neither of,\" and \"each of\" are always followed by a plural noun (even though the verb itself is typically singular, per Rule 5's structure).", "ex": ["One of the student was selected to visit NASA. [Incorrect]", "One of the students was selected to visit NASA. [Correct]", "A person can turn on either of the light bulb. [Incorrect]", "A person can turn on either of the light bulbs. [Correct]", "Do you go to each of the meetings? [Correct]"]}, {"n": 115, "t": "\"But\", \"except\", \"between\" take the objective case", "b": "When \"but,\" \"except,\" or \"between\" function as prepositions, they must be followed by the objective case of the pronoun ({{me, him, her, you, us, them}}) — never the subjective case (I, he, she, you, we, they).\n\nThere is friendship between you and I. [Incorrect]\nThere is friendship between you and me. [Correct]\nAll but he are going to the party. [Incorrect]\nAll but him are going to the party. [Correct]\nLet he do the work. [Incorrect — \"let\" is a verb, so it takes the objective case after it]\nLet him do the work. [Correct]\nAll except him are going to the party. [Correct]", "expl": "When \"but,\" \"except,\" or \"between\" function as prepositions, they must be followed by the objective case of the pronoun ({{me, him, her, you, us, them}}) — never the subjective case (I, he, she, you, we, they).", "ex": ["There is friendship between you and I. [Incorrect]", "There is friendship between you and me. [Correct]", "All but he are going to the party. [Incorrect]", "All but him are going to the party. [Correct]", "Let he do the work. [Incorrect — \"let\" is a verb, so it takes the objective case after it]", "Let him do the work. [Correct]", "All except him are going to the party. [Correct]"]}, {"n": 116, "t": "Pseudo subject followed by the subjective case", "b": "When a pseudo subject (usually \"it\") is used in a sentence, the pronoun that follows must be in the subjective case, not the objective case.\n\nIt is him who should be blamed. [Incorrect]\nIt is he who should be blamed. [Correct]\n\n*NOTE: A pseudo subject takes the grammatical place of the subject but doesn't fulfil its full role. A true subject satisfies both syntax (structure) and semantics (meaning); a pseudo subject only satisfies the syntax requirement, which is why it's called \"pseudo.\"\n\nIt is a lovely day. [Correct — here, \"day\" is the real subject, and \"it\" is an introductory, pseudo subject]\nIt is us who have defeated the champion. [Incorrect]\nIt is we who have defeated the champion. [Correct]\nIt is me who am guilty. [Incorrect]\nIt is I who am guilty. [Correct]", "expl": "When a pseudo subject (usually \"it\") is used in a sentence, the pronoun that follows must be in the subjective case, not the objective case.\n\n*NOTE: A pseudo subject takes the grammatical place of the subject but doesn't fulfil its full role. A true subject satisfies both syntax (structure) and semantics (meaning); a pseudo subject only satisfies the syntax requirement, which is why it's called \"pseudo.\"", "ex": ["It is him who should be blamed. [Incorrect]", "It is he who should be blamed. [Correct]", "It is a lovely day. [Correct — here, \"day\" is the real subject, and \"it\" is an introductory, pseudo subject]", "It is us who have defeated the champion. [Incorrect]", "It is we who have defeated the champion. [Correct]", "It is me who am guilty. [Incorrect]", "It is I who am guilty. [Correct]"]}, {"n": 117, "t": "\"Such...as\", \"else...but\", \"other/otherwise...than\"", "b": "When \"such\" is used as a determiner, its connector is always \"as.\"\n\"Else\" is always followed by \"but.\"\n\"Other\" and \"otherwise\" are always followed by \"than.\"\n\nHe is such a person that you mentioned. [Incorrect]\nHe is such a person as you mentioned. [Correct]\nSuch a book as this is referred to by a teacher. [Correct]\nThey want nothing else but to have their honour and dignity. [Correct]\nIt was nothing else but sheer madness. [Correct]", "expl": "", "ex": ["When \"such\" is used as a determiner, its connector is always \"as.\"", "\"Else\" is always followed by \"but.\"", "\"Other\" and \"otherwise\" are always followed by \"than.\"", "He is such a person that you mentioned. [Incorrect]", "He is such a person as you mentioned. [Correct]", "Such a book as this is referred to by a teacher. [Correct]", "They want nothing else but to have their honour and dignity. [Correct]", "It was nothing else but sheer madness. [Correct]"]}, {"n": 118, "t": "Avoiding a hissing sound with the possessive apostrophe", "b": "When showing possession with a plural noun that already ends in \"s,\" we don't add an extra \"'s\" if it would create an awkward hissing sound — we just add the apostrophe alone.\n\nGovernment girls's school. [Incorrect]\nGovernment girls' school. [Correct]\n\n*NOTE: The exception is \"else's,\" which is grammatically correct despite the hissing sound.\n\nFor Jesus' sake\nFor peace' sake\nResidents' Welfare Association\nPythagoras' theorem\nFor goodness' sake\nFor justice' sake", "expl": "When showing possession with a plural noun that already ends in \"s,\" we don't add an extra \"'s\" if it would create an awkward hissing sound — we just add the apostrophe alone.\n\n*NOTE: The exception is \"else's,\" which is grammatically correct despite the hissing sound.", "ex": ["Government girls's school. [Incorrect]", "Government girls' school. [Correct]", "For Jesus' sake", "For peace' sake", "Residents' Welfare Association", "Pythagoras' theorem", "For goodness' sake", "For justice' sake"]}, {"n": 119, "t": "No apostrophe with possessive pronouns", "b": "We never use an apostrophe ('s) with pronouns to show possession — it's used only with nouns. Possessive pronouns (yours, hers, its, theirs, ours) are already complete without an apostrophe.\n\nYour's friendly. [Incorrect]\nYours friendly. [Correct]\nThe kids are yours and mine. [Correct]\nWe shall finally have what is rightfully ours. [Correct]\nThe ring is hers. [Correct]\nThe bag is theirs. [Correct]\nTheir mother gets along well with yours. [Correct]", "expl": "We never use an apostrophe ('s) with pronouns to show possession — it's used only with nouns. Possessive pronouns (yours, hers, its, theirs, ours) are already complete without an apostrophe.", "ex": ["Your's friendly. [Incorrect]", "Yours friendly. [Correct]", "The kids are yours and mine. [Correct]", "We shall finally have what is rightfully ours. [Correct]", "The ring is hers. [Correct]", "The bag is theirs. [Correct]", "Their mother gets along well with yours. [Correct]"]}, {"n": 120, "t": "Words that are never followed by a noun", "b": "Certain words — {{afraid, asleep, due, ready, unable, alike, aware, glad, sorry, well, alone, ill, sure, worth}}, etc. — are never directly followed by a noun; they function as predicate adjectives instead.\n\nWe were unable to contact him at the time.\nThe army is said to be ready for action.\nI am glad to know the parcel arrived safely.\nHe likes being alone in the house.\nYour painting has come out really well.\nHe has proved his worth to the team.", "expl": "Certain words — {{afraid, asleep, due, ready, unable, alike, aware, glad, sorry, well, alone, ill, sure, worth}}, etc. — are never directly followed by a noun; they function as predicate adjectives instead.", "ex": ["We were unable to contact him at the time.", "The army is said to be ready for action.", "I am glad to know the parcel arrived safely.", "He likes being alone in the house.", "Your painting has come out really well.", "He has proved his worth to the team."]}]

<script>
(function(){
  "use strict";

  var RULES = JSON.parse(document.getElementById("rules-data").textContent);
  var TOTAL = RULES.length;

  var THEME_KEY = "grammar120_theme";
  var VIEW_KEY = "grammar120_view";
  var COMPACT_KEY = "grammar120_compact";

  function storageGet(key, fallback){
    try {
      var v = window.localStorage.getItem(key);
      return v === null ? fallback : v;
    } catch(e){ return fallback; }
  }
  function storageSet(key, val){
    try { window.localStorage.setItem(key, val); } catch(e){}
  }

  /* ---------------- Theme ---------------- */
  function getPreferredTheme(){
    var stored = storageGet(THEME_KEY, null);
    if (stored === "light" || stored === "dark") return stored;
    var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
    return prefersDark ? "dark" : "light";
  }
  var ICON_SUN = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"></path></svg>';
  var ICON_MOON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>';

  function applyTheme(theme){
    document.documentElement.setAttribute("data-theme", theme);
    var btn = document.getElementById("themeToggle");
    if (btn) btn.innerHTML = theme === "dark" ? ICON_SUN : ICON_MOON;
    storageSet(THEME_KEY, theme);
  }
  var currentTheme = getPreferredTheme();
  applyTheme(currentTheme);
  document.getElementById("themeToggle").addEventListener("click", function(){
    currentTheme = currentTheme === "dark" ? "light" : "dark";
    applyTheme(currentTheme);
  });

  /* ---------------- Escaping & inline formatting ---------------- */
  function escapeHtml(s){
    return s
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;");
  }
  function escapeRegex(s){
    return s.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
  }

  function renderKeywordList(inner){
    var parts = inner.split(",").map(function(p){ return p.trim(); }).filter(Boolean);
    return parts.map(function(p){
      var m = p.match(/^(and\s+)(.*)$/i);
      var prefix = "", word = p;
      if (m){ prefix = m[1]; word = m[2]; }
      if (/^etc\.?$/i.test(word)) return prefix + word;
      return prefix + '<span class="kw">' + word + '</span>';
    }).join(", ");
  }

  function inlineFormat(line){
    var s = escapeHtml(line);
    s = s.replace(/\{\{([^}]+)\}\}/g, function(_, inner){ return renderKeywordList(inner); });
    s = s.replace(/\[Correct\]/g, '<span class="tag correct">&check; Correct</span>');
    s = s.replace(/\[Incorrect([^\]]*)\]/g, '<span class="tag incorrect">&cross; Incorrect$1</span>');
    return s;
  }

  // Explanation text -> HTML. Multi-line "kept" blocks (numbered points,
  // category headers) render as an always-visible structure-list block.
  function renderExpl(text){
    if (!text) return "";
    var paragraphs = text.split(/\n\n+/);
    var html = "";
    paragraphs.forEach(function(p){
      p = p.trim();
      if (!p) return;
      if (/^\*NOTE:/i.test(p)){
        var noteText = p.replace(/^\*NOTE:\s*/i, "");
        html += '<div class="note">' + inlineFormat(noteText) + '</div>';
        return;
      }
      var lines = p.split("\n").map(function(l){return l.trim();}).filter(Boolean);
      if (lines.length > 1){
        html += '<div class="structure-list">' + lines.map(function(l){
          return '<div class="ex-line">' + inlineFormat(l) + '</div>';
        }).join("") + '</div>';
        return;
      }
      html += '<p>' + inlineFormat(p) + '</p>';
    });
    return html;
  }

  // Example lines -> a single collapsible examples block.
  function renderExamples(lines){
    if (!lines || !lines.length) return "";
    return '<div class="examples">' + lines.map(function(l){
      return '<div class="ex-line">' + inlineFormat(l) + '</div>';
    }).join("") + '</div>';
  }

  var ICON_CHEVRON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>';

  /* ---------------- Compact (examples collapsed by default) ---------------- */
  var compactMode = storageGet(COMPACT_KEY, "1") === "1";

  function labelFor(count, expanded){
    return (expanded ? "Hide examples" : "Show examples") + " (" + count + ")";
  }

  /* ---------------- Render TOC + rule cards ---------------- */
  var tocList = document.getElementById("tocList");
  var rulesContainer = document.getElementById("rulesContainer");
  var tocFrag = document.createDocumentFragment();
  var rulesFrag = document.createDocumentFragment();

  var originalTitleHTML = {};
  var originalExplHTML = {};
  var originalExamplesHTML = {};

  RULES.forEach(function(rule){
    var a = document.createElement("a");
    a.className = "toc-item";
    a.href = "#rule-" + rule.n;
    a.dataset.n = rule.n;
    a.dataset.title = rule.t.toLowerCase();
    a.innerHTML = '<span class="toc-num">' + rule.n + '</span><span>' + escapeHtml(rule.t) + '</span>';
    tocFrag.appendChild(a);

    var titleHTML = escapeHtml(rule.t);
    var explHTML = renderExpl(rule.expl);
    var exList = rule.ex || [];
    var examplesHTML = renderExamples(exList);

    originalTitleHTML[rule.n] = titleHTML;
    originalExplHTML[rule.n] = explHTML;
    originalExamplesHTML[rule.n] = examplesHTML;

    var plainText = (rule.n + " " + rule.t + " " + rule.expl + " " + exList.join(" "))
      .replace(/\{\{|\}\}/g, "")
      .replace(/\[(Correct|Incorrect[^\]]*)\]/g, "")
      .toLowerCase();

    var card = document.createElement("article");
    card.className = "rule-card";
    card.id = "rule-" + rule.n;
    card.dataset.n = rule.n;
    card.dataset.search = plainText;

    var innerHTML =
      '<div class="rule-head"><span class="rule-badge">Rule ' + rule.n + '</span><h3>' + titleHTML + '</h3></div>' +
      '<div class="rule-body">' + explHTML + '</div>';

    if (exList.length){
      var expandedNow = !compactMode;
      innerHTML +=
        '<button type="button" class="ex-toggle' + (expandedNow ? ' expanded' : '') + '" data-n="' + rule.n + '">' +
          '<span class="ex-toggle-label">' + labelFor(exList.length, expandedNow) + '</span>' + ICON_CHEVRON +
        '</button>' +
        '<div class="examples-wrap' + (expandedNow ? ' expanded' : '') + '" data-n="' + rule.n + '">' + examplesHTML + '</div>';
    }

    card.innerHTML = innerHTML;
    rulesFrag.appendChild(card);
  });

  tocList.appendChild(tocFrag);
  rulesContainer.appendChild(rulesFrag);
  document.getElementById("totalCount").textContent = TOTAL;

  var tocItems = Array.prototype.slice.call(document.querySelectorAll(".toc-item"));
  var ruleCards = Array.prototype.slice.call(document.querySelectorAll(".rule-card"));

  /* ---------------- Per-card example toggle ---------------- */
  rulesContainer.addEventListener("click", function(e){
    var btn = e.target.closest(".ex-toggle");
    if (!btn) return;
    var n = btn.dataset.n;
    var wrap = rulesContainer.querySelector('.examples-wrap[data-n="' + n + '"]');
    var nowExpanded = btn.classList.toggle("expanded");
    wrap.classList.toggle("expanded", nowExpanded);
    var count = (RULES[n - 1] && RULES[n - 1].ex ? RULES[n - 1].ex.length : 0);
    btn.querySelector(".ex-toggle-label").textContent = labelFor(count, nowExpanded);
  });

  /* ---------------- Global compact toggle (expand/collapse all) ---------------- */
  var compactToggleEl = document.getElementById("compactToggle");
  function reflectCompactUI(){
    compactToggleEl.classList.toggle("on", !compactMode);
  }
  function applyCompactToAll(){
    var expand = !compactMode;
    document.querySelectorAll(".ex-toggle").forEach(function(btn){
      var n = btn.dataset.n;
      var wrap = rulesContainer.querySelector('.examples-wrap[data-n="' + n + '"]');
      btn.classList.toggle("expanded", expand);
      wrap.classList.toggle("expanded", expand);
      var count = (RULES[n - 1] && RULES[n - 1].ex ? RULES[n - 1].ex.length : 0);
      btn.querySelector(".ex-toggle-label").textContent = labelFor(count, expand);
    });
  }
  reflectCompactUI();
  compactToggleEl.addEventListener("click", function(){
    compactMode = !compactMode;
    storageSet(COMPACT_KEY, compactMode ? "1" : "0");
    reflectCompactUI();
    applyCompactToAll();
  });

  /* ---------------- Search (fully independent from Go to Rule) ---------------- */
  var searchInput = document.getElementById("searchInput");
  var emptyState = document.getElementById("emptyState");
  var searchCount = document.getElementById("searchCount");
  var searchWasActiveInPageMode = false;

  function highlightHtml(html, terms){
    if (!terms.length || !html) return html;
    var re = new RegExp("(" + terms.map(escapeRegex).join("|") + ")", "gi");
    var segments = html.split(/(<[^>]+>)/);
    for (var i = 0; i < segments.length; i++){
      if (segments[i].charAt(0) === "<") continue;
      if (!segments[i]) continue;
      segments[i] = segments[i].replace(re, "<mark>$1</mark>");
    }
    return segments.join("");
  }

  function runSearch(){
    var raw = searchInput.value.trim();
    var terms = raw.toLowerCase().split(/\s+/).filter(Boolean);
    var visibleCount = 0;

    // Searching only makes sense against the full list — briefly switch out
    // of page view (without touching the saved preference) so results are visible.
    if (terms.length && currentView === "page"){
      searchWasActiveInPageMode = true;
      setView("continuous", {persist:false});
    } else if (!terms.length && searchWasActiveInPageMode){
      searchWasActiveInPageMode = false;
      setView(storageGet(VIEW_KEY, "continuous"), {persist:false});
    }

    ruleCards.forEach(function(card){
      var n = card.dataset.n;
      var match = terms.length === 0 || terms.every(function(t){
        return card.dataset.search.indexOf(t) !== -1;
      });
      card.classList.toggle("filtered-out", !match);
      if (match) visibleCount++;

      var headEl = card.querySelector(".rule-head h3");
      var bodyEl = card.querySelector(".rule-body");
      var exWrap = card.querySelector(".examples-wrap");

      if (match && terms.length){
        headEl.innerHTML = highlightHtml(originalTitleHTML[n], terms);
        bodyEl.innerHTML = highlightHtml(originalExplHTML[n], terms);
        if (exWrap){
          var newExHtml = highlightHtml(originalExamplesHTML[n], terms);
          exWrap.innerHTML = newExHtml;
          // Auto-expand examples for cards that only match inside their examples
          var matchesInExpl = terms.every(function(t){ return originalExplHTML[n].toLowerCase().indexOf(t) !== -1; });
          if (!matchesInExpl){
            exWrap.classList.add("expanded");
            var btn = card.querySelector(".ex-toggle");
            if (btn) btn.classList.add("expanded");
          }
        }
      } else {
        headEl.innerHTML = originalTitleHTML[n];
        bodyEl.innerHTML = originalExplHTML[n];
        if (exWrap) exWrap.innerHTML = originalExamplesHTML[n];
      }
    });

    tocItems.forEach(function(item){
      var match = !terms.length || terms.every(function(t){
        return item.dataset.title.indexOf(t) !== -1;
      });
      item.classList.toggle("hidden", !match);
    });

    if (terms.length){
      searchCount.textContent = visibleCount + (visibleCount === 1 ? " match" : " matches");
      searchCount.classList.add("show");
    } else {
      searchCount.classList.remove("show");
    }
    emptyState.style.display = (terms.length && visibleCount === 0) ? "block" : "none";
  }
  searchInput.addEventListener("input", runSearch);

  /* ---------------- View mode: continuous (Read) vs page (one at a time) ---------------- */
  var body = document.body;
  var viewToggleButtons = Array.prototype.slice.call(document.querySelectorAll(".view-toggle button"));
  var pageNav = document.getElementById("pageNav");
  var pagePrevBtn = document.getElementById("pagePrev");
  var pageNextBtn = document.getElementById("pageNext");
  var pageLabel = document.getElementById("pageLabel");
  var pageFill = document.getElementById("pageFill");

  var currentView = storageGet(VIEW_KEY, "continuous");
  var currentPage = 1;

  function findClosestVisibleRule(){
    // Picks whichever rule card is currently nearest the top of the viewport.
    var best = null, bestDist = Infinity;
    ruleCards.forEach(function(card){
      if (card.classList.contains("filtered-out")) return;
      var rect = card.getBoundingClientRect();
      var dist = Math.abs(rect.top - 80);
      if (dist < bestDist){ bestDist = dist; best = card; }
    });
    return best ? parseInt(best.dataset.n, 10) : 1;
  }

  function renderPage(){
    ruleCards.forEach(function(card){
      card.classList.toggle("page-active", parseInt(card.dataset.n, 10) === currentPage);
    });
    pageLabel.textContent = "Rule " + currentPage + " of " + TOTAL;
    pageFill.style.width = (currentPage / TOTAL * 100) + "%";
    pagePrevBtn.disabled = currentPage <= 1;
    pageNextBtn.disabled = currentPage >= TOTAL;
    setActiveToc(currentPage);
  }

  function setView(mode, opts){
    opts = opts || {};
    if (mode === "page" && currentView !== "page"){
      currentPage = findClosestVisibleRule();
    }
    currentView = mode;
    body.classList.toggle("page-mode", mode === "page");
    viewToggleButtons.forEach(function(btn){
      btn.classList.toggle("active", btn.dataset.view === mode);
    });
    if (opts.persist !== false){
      storageSet(VIEW_KEY, mode);
    }
    if (mode === "page"){
      renderPage();
      window.scrollTo({top:0, behavior:"auto"});
    }
  }

  viewToggleButtons.forEach(function(btn){
    btn.addEventListener("click", function(){ setView(btn.dataset.view); });
  });

  pagePrevBtn.addEventListener("click", function(){
    if (currentPage > 1){ currentPage--; renderPage(); window.scrollTo({top:0, behavior:"smooth"}); }
  });
  pageNextBtn.addEventListener("click", function(){
    if (currentPage < TOTAL){ currentPage++; renderPage(); window.scrollTo({top:0, behavior:"smooth"}); }
  });

  document.addEventListener("keydown", function(e){
    if (currentView !== "page") return;
    var tag = (e.target && e.target.tagName) || "";
    if (tag === "INPUT" || tag === "TEXTAREA") return;
    if (e.key === "ArrowRight") pageNextBtn.click();
    if (e.key === "ArrowLeft") pagePrevBtn.click();
  });

  setView(currentView, {persist:false});

  /* ---------------- Go to Rule (independent of search/filter/view state) ---------------- */
  var gotoInput = document.getElementById("gotoInput");
  var gotoBtn = document.getElementById("gotoBtn");

  function goToRule(n){
    n = parseInt(n, 10);
    if (!n || n < 1 || n > TOTAL) return;
    if (currentView === "page"){
      currentPage = n;
      renderPage();
      window.scrollTo({top:0, behavior:"smooth"});
      closeSidebar();
      return;
    }
    var card = document.getElementById("rule-" + n);
    if (!card) return;
    card.classList.remove("filtered-out");
    card.scrollIntoView({behavior:"smooth", block:"start"});
    card.classList.add("flash");
    setTimeout(function(){ card.classList.remove("flash"); }, 1600);
    closeSidebar();
  }
  gotoBtn.addEventListener("click", function(){ goToRule(gotoInput.value); });
  gotoInput.addEventListener("keydown", function(e){
    if (e.key === "Enter") goToRule(gotoInput.value);
  });
  window.grammar120GoToRule = goToRule;

  /* ---------------- TOC click ---------------- */
  tocList.addEventListener("click", function(e){
    var link = e.target.closest(".toc-item");
    if (!link) return;
    e.preventDefault();
    goToRule(link.dataset.n);
  });

  function setActiveToc(n){
    tocItems.forEach(function(item){
      item.classList.toggle("active", item.dataset.n === String(n));
    });
  }

  var observer = new IntersectionObserver(function(entries){
    if (currentView === "page") return;
    entries.forEach(function(entry){
      if (entry.isIntersecting){
        setActiveToc(entry.target.dataset.n);
      }
    });
  }, {rootMargin: "-15% 0px -70% 0px", threshold: 0});
  ruleCards.forEach(function(card){ observer.observe(card); });

  /* ---------------- Mobile sidebar ---------------- */
  var sidebar = document.getElementById("sidebar");
  var overlay = document.getElementById("overlay");
  var sidebarToggle = document.getElementById("sidebarToggle");

  function openSidebar(){
    sidebar.classList.add("open");
    overlay.classList.add("show");
  }
  function closeSidebar(){
    sidebar.classList.remove("open");
    overlay.classList.remove("show");
  }
  sidebarToggle.addEventListener("click", function(){
    sidebar.classList.contains("open") ? closeSidebar() : openSidebar();
  });
  overlay.addEventListener("click", closeSidebar);

  /* ---------------- Back to top ---------------- */
  var backToTop = document.getElementById("backToTop");
  window.addEventListener("scroll", function(){
    backToTop.classList.toggle("show", window.scrollY > 500);
  });
  backToTop.addEventListener("click", function(){
    window.scrollTo({top:0, behavior:"smooth"});
  });

  /* ---------------- Deep link: ?rule=N opens straight to that rule ----------------
     Used when the standalone quiz page links back here in a new tab. */
  (function handleRuleDeepLink(){
    var params = new URLSearchParams(window.location.search);
    var n = parseInt(params.get("rule"), 10);
    if (n && n >= 1 && n <= TOTAL){
      requestAnimationFrame(function(){
        goToRule(n);
      });
    }
  })();

})();

</script>
</body>
</html>

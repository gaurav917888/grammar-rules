<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>120 Rules of Grammar — A Reading Companion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f3ec;
  --bg-elevated:#ffffff;
  --bg-soft:#ece8dc;
  --text:#282520;
  --text-soft:#69645a;
  --border:#ddd6c4;
  --accent:#0e6e63;
  --accent-soft:#0e6e6314;
  --accent-contrast:#ffffff;
  --correct:#1e7d4f;
  --correct-bg:#1e7d4f14;
  --incorrect:#a3402e;
  --incorrect-bg:#a3402e14;
  --note-bg:#0e6e6310;
  --note-border:#0e6e6340;
  --shadow:0 1px 3px rgba(30,25,15,0.08), 0 8px 24px -8px rgba(30,25,15,0.12);
  --radius:14px;
  color-scheme:light;
}
html[data-theme="dark"]{
  --bg:#15171a;
  --bg-elevated:#1c1f23;
  --bg-soft:#20242a;
  --text:#e9e6dc;
  --text-soft:#a5a096;
  --border:#33383f;
  --accent:#57d6c2;
  --accent-soft:#57d6c21c;
  --accent-contrast:#0e2422;
  --correct:#63c98a;
  --correct-bg:#63c98a1c;
  --incorrect:#e08a76;
  --incorrect-bg:#e08a761c;
  --note-bg:#57d6c214;
  --note-border:#57d6c240;
  --shadow:0 1px 3px rgba(0,0,0,0.3), 0 8px 24px -8px rgba(0,0,0,0.5);
  color-scheme:dark;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
html{-webkit-text-size-adjust:100%; text-size-adjust:100%;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:"Source Serif 4", Georgia, "Times New Roman", serif;
  line-height:1.65;
  transition:background .25s ease, color .25s ease;
  min-height:100vh;
  overflow-x:hidden;
  width:100%;
}
.ui, button, input, .pill, .toc, .topbar, .rule-nav, .stat, .searchbox, .sidebar-toggle, .empty-state, label{
  font-family:"Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

/* ---------- Layout ---------- */
.app{
  display:flex;
  min-height:100vh;
  width:100%;
  max-width:100vw;
}
.sidebar{
  width:300px;
  flex-shrink:0;
  border-right:1px solid var(--border);
  background:var(--bg-elevated);
  position:sticky;
  top:0;
  height:100vh;
  overflow-y:auto;
  padding:20px 14px 40px;
}
.sidebar::-webkit-scrollbar{width:8px;}
.sidebar::-webkit-scrollbar-thumb{background:var(--border); border-radius:8px;}

.main-col{
  flex:1;
  min-width:0;
  max-width:100%;
  display:flex;
  flex-direction:column;
}

/* ---------- Topbar ---------- */
.topbar{
  position:sticky;
  top:0;
  z-index:20;
  background:color-mix(in srgb, var(--bg) 88%, transparent);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);
  padding:12px 24px;
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
  row-gap:10px;
}
.brand{
  font-family:"Source Serif 4", serif;
  font-weight:600;
  font-size:1.02rem;
  letter-spacing:.2px;
  white-space:nowrap;
  display:flex;
  align-items:center;
  gap:9px;
}
.brand .mark{
  width:26px;height:26px;border-radius:7px;
  background:var(--accent); color:var(--accent-contrast);
  display:flex;align-items:center;justify-content:center;
  font-weight:700; font-size:.8rem; font-family:"Inter",sans-serif;
  flex-shrink:0;
}
.topbar-spacer{flex:1 1 auto; min-width:6px;}
.mobile-break{
  flex-basis:100%;
  width:100%;
  height:0;
  display:none;
}

.searchbox{
  position:relative;
  min-width:120px;
  flex:1 1 200px;
  max-width:380px;
}
.searchbox input{
  width:100%;
  padding:9px 50px 9px 34px;
  border-radius:10px;
  border:1px solid var(--border);
  background:var(--bg-soft);
  color:var(--text);
  font-size:.92rem;
  outline:none;
  transition:border-color .15s ease, background .15s ease;
}
.searchbox input:focus{border-color:var(--accent); background:var(--bg-elevated);}
.searchbox svg{
  position:absolute; left:11px; top:50%; transform:translateY(-50%);
  width:15px;height:15px; color:var(--text-soft); pointer-events:none;
}
.search-count{
  position:absolute; right:8px; top:50%; transform:translateY(-50%);
  font-size:.68rem;
  color:var(--text-soft);
  background:var(--bg-elevated);
  border:1px solid var(--border);
  padding:1px 6px;
  border-radius:20px;
  pointer-events:none;
  display:none;
  white-space:nowrap;
}
.search-count.show{display:block;}

.goto{
  display:flex;
  align-items:center;
  gap:6px;
  background:var(--bg-soft);
  border:1px solid var(--border);
  border-radius:10px;
  padding:4px 4px 4px 12px;
  flex-shrink:0;
}
.control-divider{
  width:1px;
  align-self:stretch;
  background:var(--border);
  margin:2px 2px;
  flex-shrink:0;
}
.goto label{font-size:.8rem; color:var(--text-soft); white-space:nowrap;}
.goto input{
  width:48px;
  border:none;
  background:transparent;
  color:var(--text);
  font-size:.92rem;
  outline:none;
  padding:6px 2px;
  text-align:center;
  -moz-appearance:textfield;
}
.goto input::-webkit-outer-spin-button,
.goto input::-webkit-inner-spin-button{-webkit-appearance:none; margin:0;}
.goto button{
  border:none;
  background:var(--accent);
  color:var(--accent-contrast);
  padding:6px 12px;
  border-radius:7px;
  font-size:.82rem;
  font-weight:600;
  cursor:pointer;
  transition:opacity .15s ease;
  white-space:nowrap;
}
.goto button:hover{opacity:.85;}

.view-toggle{
  display:flex;
  background:var(--bg-soft);
  border:1px solid var(--border);
  border-radius:10px;
  padding:3px;
  gap:2px;
  flex-shrink:0;
}
.view-toggle button{
  border:none;background:transparent;color:var(--text-soft);
  padding:7px 11px;border-radius:7px;font-size:.78rem;font-weight:600;
  cursor:pointer; display:flex; align-items:center; gap:5px;
  white-space:nowrap;
  transition:background .15s ease, color .15s ease;
}
.view-toggle button svg{width:14px;height:14px;}
.view-toggle button.active{background:var(--accent); color:var(--accent-contrast);}
.view-toggle button:not(.active):hover{background:var(--border);}

.compact-toggle{
  display:flex; align-items:center; gap:7px;
  font-size:.78rem; color:var(--text-soft);
  background:var(--bg-soft); border:1px solid var(--border);
  padding:7px 11px; border-radius:10px; cursor:pointer; user-select:none;
  flex-shrink:0;
  white-space:nowrap;
}
.switch{
  width:30px;height:17px;border-radius:20px;background:var(--border);
  position:relative;flex-shrink:0;transition:background .2s ease;
}
.switch::after{
  content:"";position:absolute;top:2px;left:2px;width:13px;height:13px;
  border-radius:50%;background:#fff;transition:transform .2s ease;
  box-shadow:0 1px 2px rgba(0,0,0,.3);
}
.compact-toggle.on .switch{background:var(--accent);}
.compact-toggle.on .switch::after{transform:translateX(13px);}

.theme-toggle{
  border:1px solid var(--border);
  background:var(--bg-soft);
  color:var(--text);
  width:38px;height:38px;
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  flex-shrink:0;
  transition:background .15s ease, transform .15s ease;
}
.theme-toggle:hover{background:var(--accent-soft);}
.theme-toggle svg{width:18px;height:18px;}

.quiz-btn{
  display:flex; align-items:center; gap:7px;
  border:none;
  background:var(--accent);
  color:var(--accent-contrast);
  padding:9px 16px;
  border-radius:10px;
  font-family:"Inter",sans-serif;
  font-size:.82rem;
  font-weight:700;
  cursor:pointer;
  flex-shrink:0;
  white-space:nowrap;
  text-decoration:none;
  transition:opacity .15s ease, transform .15s ease;
}
.quiz-btn:hover{opacity:.88;}
.quiz-btn svg{width:15px;height:15px;}

.sidebar-toggle{
  display:none;
  border:1px solid var(--border);
  background:var(--bg-soft);
  color:var(--text);
  width:38px;height:38px;
  border-radius:10px;
  align-items:center;justify-content:center;
  cursor:pointer;
  flex-shrink:0;
}

/* ---------- TOC / sidebar ---------- */
.sidebar-head{
  padding:6px 10px 14px;
  border-bottom:1px solid var(--border);
  margin-bottom:10px;
}
.sidebar-head h2{
  font-family:"Inter",sans-serif;
  font-size:.72rem;
  text-transform:uppercase;
  letter-spacing:.09em;
  color:var(--text-soft);
  margin:0 0 4px;
  font-weight:700;
}
.sidebar-head .count{
  font-size:.82rem;
  color:var(--text-soft);
}
.toc-list{list-style:none; margin:0; padding:0;}
.toc-item{
  display:flex;
  align-items:flex-start;
  gap:10px;
  padding:8px 10px;
  border-radius:9px;
  cursor:pointer;
  color:var(--text);
  text-decoration:none;
  font-size:.87rem;
  line-height:1.35;
  transition:background .12s ease;
}
.toc-item:hover{background:var(--bg-soft);}
.toc-item.active{background:var(--accent-soft); color:var(--accent);}
.toc-num{
  flex-shrink:0;
  width:26px;height:26px;
  border-radius:7px;
  background:var(--bg-soft);
  color:var(--text-soft);
  display:flex;align-items:center;justify-content:center;
  font-size:.72rem;
  font-weight:700;
  font-family:"Inter",sans-serif;
}
.toc-item.active .toc-num{background:var(--accent); color:var(--accent-contrast);}
.toc-item.hidden{display:none;}

/* ---------- Main content ---------- */
.content{
  max-width:760px;
  width:100%;
  margin:0 auto;
  padding:32px 28px 120px;
}
.hero{
  margin-bottom:30px;
}
.hero h1{
  font-size:1.9rem;
  margin:0 0 10px;
  font-weight:600;
  letter-spacing:-.01em;
}
.hero p{
  color:var(--text-soft);
  font-size:1.02rem;
  max-width:56ch;
  margin:0;
}
.hero .stats{
  display:flex; gap:14px; margin-top:18px; flex-wrap:wrap;
}
.stat{
  background:var(--bg-elevated);
  border:1px solid var(--border);
  border-radius:11px;
  padding:10px 16px;
  font-size:.82rem;
  color:var(--text-soft);
}
.stat b{color:var(--text); font-size:1.05rem; display:block; font-family:"Source Serif 4",serif;}

/* ---------- Page-view navigation ---------- */
.page-nav{
  display:none;
  align-items:center;
  gap:12px;
  margin-bottom:22px;
  padding:10px 14px;
  background:var(--bg-elevated);
  border:1px solid var(--border);
  border-radius:12px;
}
body.page-mode .page-nav{display:flex;}
.page-nav-btn{
  border:1px solid var(--border);
  background:var(--bg-soft);
  color:var(--text);
  width:36px;height:36px;
  border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  flex-shrink:0;
  transition:background .15s ease, opacity .15s ease;
}
.page-nav-btn:hover{background:var(--accent-soft);}
.page-nav-btn:disabled{opacity:.35; cursor:not-allowed;}
.page-nav-btn svg{width:16px;height:16px;}
.page-progress{flex:1; min-width:0;}
.page-progress-label{
  font-family:"Inter",sans-serif;
  font-size:.76rem;
  color:var(--text-soft);
  margin-bottom:5px;
  display:flex;
  justify-content:space-between;
}
.page-progress-bar{height:5px;background:var(--bg-soft);border-radius:3px;overflow:hidden;}
.page-progress-fill{height:100%;background:var(--accent);transition:width .25s ease; border-radius:3px;}

/* ---------- Rule cards ---------- */
.rule-card{
  background:var(--bg-elevated);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:24px 26px 22px;
  margin-bottom:18px;
  box-shadow:var(--shadow);
  scroll-margin-top:90px;
  transition:box-shadow .3s ease, border-color .3s ease;
  max-width:100%;
  overflow-wrap:break-word;
}
.rule-card.flash{
  border-color:var(--accent);
  box-shadow:0 0 0 3px var(--accent-soft), var(--shadow);
}
.rule-card.filtered-out{display:none;}
body.page-mode .rule-card{display:none;}
body.page-mode .rule-card.page-active{display:block;}

.rule-head{
  display:flex;
  align-items:baseline;
  gap:12px;
  margin-bottom:12px;
  flex-wrap:wrap;
}
.rule-badge{
  font-family:"Inter",sans-serif;
  font-weight:700;
  font-size:.72rem;
  color:var(--accent);
  background:var(--accent-soft);
  padding:4px 9px;
  border-radius:20px;
  flex-shrink:0;
  letter-spacing:.03em;
}
.rule-head h3{
  font-size:1.15rem;
  margin:0;
  font-weight:600;
  line-height:1.4;
  overflow-wrap:break-word;
}
.rule-body p{margin:0 0 13px; font-size:1.01rem; overflow-wrap:break-word;}
.rule-body p:last-child{margin-bottom:0;}

.structure-list{
  background:var(--bg-soft);
  border-radius:10px;
  padding:12px 16px;
  margin:0 0 14px;
  font-size:.97rem;
}
.structure-list .ex-line{padding:3px 0;}
.structure-list .ex-line:not(:last-child){border-bottom:1px dashed var(--border);}

.note{
  background:var(--note-bg);
  border-left:3px solid var(--note-border);
  border-radius:0 8px 8px 0;
  padding:11px 16px;
  margin:0 0 14px;
  font-size:.94rem;
  color:var(--text-soft);
}
.note::before{
  content:"Note";
  display:block;
  font-family:"Inter",sans-serif;
  font-size:.68rem;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:.08em;
  color:var(--accent);
  margin-bottom:4px;
}

/* ---------- Collapsible examples ---------- */
.ex-toggle{
  display:inline-flex; align-items:center; gap:6px;
  background:var(--accent-soft); color:var(--accent);
  border:none; padding:8px 15px; border-radius:20px;
  font-family:"Inter",sans-serif; font-size:.82rem; font-weight:700;
  cursor:pointer; margin:2px 0 4px;
  transition:background .15s ease, color .15s ease;
}
.ex-toggle:hover{background:var(--accent); color:var(--accent-contrast);}
.ex-toggle svg{width:12px;height:12px; transition:transform .2s ease;}
.ex-toggle.expanded svg{transform:rotate(180deg);}

.examples-wrap{
  overflow:hidden;
  max-height:0;
  opacity:0;
  transition:max-height .35s ease, opacity .25s ease, margin .35s ease;
  margin-top:0;
}
.examples-wrap.expanded{max-height:6000px; opacity:1; margin-top:6px;}

.examples{
  background:var(--bg-soft);
  border-radius:10px;
  padding:12px 16px;
  font-size:.97rem;
}
.examples .ex-line{padding:4px 0;}
.examples .ex-line:not(:last-child){border-bottom:1px dashed var(--border);}

.tag{
  display:inline-block;
  font-family:"Inter",sans-serif;
  font-size:.74rem;
  font-weight:700;
  padding:1px 8px 2px;
  border-radius:6px;
  margin-left:4px;
  letter-spacing:.02em;
  vertical-align:1px;
}
.tag.correct{color:var(--correct); background:var(--correct-bg);}
.tag.incorrect{color:var(--incorrect); background:var(--incorrect-bg);}

.kw{
  font-weight:700;
  color:var(--accent);
}

mark{
  background:#ffe58a;
  color:#3a2f00;
  padding:0 2px;
  border-radius:3px;
  font-weight:600;
}
html[data-theme="dark"] mark{background:#8a6f1f; color:#fff6d8;}

.empty-state{
  text-align:center;
  padding:60px 20px;
  color:var(--text-soft);
}

.back-to-top{
  position:fixed;
  bottom:24px;
  right:28px;
  width:44px;height:44px;
  border-radius:50%;
  background:var(--accent);
  color:var(--accent-contrast);
  border:none;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  box-shadow:var(--shadow);
  opacity:0;
  pointer-events:none;
  transform:translateY(8px);
  transition:opacity .2s ease, transform .2s ease;
  z-index:30;
}
.back-to-top.show{opacity:1; pointer-events:auto; transform:translateY(0);}
.back-to-top svg{width:18px;height:18px;}
body.page-mode .back-to-top{display:none;}

.overlay{
  display:none;
  position:fixed; inset:0;
  background:rgba(0,0,0,.4);
  z-index:15;
}

/* ---------- Tablet ---------- */
@media (max-width: 1024px){
  .sidebar{width:260px;}
  .content{max-width:100%;}
}

/* ---------- Mobile / small tablet ---------- */
@media (max-width: 860px){
  .sidebar{
    position:fixed;
    left:0; top:0;
    z-index:25;
    width:82vw;
    max-width:300px;
    transform:translateX(-100%);
    transition:transform .25s ease;
    box-shadow:0 0 40px rgba(0,0,0,.25);
  }
  .sidebar.open{transform:translateX(0);}
  .sidebar-toggle{display:flex;}
  .overlay.show{display:block;}
  .content{padding:20px 16px 100px;}
  .hero h1{font-size:1.5rem;}
  .topbar{padding:10px 12px;}
  .goto label{display:none;}

  /* Row 1: hamburger, search, theme toggle — brand icon removed entirely */
  .brand{display:none;}
  .topbar-spacer{display:none;}
  .sidebar-toggle{order:1;}
  .searchbox{order:2; flex:1 1 0; max-width:none; min-width:0; margin:0;}
  .theme-toggle{order:3;}

  /* Forces everything below onto its own new line */
  .mobile-break{display:block; order:4;}

  /* Row 2: view toggle + compact toggle fill the space search used to occupy,
     followed by go-to-rule, then the quiz button on its own if it wraps */
  .control-divider{display:none;}
  .view-toggle{order:5;}
  .compact-toggle{order:6;}
  .goto{order:7;}
  .quiz-btn{order:8; flex:1 1 100%; justify-content:center; margin-top:2px;}
}

@media (max-width: 640px){
  html{font-size:16px;}
  .rule-body p, .examples .ex-line, .structure-list .ex-line, .note{
    font-size:1.06rem;
    line-height:1.72;
  }
  .rule-head h3{font-size:1.14rem;}
  .rule-card{padding:20px 18px 18px;}
  .hero p{font-size:1.02rem;}
  .stat{padding:9px 12px; font-size:.78rem;}
  .tag{font-size:.76rem;}
  .ex-toggle{font-size:.85rem; padding:9px 16px;}
  .view-toggle button span{display:none;}
  .view-toggle button{padding:8px;}
  .compact-toggle span{display:none;}
  .compact-toggle{padding:8px;}
}

@media (max-width: 400px){
  .content{padding:16px 12px 90px;}
  .rule-card{padding:18px 14px 16px; border-radius:11px;}
}

<body>
<div class="overlay" id="overlay"></div>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-head">
      <h2>Contents</h2>
      <div class="count"><span id="totalCount">120</span> rules of grammar</div>
    </div>
    <nav class="toc-list" id="tocList"></nav>
  </aside>

  <div class="main-col">
    <header class="topbar">
      <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle contents">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
      </button>
      <div class="brand" id="brand"><span class="mark">Aa</span><span>120 Rules of Grammar</span></div>
      <div class="topbar-spacer"></div>
      <div class="searchbox">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <input type="text" id="searchInput" placeholder="Search rules, words, examples...">
        <span class="search-count" id="searchCount"></span>
      </div>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode"></button>

      <div class="mobile-break"></div>

      <div class="goto">

        <button id="gotoBtn">Go</button>

<script type="application/json" id="rules-data">
[{"n": 1, "t": "Difference between \"Each\" and \"Every\"", "b": "Each and every are always followed by a singular verb.\n\nEach student is very talented. [Correct]\nEach of my students is very talented. [Correct]\n\nIn the first sentence, \"each\" functions as an adjective describing the noun \"student.\" In the second, \"each\" functions as a pronoun. In both cases the singular verb \"is\" is used.\n\n*NOTE: \"Each\" refers to a plural number of people or items, but treats every person or item as an individual, dissimilar unit — it does not consider the group collectively (an individualistic approach). \"Every\" also refers to multiple people or items, but treats them as part of one similar, collective group (a general approach).\n\n*NOTE: \"Each\" can function as both a pronoun and an adjective. \"Every\" can only function as an adjective.\n\nEvery student is very talented. [Correct]\nEvery of my students is very talented. [Incorrect]\n\nIn the first sentence \"every\" is used as an adjective describing \"student.\" In the second, \"every\" is wrongly used as a pronoun.\n\n*NOTE: \"Each\" can be used for two or more than two people or items, but \"every\" is used only for more than two. We cannot use \"every\" for exactly two things.\n\nEach person on this earth has to die one day.\nEvery person I know has watched the movie.\nHe has a book in each hand. [Correct]\nHe has a book in every hand. [Incorrect — \"every\" cannot be used with two things]\n\n*NOTE: \"Every,\" but not \"each,\" can be used with abstract nouns.\n\nThey have every reason to be happy with their new home. [Correct]\nThey have each reason to be happy with their new home. [Incorrect]", "expl": "Each and every are always followed by a singular verb.\n\nIn the first sentence, \"each\" functions as an adjective describing the noun \"student.\" In the second, \"each\" functions as a pronoun. In both cases the singular verb \"is\" is used.\n\n*NOTE: \"Each\" refers to a plural number of people or items, but treats every person or item as an individual, dissimilar unit — it does not consider the group collectively (an individualistic approach). \"Every\" also refers to multiple people or items, but treats them as part of one similar, collective group (a general approach).\n\n*NOTE: \"Each\" can function as both a pronoun and an adjective. \"Every\" can only function as an adjective.\n\nIn the first sentence \"every\" is used as an adjective describing \"student.\" In the second, \"every\" is wrongly used as a pronoun.\n\n*NOTE: \"Each\" can be used for two or more than two people or items, but \"every\" is used only for more than two. We cannot use \"every\" for exactly two things.\n\n*NOTE: \"Every,\" but not \"each,\" can be used with abstract nouns.", "ex": ["Each student is very talented. [Correct]", "Each of my students is very talented. [Correct]", "Every student is very talented. [Correct]", "Every of my students is very talented. [Incorrect]", "Each person on this earth has to die one day.", "Every person I know has watched the movie.", "He has a book in each hand. [Correct]", "He has a book in every hand. [Incorrect — \"every\" cannot be used with two things]", "They have every reason to be happy with their new home. [Correct]", "They have each reason to be happy with their new home. [Incorrect]"]}, {"n": 2, "t": "Neither...nor (not \"both...nor\")", "b": "\"Both\" and \"nor\" cannot be used together. Instead we use \"neither...nor,\" which is used when we want to say that two or more things are not true.\n\nBoth Ram and Shyam are not going to visit this place. [Incorrect]\nNeither Ram nor Shyam is going to visit this place. [Correct]\n\nThis is a war which both sides cannot win. [Incorrect]\nThis is a war which neither side can win. [Correct]\n\n*NOTE: \"Neither\" lets us make a negative statement about two people or things at the same time. \"Neither\" goes before a singular, countable noun, and is used to say \"not either\" in relation to two things.", "expl": "\"Both\" and \"nor\" cannot be used together. Instead we use \"neither...nor,\" which is used when we want to say that two or more things are not true.\n\n*NOTE: \"Neither\" lets us make a negative statement about two people or things at the same time. \"Neither\" goes before a singular, countable noun, and is used to say \"not either\" in relation to two things.", "ex": ["Both Ram and Shyam are not going to visit this place. [Incorrect]", "Neither Ram nor Shyam is going to visit this place. [Correct]", "This is a war which both sides cannot win. [Incorrect]", "This is a war which neither side can win. [Correct]"]}, {"n": 3, "t": "Relative pronouns — who, whom, which, that", "b": "(1) \"Who\" and \"whom\" are mainly used for people. They can also be used for animals that are mentioned by name and are domesticated (i.e. pets).\n\nThe witnesses whom I interviewed gave conflicting evidence. [People]\nThe people who just boarded the plane are in a rock band. [People]\nThe vacuum scared our dog Rocky, who was sleeping on the rug. [A named pet]\n\n(2) \"Which\" is used for animals in general, or for things (non-domestic animals and non-living things).\n\nVinita visited the park with a dog, which likes to chase squirrels.\nThe bomb, which killed 15 people, was the worst of a series of terrorist outrages.\n\n(3) \"That\" can be used for people, animals, or things — there are no restrictions.\n\nThe car that Jasprit bought runs on electricity and gas. [Thing]\nThe musician that won the award is Indian. [Person]\nThe dog that is chasing the squirrels belongs to Brijesh. [Animal]\n\n*NOTE: {{All, any, the only, the same, none, much, no, the little, the few, something, anything, nothing}}, and superlative degrees are always followed by \"that\" only — never by \"who\" or \"which.\"\n\nThis is the same book which you were reading. [Incorrect]\nThis is the same book that you were reading. [Correct]\nHe spent up the little amount which he had. [Incorrect]\nHe spent up the little amount that he had. [Correct]\nThis is the best that I can do for you. [Correct]\n\n*NOTE: \"Whoever\" vs. \"whomever\":\n\n(1) \"Whoever\" is a subjective pronoun — it serves as the subject of a verb.\n\nWhoever is hungry can have the leftover pizza. (Whoever = subject of \"is,\" like \"He is hungry.\")\nGive the package to whoever comes for it. (Whoever = subject of \"comes.\")\nI am happy with whoever wins. (Whoever = subject of \"wins.\")\n\n\"Whoever\" is also correct as a subject complement, with linking verbs such as is, are, and will be.\n\nWhoever it was did not leave her name.\nWhoever they are, I like their confidence.\n\n(2) \"Whomever\" is an objective pronoun — it serves as the object of a verb or preposition.\n\nPlease invite whomever you choose. (Whomever = object of \"choose,\" like \"You choose him.\")\nWhomever Kate marries is none of our business.\nI am eager to work with whomever Dale selects as my partner.", "expl": "(1) \"Who\" and \"whom\" are mainly used for people. They can also be used for animals that are mentioned by name and are domesticated (i.e. pets).\n\n(2) \"Which\" is used for animals in general, or for things (non-domestic animals and non-living things).\n\n(3) \"That\" can be used for people, animals, or things — there are no restrictions.\n\n*NOTE: {{All, any, the only, the same, none, much, no, the little, the few, something, anything, nothing}}, and superlative degrees are always followed by \"that\" only — never by \"who\" or \"which.\"\n\n*NOTE: \"Whoever\" vs. \"whomever\":\n\n(1) \"Whoever\" is a subjective pronoun — it serves as the subject of a verb.\n\n\"Whoever\" is also correct as a subject complement, with linking verbs such as is, are, and will be.\n\n(2) \"Whomever\" is an objective pronoun — it serves as the object of a verb or preposition.", "ex": ["The witnesses whom I interviewed gave conflicting evidence. [People]", "The people who just boarded the plane are in a rock band. [People]", "The vacuum scared our dog Rocky, who was sleeping on the rug. [A named pet]", "Vinita visited the park with a dog, which likes to chase squirrels.", "The bomb, which killed 15 people, was the worst of a series of terrorist outrages.", "The car that Jasprit bought runs on electricity and gas. [Thing]", "The musician that won the award is Indian. [Person]", "The dog that is chasing the squirrels belongs to Brijesh. [Animal]", "This is the same book which you were reading. [Incorrect]", "This is the same book that you were reading. [Correct]", "He spent up the little amount which he had. [Incorrect]", "He spent up the little amount that he had. [Correct]", "This is the best that I can do for you. [Correct]", "Whoever is hungry can have the leftover pizza. (Whoever = subject of \"is,\" like \"He is hungry.\")", "Give the package to whoever comes for it. (Whoever = subject of \"comes.\")", "I am happy with whoever wins. (Whoever = subject of \"wins.\")", "Whoever it was did not leave her name.", "Whoever they are, I like their confidence.", "Please invite whomever you choose. (Whomever = object of \"choose,\" like \"You choose him.\")", "Whomever Kate marries is none of our business.", "I am eager to work with whomever Dale selects as my partner."]}, {"n": 4, "t": "Conditional sentences — the three types", "b": "There are three types of conditional sentences:\n\nType I — condition possible to fulfill\nType II — condition possible only in theory\nType III — condition no longer possible to fulfill (too late)\n\nTheir form:\n\nType I: Simple Present in the if-clause → will-future or shall/can/may/must + V1 in the main clause\nType II: Simple Past in the if-clause → would/could/might/should + V1 in the main clause\nType III: Past Perfect in the if-clause → would/could/might/should + have + V3 in the main clause\n\nIf I study, I will pass the exam. [Type I]\nIf I studied, I would pass the exam. [Type II]\nIf I had studied, I would have passed the exam. [Type III]\nIf your files are in order, you may/can leave at once.\nIf you want to lose weight, you must eat less fatty food.\nIf I lived near my metro station, I would be in time for work.\nIf I were you, I would plant some saplings around the house.\nIf we had found him earlier, we could have arrested him and prevented the crime.\nHad you obeyed the orders, this fire accident would have been averted.\n\n*NOTE: This rule does not apply to universal truths — these stay in the Simple Present in both clauses.\n\nIf water reaches 100 degrees Celsius, it boils.\nIf you heat water, it turns into vapour.", "expl": "There are three types of conditional sentences:\n\nTheir form:\n\nType I: Simple Present in the if-clause → will-future or shall/can/may/must + V1 in the main clause\nType II: Simple Past in the if-clause → would/could/might/should + V1 in the main clause\nType III: Past Perfect in the if-clause → would/could/might/should + have + V3 in the main clause\n\n*NOTE: This rule does not apply to universal truths — these stay in the Simple Present in both clauses.", "ex": ["Type I — condition possible to fulfill", "Type II — condition possible only in theory", "Type III — condition no longer possible to fulfill (too late)", "If I study, I will pass the exam. [Type I]", "If I studied, I would pass the exam. [Type II]", "If I had studied, I would have passed the exam. [Type III]", "If your files are in order, you may/can leave at once.", "If you want to lose weight, you must eat less fatty food.", "If I lived near my metro station, I would be in time for work.", "If I were you, I would plant some saplings around the house.", "If we had found him earlier, we could have arrested him and prevented the crime.", "Had you obeyed the orders, this fire accident would have been averted.", "If water reaches 100 degrees Celsius, it boils.", "If you heat water, it turns into vapour."]}, {"n": 5, "t": "Usage of the phrase \"one of the\"", "b": "The general structure is:\n\n\"One of the + PLURAL NOUN + that/who etc. + SINGULAR/PLURAL VERB\"\n\nThe noun following \"one of the\" is always plural. The relative pronoun (who/that/which) is crucial here:\n\n(1) When no relative pronoun is used — i.e. \"one of the NOUNS\" is itself the subject of the verb — we use a singular verb.\n\nThere are many birds on the tree. One of the birds is red. [\"One of the birds\" is the subject]\n\n(2) When the relative pronoun (who/that) is used — i.e. \"one of the NOUNS\" is not itself the subject — we use a plural verb, because the pronoun refers back to the plural noun.\n\nThat is one of the birds that fly over my house at night.\nShe is one of the mothers who are really working hard to make both ends meet.\n\nIn the first sentence, \"that\" is the subject of \"fly,\" and refers to \"birds\" (plural), so \"fly\" (plural verb) is used. In the second, \"who\" is the subject of \"are,\" referring to \"mothers\" (plural), so \"are\" is used.\n\n(3) In the pattern \"The only one of the + PLURAL NOUN + who/that...\", a singular verb is required.\n\nRina is the only one of the girls who has ever been to India.\nThis is the only one of the novels which is interesting.", "expl": "The general structure is:\n\n\"One of the + PLURAL NOUN + that/who etc. + SINGULAR/PLURAL VERB\"\n\nThe noun following \"one of the\" is always plural. The relative pronoun (who/that/which) is crucial here:\n\n(1) When no relative pronoun is used — i.e. \"one of the NOUNS\" is itself the subject of the verb — we use a singular verb.\n\nThere are many birds on the tree. One of the birds is red. [\"One of the birds\" is the subject]\n\n(2) When the relative pronoun (who/that) is used — i.e. \"one of the NOUNS\" is not itself the subject — we use a plural verb, because the pronoun refers back to the plural noun.\n\nIn the first sentence, \"that\" is the subject of \"fly,\" and refers to \"birds\" (plural), so \"fly\" (plural verb) is used. In the second, \"who\" is the subject of \"are,\" referring to \"mothers\" (plural), so \"are\" is used.\n\n(3) In the pattern \"The only one of the + PLURAL NOUN + who/that...\", a singular verb is required.", "ex": ["That is one of the birds that fly over my house at night.", "She is one of the mothers who are really working hard to make both ends meet.", "Rina is the only one of the girls who has ever been to India.", "This is the only one of the novels which is interesting."]}, {"n": 6, "t": "Number + Unit + Noun/Adjective", "b": "When a sentence combines \"Number + Unit + Noun\" or \"Number + Unit + Adjective,\" the unit is always kept in its singular form.\n\nHe saw a ten-inch snake.\nShe gave me two five-hundred-rupee notes.\n\n*NOTE: When a sentence has just \"Number + Unit,\" the unit stays singular if the sentence is not self-explanatory on its own, and takes the plural if it is self-explanatory.\n\nHe had five dozen. [Singular unit — not self-explanatory without more context]\nI have five rupees. [Plural unit — self-explanatory]\n\n*NOTE: In a sentence with more than one unit, the units are arranged in ascending order.\n\nThousands of lakhs of students took the test.\n(Note: students take a test; teachers give a test.)\n\n*NOTE: Words like \"handful,\" \"glassful,\" and \"fistful\" are arbitrary measuring units and do form regular plurals: {{handfuls, glassfuls, fistfuls, spoonfuls, mouthfuls, cupfuls}}.\n\nHe pulled out a handful of coins from his pocket. [Singular]\nI use two handfuls of pasta per person. [Plural]\nDrink a glassful of water with this medicine. [Singular]\nShe drank two whole glassfuls of orange juice. [Plural]\nHe has a fistful of acting awards. [Singular]\nAll of a sudden, we just started having fistfuls of money. [Plural]", "expl": "When a sentence combines \"Number + Unit + Noun\" or \"Number + Unit + Adjective,\" the unit is always kept in its singular form.\n\n*NOTE: When a sentence has just \"Number + Unit,\" the unit stays singular if the sentence is not self-explanatory on its own, and takes the plural if it is self-explanatory.\n\n*NOTE: In a sentence with more than one unit, the units are arranged in ascending order.\n\n*NOTE: Words like \"handful,\" \"glassful,\" and \"fistful\" are arbitrary measuring units and do form regular plurals: {{handfuls, glassfuls, fistfuls, spoonfuls, mouthfuls, cupfuls}}.", "ex": ["He saw a ten-inch snake.", "She gave me two five-hundred-rupee notes.", "He had five dozen. [Singular unit — not self-explanatory without more context]", "I have five rupees. [Plural unit — self-explanatory]", "Thousands of lakhs of students took the test.", "(Note: students take a test; teachers give a test.)", "He pulled out a handful of coins from his pocket. [Singular]", "I use two handfuls of pasta per person. [Plural]", "Drink a glassful of water with this medicine. [Singular]", "She drank two whole glassfuls of orange juice. [Plural]", "He has a fistful of acting awards. [Singular]", "All of a sudden, we just started having fistfuls of money. [Plural]"]}, {"n": 7, "t": "Expressions of time, money, speed, weight, height, distance", "b": "Expressions of time, money, speed, weight, height, and distance take a singular verb when the amount is covered/used in one single way — and a plural verb when it is covered/used in several distinct ways.\n\nTen miles needs to be covered completely on foot. [Singular — one means]\nTen miles need to be covered partly by car and rest on foot. [Plural — two means]\n\nIn the first sentence, the whole distance is covered by a single means (on foot), so the singular verb \"needs\" is used. In the second, the distance is split between two means (car and foot), so the plural verb \"need\" is used.\n\nFive thousand rupees is his salary. [Singular]\nFive thousand rupees were spent on food and entertainment. [Plural]\nSix weeks is not long enough. [Singular]\nFive kilograms is his weight. [Singular]", "expl": "Expressions of time, money, speed, weight, height, and distance take a singular verb when the amount is covered/used in one single way — and a plural verb when it is covered/used in several distinct ways.\n\nIn the first sentence, the whole distance is covered by a single means (on foot), so the singular verb \"needs\" is used. In the second, the distance is split between two means (car and foot), so the plural verb \"need\" is used.", "ex": ["Ten miles needs to be covered completely on foot. [Singular — one means]", "Ten miles need to be covered partly by car and rest on foot. [Plural — two means]", "Five thousand rupees is his salary. [Singular]", "Five thousand rupees were spent on food and entertainment. [Plural]", "Six weeks is not long enough. [Singular]", "Five kilograms is his weight. [Singular]"]}, {"n": 8, "t": "Certain cases of comparison", "b": "Gold is more precious than all metals. [Incorrect]\nGold is more precious than any other metal. [Correct]\n\nIn the first sentence, gold is itself a metal, so it is being compared with a group that includes itself — meaning, in effect, \"gold is more precious than gold,\" which is illogical. In the second, gold is compared with every metal other than gold, which is meaningful.\n\nDiamond is more precious than all metals. [Correct — diamond is not a metal, so no overlap]\n\nKalidasa was more famous than all English poets. [Correct — Kalidasa was not an English poet]\nKalidasa was more famous than all poets. [Incorrect — this includes Kalidasa himself]", "expl": "In the first sentence, gold is itself a metal, so it is being compared with a group that includes itself — meaning, in effect, \"gold is more precious than gold,\" which is illogical. In the second, gold is compared with every metal other than gold, which is meaningful.\n\nDiamond is more precious than all metals. [Correct — diamond is not a metal, so no overlap]", "ex": ["Gold is more precious than all metals. [Incorrect]", "Gold is more precious than any other metal. [Correct]", "Kalidasa was more famous than all English poets. [Correct — Kalidasa was not an English poet]", "Kalidasa was more famous than all poets. [Incorrect — this includes Kalidasa himself]"]}, {"n": 9, "t": "Prepositions of time: \"since\" and \"for\"", "b": "\"For\" and \"since\" both describe something that started in the past and continues into the present.\n\n\"For\" refers to a duration — an amount of time ({{seconds, minutes, hours, days, months, years}}) that need not be exact.\n\"Since\" refers to a point of start — a specific point in time.\n\nHe has been here for six months and still cannot speak a word of German. [for + a period of time]\nI've only known her since the beginning of last week. [since + a point in time]", "expl": "\"For\" and \"since\" both describe something that started in the past and continues into the present.", "ex": ["\"For\" refers to a duration — an amount of time ({{seconds, minutes, hours, days, months, years}}) that need not be exact.", "\"Since\" refers to a point of start — a specific point in time.", "He has been here for six months and still cannot speak a word of German. [for + a period of time]", "I've only known her since the beginning of last week. [since + a point in time]"]}, {"n": 10, "t": "Sequencing two past actions", "b": "When two actions occurred in the past, the action that happened earlier is expressed with the Past Perfect tense, and the action that happened later is expressed with the Simple Past tense.\n\nHe had finished the work after we had met him. [Incorrect]\nHe finished the work after we had met him. [Correct]\nThe patient died before the doctor arrived. [Incorrect]\nThe patient had died before the doctor arrived. [Correct]\nI finished the book after I had returned from college. [Correct]", "expl": "When two actions occurred in the past, the action that happened earlier is expressed with the Past Perfect tense, and the action that happened later is expressed with the Simple Past tense.", "ex": ["He had finished the work after we had met him. [Incorrect]", "He finished the work after we had met him. [Correct]", "The patient died before the doctor arrived. [Incorrect]", "The patient had died before the doctor arrived. [Correct]", "I finished the book after I had returned from college. [Correct]"]}, {"n": 11, "t": "Possessive adjective before a gerund", "b": "We use a possessive adjective (my, our, his, her, their, your) — not an objective pronoun — before a gerund.\n\nI hope you don't mind me borrowing your car. [Incorrect]\nI hope you don't mind my borrowing your car. [Correct]\n\n\"My\" is the possessive form of \"I\"/\"me\" (as in \"my book,\" \"my idea\" — things that belong to me), while \"me\" is the objective case of the pronoun. Since \"borrowing\" is a gerund (V1+ing used as a noun), the possessive form is required before it.\n\nI know his reading every night has helped him pass the test. [Possessive + gerund — the focus is on \"reading\"]\nI hope you don't mind my staying with you next week. [Possessive + gerund — the focus is on \"staying\"]\nMy father doesn't like my going outside with Ram.", "expl": "We use a possessive adjective (my, our, his, her, their, your) — not an objective pronoun — before a gerund.\n\n\"My\" is the possessive form of \"I\"/\"me\" (as in \"my book,\" \"my idea\" — things that belong to me), while \"me\" is the objective case of the pronoun. Since \"borrowing\" is a gerund (V1+ing used as a noun), the possessive form is required before it.", "ex": ["I hope you don't mind me borrowing your car. [Incorrect]", "I hope you don't mind my borrowing your car. [Correct]", "I know his reading every night has helped him pass the test. [Possessive + gerund — the focus is on \"reading\"]", "I hope you don't mind my staying with you next week. [Possessive + gerund — the focus is on \"staying\"]", "My father doesn't like my going outside with Ram."]}, {"n": 12, "t": "Law of Inversion", "b": "Inversion means placing the verb before the subject — a literary technique in which the normal word order is reversed, usually for emphasis.\n\nThere are two types: Partial Inversion and Complete Inversion.\n\nNormal sentence structure: Subject + helping verb + main verb + ...\n\nMy students are working very hard. [Normal]\nI have never seen such a beautiful place. [Normal]\n\nIn inversion, the sentence begins with the helping verb instead of the subject:\n\nHelping verb + Subject + Main verb + ...\n\nNever have I seen such a beautiful place. [Inversion — emphasizes that in my whole life I have never seen this]\n\nInversion is generally used when a sentence begins with an adverb.\n\nRarely did he go there. [Adverb + helping verb + subject + main verb]\nSeldom have I seen such a beautiful view. [Adverb + helping verb + subject + main verb]\n\nWhenever a sentence begins with an adverb, the Law of Inversion is followed, so the adverb is always followed by a helping verb. When the adverb is followed by a helping verb, this is Partial Inversion. In Complete Inversion, a main verb (not a helping verb) follows the adverb directly.\n\nHere comes the King! [Adverb + main verb + subject]\nThere goes all our money! [Adverb + main verb + subject]\n\n*NOTE: \"No sooner...than\": \"No sooner\" is always followed by \"than,\" never by \"when.\"\n\nNo sooner had I entered the class when it began to rain. [Incorrect]\nNo sooner had I entered the class than it began to rain. [Correct]\n\n*NOTE: Some more examples of inversion after a negative adverb:\n\nHe never goes to the temple. Neither she does. [Incorrect]\nHe never goes to the temple. Neither does she. [Correct]\n\nThe second clause begins with the adverb \"Neither,\" so the Law of Inversion applies and the helping verb \"does\" comes before the subject \"she.\"", "expl": "Inversion means placing the verb before the subject — a literary technique in which the normal word order is reversed, usually for emphasis.\n\nThere are two types: Partial Inversion and Complete Inversion.\n\nNormal sentence structure: Subject + helping verb + main verb + ...\n\nIn inversion, the sentence begins with the helping verb instead of the subject:\n\nHelping verb + Subject + Main verb + ...\n\nNever have I seen such a beautiful place. [Inversion — emphasizes that in my whole life I have never seen this]\n\nInversion is generally used when a sentence begins with an adverb.\n\nWhenever a sentence begins with an adverb, the Law of Inversion is followed, so the adverb is always followed by a helping verb. When the adverb is followed by a helping verb, this is Partial Inversion. In Complete Inversion, a main verb (not a helping verb) follows the adverb directly.\n\n*NOTE: \"No sooner...than\": \"No sooner\" is always followed by \"than,\" never by \"when.\"\n\n*NOTE: Some more examples of inversion after a negative adverb:\n\nThe second clause begins with the adverb \"Neither,\" so the Law of Inversion applies and the helping verb \"does\" comes before the subject \"she.\"", "ex": ["My students are working very hard. [Normal]", "I have never seen such a beautiful place. [Normal]", "Rarely did he go there. [Adverb + helping verb + subject + main verb]", "Seldom have I seen such a beautiful view. [Adverb + helping verb + subject + main verb]", "Here comes the King! [Adverb + main verb + subject]", "There goes all our money! [Adverb + main verb + subject]", "No sooner had I entered the class when it began to rain. [Incorrect]", "No sooner had I entered the class than it began to rain. [Correct]", "He never goes to the temple. Neither she does. [Incorrect]", "He never goes to the temple. Neither does she. [Correct]"]}, {"n": 13, "t": "Articles with places used for their primary purpose", "b": "When places like {{school, college, church, bed, table, hospital, market, prison, jail, court, temple, mosque, university}} are used for the primary purpose for which they exist, we do not use the article \"the\" before them. When the same place is used for any other (secondary) purpose, \"the\" is used.\n\nChildren go to school every day. [Primary purpose — to study]\nHe goes to the temple. [Secondary purpose — e.g. visiting, not necessarily worshipping]\nHis home is just beside the temple. [Secondary/incidental reference to the building]\nWe go to church on Fridays. [Correct — primary purpose, to worship]\nWe go to the church on Fridays. [Incorrect, if meant in the primary sense]\nThe politician was sent to jail. [Correct — primary purpose of a jail]\nThe politician was sent to the jail. [Incorrect, in the primary sense]\n\n*NOTE: The primary purpose is the work the place exists for; the secondary purpose is any other use of the same building. \"He goes to the temple\" without \"the\" implies he goes there to worship; the same phrase with \"the\" implies a mere location reference.", "expl": "When places like {{school, college, church, bed, table, hospital, market, prison, jail, court, temple, mosque, university}} are used for the primary purpose for which they exist, we do not use the article \"the\" before them. When the same place is used for any other (secondary) purpose, \"the\" is used.\n\n*NOTE: The primary purpose is the work the place exists for; the secondary purpose is any other use of the same building. \"He goes to the temple\" without \"the\" implies he goes there to worship; the same phrase with \"the\" implies a mere location reference.", "ex": ["Children go to school every day. [Primary purpose — to study]", "He goes to the temple. [Secondary purpose — e.g. visiting, not necessarily worshipping]", "His home is just beside the temple. [Secondary/incidental reference to the building]", "We go to church on Fridays. [Correct — primary purpose, to worship]", "We go to the church on Fridays. [Incorrect, if meant in the primary sense]", "The politician was sent to jail. [Correct — primary purpose of a jail]", "The politician was sent to the jail. [Incorrect, in the primary sense]"]}, {"n": 14, "t": "\"No sooner\", \"hardly\", \"scarcely\" at the start of a sentence", "b": "When adverbs like \"no sooner,\" \"hardly,\" or \"scarcely\" begin a sentence, they are always followed by a helping verb (Law of Inversion).\n\nHardly had I begun to speak when I was interrupted.\nScarcely had we started our meal when the phone rang.\nNo sooner had I arrived than they all started to argue.\n\n*NOTE: \"Hardly,\" \"scarcely,\" and \"barely\" are always followed by \"when,\" while \"no sooner\" is always followed by \"than.\"", "expl": "When adverbs like \"no sooner,\" \"hardly,\" or \"scarcely\" begin a sentence, they are always followed by a helping verb (Law of Inversion).\n\n*NOTE: \"Hardly,\" \"scarcely,\" and \"barely\" are always followed by \"when,\" while \"no sooner\" is always followed by \"than.\"", "ex": ["Hardly had I begun to speak when I was interrupted.", "Scarcely had we started our meal when the phone rang.", "No sooner had I arrived than they all started to argue."]}, {"n": 15, "t": "Reflexive pronoun as the object of a sentence", "b": "The object of a sentence is the person or thing that receives the action of the verb (it answers \"whom\" or \"what\").\n\nCertain verbs are always followed by an object: {{enjoy, avail, absent, pride, adjust, reconcile, acquit, amuse, resign, avenge, exert, apply, adapt}}, etc. When these verbs are not given another object in the sentence, we supply a reflexive pronoun as their object.\n\nHe enjoyed himself at the party. [Reflexive pronoun as object]\nShe availed herself of the opportunity and thus got a promotion.\nThey enjoyed the picture last evening. [Here \"picture\" is already the object, so no reflexive pronoun is needed]\nThe former IPS officer acquitted himself effectively.\nHe absented himself from the class.\n\nIn the first sentence, \"himself\" answers \"He enjoyed whom?\" In the third example, \"enjoyed\" already has an object (\"picture\"), so a reflexive pronoun isn't needed.\n\n*NOTE: Certain verbs are never followed by a reflexive pronoun as object: {{keep, stop, turn, qualify, bathe, move, rest, hide}}, etc.\n\nHe hid himself in the room. [Incorrect]\nHe hid in the room. [Correct]\nShe has qualified herself for the post. [Incorrect]\nShe has qualified for the post. [Correct]", "expl": "The object of a sentence is the person or thing that receives the action of the verb (it answers \"whom\" or \"what\").\n\nCertain verbs are always followed by an object: {{enjoy, avail, absent, pride, adjust, reconcile, acquit, amuse, resign, avenge, exert, apply, adapt}}, etc. When these verbs are not given another object in the sentence, we supply a reflexive pronoun as their object.\n\nIn the first sentence, \"himself\" answers \"He enjoyed whom?\" In the third example, \"enjoyed\" already has an object (\"picture\"), so a reflexive pronoun isn't needed.\n\n*NOTE: Certain verbs are never followed by a reflexive pronoun as object: {{keep, stop, turn, qualify, bathe, move, rest, hide}}, etc.", "ex": ["He enjoyed himself at the party. [Reflexive pronoun as object]", "She availed herself of the opportunity and thus got a promotion.", "They enjoyed the picture last evening. [Here \"picture\" is already the object, so no reflexive pronoun is needed]", "The former IPS officer acquitted himself effectively.", "He absented himself from the class.", "He hid himself in the room. [Incorrect]", "He hid in the room. [Correct]", "She has qualified herself for the post. [Incorrect]", "She has qualified for the post. [Correct]"]}, {"n": 16, "t": "Words never followed by a reflexive pronoun", "b": "Certain verbs — {{hide, keep, stop, turn, shave, bathe}}, etc. — are never followed by a reflexive pronoun.\n\nHe hid himself in the cave and thus saved his life. [Incorrect]\nHe hid in the cave and thus saved his life. [Correct]\n\nWe cannot use \"himself\" here because \"hid\" does not take a reflexive pronoun as its object.", "expl": "Certain verbs — {{hide, keep, stop, turn, shave, bathe}}, etc. — are never followed by a reflexive pronoun.\n\nWe cannot use \"himself\" here because \"hid\" does not take a reflexive pronoun as its object.", "ex": ["He hid himself in the cave and thus saved his life. [Incorrect]", "He hid in the cave and thus saved his life. [Correct]"]}, {"n": 17, "t": "Subject-verb agreement with 'as well as', 'along with', etc.", "b": "When two subjects are joined by phrases such as \"as well as,\" \"together with,\" \"along with,\" \"and not,\" \"in addition to,\" \"like,\" \"unlike,\" \"with,\" \"rather than,\" \"except,\" \"no less than,\" \"nothing but,\" or \"more than one,\" the verb agrees only with the first subject.\n\nJohn, as well as Mary, wants to drop the course. [Singular — agrees with \"John\"]\nRam, as well as his friends, keeps asking me many questions. [Singular — agrees with \"Ram\"]\nThe publisher, as well as the writers, has come. [Singular — agrees with \"publisher\"]\nThe club members, along with his owner, was arrested. [Incorrect]\nThe club members, along with his owner, were arrested. [Correct — agrees with plural \"club members\"]\nHe, and not his friends, are found guilty. [Incorrect]\nHe, and not his friends, is found guilty. [Correct]\n\nSimilarly, when two subjects are connected by \"governed by,\" \"accompanied by,\" \"but,\" \"besides,\" \"led by,\" \"run by,\" etc., the verb still agrees with the first subject.\n\nCalifornia, along with Florida, is among the most popular US tourist destinations. [Singular]\nThe teachers, along with the Principal, are entering the class. [Plural — the subject here is genuinely plural]", "expl": "When two subjects are joined by phrases such as \"as well as,\" \"together with,\" \"along with,\" \"and not,\" \"in addition to,\" \"like,\" \"unlike,\" \"with,\" \"rather than,\" \"except,\" \"no less than,\" \"nothing but,\" or \"more than one,\" the verb agrees only with the first subject.\n\nSimilarly, when two subjects are connected by \"governed by,\" \"accompanied by,\" \"but,\" \"besides,\" \"led by,\" \"run by,\" etc., the verb still agrees with the first subject.", "ex": ["John, as well as Mary, wants to drop the course. [Singular — agrees with \"John\"]", "Ram, as well as his friends, keeps asking me many questions. [Singular — agrees with \"Ram\"]", "The publisher, as well as the writers, has come. [Singular — agrees with \"publisher\"]", "The club members, along with his owner, was arrested. [Incorrect]", "The club members, along with his owner, were arrested. [Correct — agrees with plural \"club members\"]", "He, and not his friends, are found guilty. [Incorrect]", "He, and not his friends, is found guilty. [Correct]", "California, along with Florida, is among the most popular US tourist destinations. [Singular]", "The teachers, along with the Principal, are entering the class. [Plural — the subject here is genuinely plural]"]}, {"n": 18, "t": "Noun vs. verb: similar-sounding word pairs", "b": "Some word pairs sound alike but differ in part of speech:\n\nAdvice (noun) / Advise (verb)\nPractice (noun) / Practise (verb)\nBelief (noun) / Believe (verb)\n\nI advise you to practise a lot, since practice makes a man perfect.\nI'm quite good at tennis, but I need to practise my serve.\nPractice makes a man perfect.\nHe gave me a piece of advice.\nIt is my belief that my students are very talented.\nI believe my students.\n\n*NOTE: To identify the noun in a sentence, try asking \"what,\" \"who,\" or \"whom\" of the verb — the answer is usually the noun.", "expl": "Some word pairs sound alike but differ in part of speech:\n\n*NOTE: To identify the noun in a sentence, try asking \"what,\" \"who,\" or \"whom\" of the verb — the answer is usually the noun.", "ex": ["Advice (noun) / Advise (verb)", "Practice (noun) / Practise (verb)", "Belief (noun) / Believe (verb)", "I advise you to practise a lot, since practice makes a man perfect.", "I'm quite good at tennis, but I need to practise my serve.", "Practice makes a man perfect.", "He gave me a piece of advice.", "It is my belief that my students are very talented.", "I believe my students."]}, {"n": 19, "t": "The three cases of pronouns", "b": "Pronouns exist in three cases: subjective, objective, and possessive (with a further possessive-adjective form).\n\nSubjective: {{I, you, he, she, it, we, they}}\nObjective: {{me, you, him, her, it, us, them}}\nPossessive adjective: {{my, your, his, her, its, our, their}}\nPossessive pronoun: {{mine, yours, his, hers, its, ours, theirs}}\n\nComparisons should match case to case — subjective compared with subjective, objective with objective.\n\nMy parents scold me more than he. [Incorrect]\nMy parents scold me more than him. [Correct]\nShe is taller than me. [Incorrect]\nShe is taller than I. [Correct]\n\nIn the first pair, the subjective case \"my parents\" is compared with the subjective case \"he\" — the full sentence would read \"My parents scold me more than he does.\" In the second pair, the objective case \"me\" is compared with the objective case \"him\" — meaning \"My parents scold me more than they scold him.\" Both are grammatically valid, but they mean different things.\n\nShe likes chocolates more than me. [Incorrect]\nShe likes chocolates more than I. [Correct]\n\nHere, \"chocolates\" (a thing) cannot be logically compared with a person via the objective case \"me.\" The second sentence correctly compares subjective case to subjective case (\"more than I do\").\n\nHe is as tall as I. [Correct]\nHe speaks more frequently than she. [Correct]\n\nIn these examples there is no object in the sentence, so the objective case cannot be used.", "expl": "Pronouns exist in three cases: subjective, objective, and possessive (with a further possessive-adjective form).\n\nSubjective: {{I, you, he, she, it, we, they}}\nObjective: {{me, you, him, her, it, us, them}}\nPossessive adjective: {{my, your, his, her, its, our, their}}\nPossessive pronoun: {{mine, yours, his, hers, its, ours, theirs}}\n\nComparisons should match case to case — subjective compared with subjective, objective with objective.\n\nIn the first pair, the subjective case \"my parents\" is compared with the subjective case \"he\" — the full sentence would read \"My parents scold me more than he does.\" In the second pair, the objective case \"me\" is compared with the objective case \"him\" — meaning \"My parents scold me more than they scold him.\" Both are grammatically valid, but they mean different things.\n\nHere, \"chocolates\" (a thing) cannot be logically compared with a person via the objective case \"me.\" The second sentence correctly compares subjective case to subjective case (\"more than I do\").\n\nIn these examples there is no object in the sentence, so the objective case cannot be used.", "ex": ["My parents scold me more than he. [Incorrect]", "My parents scold me more than him. [Correct]", "She is taller than me. [Incorrect]", "She is taller than I. [Correct]", "She likes chocolates more than me. [Incorrect]", "She likes chocolates more than I. [Correct]", "He is as tall as I. [Correct]", "He speaks more frequently than she. [Correct]"]}, {"n": 20, "t": "\"Who\" vs. \"whom\"", "b": "\"Who\" is a subjective pronoun (it acts as the subject of a verb). \"Whom\" is an objective pronoun (it acts as the object of a verb or preposition).\n\nTo decide which to use, try substituting \"he/him\" or \"she/her\" — if \"he/she\" fits, use \"who\"; if \"him/her\" fits, use \"whom.\"\n\nMrs. Dixit consulted an astrologer whom she met in Sonpur. [She met him in Sonpur.]\nJack is the man whom I went fishing with last spring. [I went fishing with him.]\nJyoti is the girl who got the job. [She got the job.]\nWhom can we turn to in a time of crisis? [Can we turn to her?]\nThe delegates differed as to who they thought might win. [Not \"whom\" — the whole clause is the object of the preposition; substitution still helps: \"They thought he might win.\"]\n\nShe is one of the professors who I think is a mathematician.\nHe is the man whom everyone admires.\nShe met the people who they say are helping all aspirants.\nThey hired the man whom we interviewed last week.", "expl": "\"Who\" is a subjective pronoun (it acts as the subject of a verb). \"Whom\" is an objective pronoun (it acts as the object of a verb or preposition).\n\nTo decide which to use, try substituting \"he/him\" or \"she/her\" — if \"he/she\" fits, use \"who\"; if \"him/her\" fits, use \"whom.\"", "ex": ["Mrs. Dixit consulted an astrologer whom she met in Sonpur. [She met him in Sonpur.]", "Jack is the man whom I went fishing with last spring. [I went fishing with him.]", "Jyoti is the girl who got the job. [She got the job.]", "Whom can we turn to in a time of crisis? [Can we turn to her?]", "The delegates differed as to who they thought might win. [Not \"whom\" — the whole clause is the object of the preposition; substitution still helps: \"They thought he might win.\"]", "She is one of the professors who I think is a mathematician.", "He is the man whom everyone admires.", "She met the people who they say are helping all aspirants.", "They hired the man whom we interviewed last week."]}, {"n": 21, "t": "Words that don't take the possessive case before them", "b": "Certain words — {{separation, excuse, mention, favour, pardon, leave, report, sight}}, etc. — do not take a possessive case directly before them.\n\nYour separation pains me a lot and I become sad. [Incorrect]\nSeparation from you pains me a lot and I become sad. [Correct]\n\nWe cannot use \"your\" (a possessive adjective) with \"separation,\" but the sentence can be rewritten without changing its meaning, as shown.\n\nI want your favour, will you please help me? [Incorrect]\nI want a favour from you, will you please help me? [Correct]\nHis mention in the story received great applause from the audience. [Incorrect]\nThe mention of him in the story received great applause from the audience. [Correct]\nAt his sight the robbers fled. [Incorrect]\nAt the sight of him, the robbers fled. [Correct]\n\n*NOTE: Possessive case words include: {{your, his, her, my, their, our, its}}, etc.", "expl": "Certain words — {{separation, excuse, mention, favour, pardon, leave, report, sight}}, etc. — do not take a possessive case directly before them.\n\nWe cannot use \"your\" (a possessive adjective) with \"separation,\" but the sentence can be rewritten without changing its meaning, as shown.\n\n*NOTE: Possessive case words include: {{your, his, her, my, their, our, its}}, etc.", "ex": ["Your separation pains me a lot and I become sad. [Incorrect]", "Separation from you pains me a lot and I become sad. [Correct]", "I want your favour, will you please help me? [Incorrect]", "I want a favour from you, will you please help me? [Correct]", "His mention in the story received great applause from the audience. [Incorrect]", "The mention of him in the story received great applause from the audience. [Correct]", "At his sight the robbers fled. [Incorrect]", "At the sight of him, the robbers fled. [Correct]"]}, {"n": 22, "t": "\"Each other\" vs. \"one another\"", "b": "\"Each other\" and \"one another\" both show that each person in a group does something to the others. \"Each other\" is generally used for two people, while \"one another\" is used for more than two.\n\nAll citizens should love each other. [Incorrect — \"all citizens\" is more than two]\nAll citizens should love one another. [Correct]\nPeter and Mary helped each other. [Peter helped Mary and Mary helped Peter]\nWe sent one another Christmas cards. [We sent them a card and they sent us one]\n\n*NOTE: Difference between \"other\" and \"another\": \"Other\" is an adjective meaning \"different\" or \"the second of two items,\" and can be used with singular or plural nouns; its plural form is \"others.\" \"Another\" (an + other written as one word) means \"additional\" or \"one more,\" and can be used before a plural noun when preceded by a number or phrases like \"a couple of,\" \"a few,\" etc.\n\nSome children learn quickly but other children need more time.\nHave you got any other questions?\nOnly half of the guests have arrived. Where are the others? [Plural]\nThis cake is delicious. Could I have another slice, please?\nThe investigation will take another two weeks/couple of weeks. [Plural noun after \"another\"]\nThis place isn't great. Is there another place we could go to? [Another = an alternative/different]", "expl": "\"Each other\" and \"one another\" both show that each person in a group does something to the others. \"Each other\" is generally used for two people, while \"one another\" is used for more than two.\n\n*NOTE: Difference between \"other\" and \"another\": \"Other\" is an adjective meaning \"different\" or \"the second of two items,\" and can be used with singular or plural nouns; its plural form is \"others.\" \"Another\" (an + other written as one word) means \"additional\" or \"one more,\" and can be used before a plural noun when preceded by a number or phrases like \"a couple of,\" \"a few,\" etc.", "ex": ["All citizens should love each other. [Incorrect — \"all citizens\" is more than two]", "All citizens should love one another. [Correct]", "Peter and Mary helped each other. [Peter helped Mary and Mary helped Peter]", "We sent one another Christmas cards. [We sent them a card and they sent us one]", "Some children learn quickly but other children need more time.", "Have you got any other questions?", "Only half of the guests have arrived. Where are the others? [Plural]", "This cake is delicious. Could I have another slice, please?", "The investigation will take another two weeks/couple of weeks. [Plural noun after \"another\"]", "This place isn't great. Is there another place we could go to? [Another = an alternative/different]"]}, {"n": 23, "t": "\"Seldom or never\" and \"little or nothing\"", "b": "\"Seldom\" is an adverb, and when a sentence begins with it, the Law of Inversion applies.\n\nSeldom or never he comes to my house. [Incorrect]\nSeldom or ever he comes to my house. [Incorrect]\nSeldom, if ever, does he come to my house. [Correct]\nSeldom, or never, does he come to my house. [Correct]\n\n*NOTE: We can use either \"seldom or never\" or \"seldom, if ever\" — but never \"seldom or ever.\"\n\n*NOTE: The phrase \"little or nothing\" means \"hardly anything.\" Likewise, we can use either \"little or nothing\" or \"little, if anything,\" but never \"little or anything.\"\n\nI can find little or nothing on this table. [Correct]\nI can find little, if anything, on this table. [Correct]\nI can find little if nothing on this table. [Incorrect]\nI can find little or anything on this table. [Incorrect]", "expl": "\"Seldom\" is an adverb, and when a sentence begins with it, the Law of Inversion applies.\n\n*NOTE: We can use either \"seldom or never\" or \"seldom, if ever\" — but never \"seldom or ever.\"\n\n*NOTE: The phrase \"little or nothing\" means \"hardly anything.\" Likewise, we can use either \"little or nothing\" or \"little, if anything,\" but never \"little or anything.\"", "ex": ["Seldom or never he comes to my house. [Incorrect]", "Seldom or ever he comes to my house. [Incorrect]", "Seldom, if ever, does he come to my house. [Correct]", "Seldom, or never, does he come to my house. [Correct]", "I can find little or nothing on this table. [Correct]", "I can find little, if anything, on this table. [Correct]", "I can find little if nothing on this table. [Incorrect]", "I can find little or anything on this table. [Incorrect]"]}, {"n": 24, "t": "The \"very superlative\" and \"much the superlative\"", "b": "Whenever \"very\" is used with a superlative degree, the article \"the\" is always used before \"very\" — i.e., \"the very superlative.\" \"Very\" also modifies a present participle used as an adjective, and adjectives/adverbs in the positive degree.\n\nIt is a very interesting novel.\n\nWhen \"much\" is used with the superlative, \"the\" is used before the superlative — i.e., \"much the superlative.\" \"Much\" is used with the comparative degree and past participle.\n\nHe is much interested.\nHe is much smarter.\n\nHe is the much best student of my class. [Incorrect]\nHe is very the best student of my class. [Incorrect]\nHe is the very best student of my class. [Correct — means \"really\"]\nHe is much the best student of my class. [Correct — means \"decidedly\"]\nHe is much smarter than all other students. [Correct]\nI was very exhausted after the match. [Correct]", "expl": "Whenever \"very\" is used with a superlative degree, the article \"the\" is always used before \"very\" — i.e., \"the very superlative.\" \"Very\" also modifies a present participle used as an adjective, and adjectives/adverbs in the positive degree.\n\nIt is a very interesting novel.\n\nWhen \"much\" is used with the superlative, \"the\" is used before the superlative — i.e., \"much the superlative.\" \"Much\" is used with the comparative degree and past participle.", "ex": ["He is much interested.", "He is much smarter.", "He is the much best student of my class. [Incorrect]", "He is very the best student of my class. [Incorrect]", "He is the very best student of my class. [Correct — means \"really\"]", "He is much the best student of my class. [Correct — means \"decidedly\"]", "He is much smarter than all other students. [Correct]", "I was very exhausted after the match. [Correct]"]}, {"n": 25, "t": "The use of \"enough\"", "b": "\"Enough\" can function as both an adverb and an adjective. As an adverb, it qualifies an adjective, verb, other adverb, or word group. As an adjective, it qualifies a noun or pronoun.\n\nWhen \"enough\" is an adjective, it's placed before the noun: \"enough noun.\" When it's an adverb, it's placed after the adjective: \"adjective enough.\"\n\nHe has enough sugar. [Adjective]\nShe is smart enough. [Adverb]\nOn neither of those trips was there enough sun to get any decent photographs. [Adjective]\nTest reports indicate that it develops enough power for the job and is flexible. [Adjective]\nYou are not big enough for basketball. [Adverb]\nA landing between the ground and first floors is ample enough to be used as a study. [Adverb]", "expl": "\"Enough\" can function as both an adverb and an adjective. As an adverb, it qualifies an adjective, verb, other adverb, or word group. As an adjective, it qualifies a noun or pronoun.\n\nWhen \"enough\" is an adjective, it's placed before the noun: \"enough noun.\" When it's an adverb, it's placed after the adjective: \"adjective enough.\"", "ex": ["He has enough sugar. [Adjective]", "She is smart enough. [Adverb]", "On neither of those trips was there enough sun to get any decent photographs. [Adjective]", "Test reports indicate that it develops enough power for the job and is flexible. [Adjective]", "You are not big enough for basketball. [Adverb]", "A landing between the ground and first floors is ample enough to be used as a study. [Adverb]"]}, {"n": 26, "t": "The adverb \"as\"", "b": "\"As\" can be used as an adverb with words like {{treat, define, regard, describe, respect, depict, portray, view, know}}, etc.\n\n\"As\" cannot be used as an adverb with words like {{elect, name, think, consider, call, make, choose, appoint}}, etc.\n\nBiology is defined as the science of living beings.\nHe is regarded as a God in India.\nShe described Gary as shy.\nHis latest film is described as a \"romantic comedy.\"\nShe is treated as a child.\nShe was elected Chair of the Board of Governors. [No \"as\"]\nHe has just been appointed director of the publishing division. [No \"as\"]\nHe thinks her a fool. [No \"as\"]\nThe teacher called him stupid. [No \"as\"]", "expl": "\"As\" can be used as an adverb with words like {{treat, define, regard, describe, respect, depict, portray, view, know}}, etc.\n\n\"As\" cannot be used as an adverb with words like {{elect, name, think, consider, call, make, choose, appoint}}, etc.", "ex": ["Biology is defined as the science of living beings.", "He is regarded as a God in India.", "She described Gary as shy.", "His latest film is described as a \"romantic comedy.\"", "She is treated as a child.", "She was elected Chair of the Board of Governors. [No \"as\"]", "He has just been appointed director of the publishing division. [No \"as\"]", "He thinks her a fool. [No \"as\"]", "The teacher called him stupid. [No \"as\"]"]}, {"n": 27, "t": "The conjunction \"although\"", "b": "\"Although,\" meaning \"in spite of something,\" is a subordinating conjunction — the clause it introduces is a subordinate clause that needs a main clause to be complete. The subordinate clause may take \"yet\" (optional) in the main clause, but \"although\" never takes \"but\" in the main clause.\n\nAlthough she is rich, she thinks twice before spending a penny. [Correct]\nAlthough she is rich, yet she thinks twice before spending a penny. [Correct]\nAlthough she is rich, but she thinks twice before spending a penny. [Incorrect]", "expl": "\"Although,\" meaning \"in spite of something,\" is a subordinating conjunction — the clause it introduces is a subordinate clause that needs a main clause to be complete. The subordinate clause may take \"yet\" (optional) in the main clause, but \"although\" never takes \"but\" in the main clause.", "ex": ["Although she is rich, she thinks twice before spending a penny. [Correct]", "Although she is rich, yet she thinks twice before spending a penny. [Correct]", "Although she is rich, but she thinks twice before spending a penny. [Incorrect]"]}, {"n": 28, "t": "Verbs with no \"-ing\" form", "b": "Certain verbs of possession, perception, and feeling do not exist in the \"-ing\" form:\n\nPossession: {{own, belong, have, include, possess, owe, contain, comprise, consist}}\nPerception: {{see, smell, taste, hear, feel, appear, seem, resemble, notice}}\nFeeling: {{love, know, think, hate, want, need, desire, wish, like}}\n\nI am owning a car. [Incorrect]\nI own a car. [Correct]\nI am loving it. [Incorrect]\nI love it. [Correct]\nThis sauce is tasting strange. [Incorrect]\nThis sauce tastes strange. [Correct]\nThis perfume is smelling like roses. [Incorrect]\nThis perfume smells like roses. [Correct]\nShe has always been hating jazz. [Incorrect]\nShe has always hated jazz. [Correct]\nAll the luggage is belonging to me. [Incorrect]\nAll the luggage belongs to me. [Correct]\n\n*NOTE: \"Loving\" is sometimes used as an adjective, which is a different case:\n\nHe is a very loving person. [Adjective]\nHe described his work in loving detail. [Adjective]\n\n*NOTE: When \"have\" denotes possession or ownership, we cannot use \"having.\" In other senses, \"having\" is fine (e.g. as a perfect participle).\n\nI am having a book. [Incorrect]\nI have a book. [Correct]\nI am having lunch now. [Correct — not possession]\nHaving done the work, he went to play. [Correct — perfect participle]", "expl": "Certain verbs of possession, perception, and feeling do not exist in the \"-ing\" form:\n\nPossession: {{own, belong, have, include, possess, owe, contain, comprise, consist}}\nPerception: {{see, smell, taste, hear, feel, appear, seem, resemble, notice}}\nFeeling: {{love, know, think, hate, want, need, desire, wish, like}}\n\n*NOTE: \"Loving\" is sometimes used as an adjective, which is a different case:\n\n*NOTE: When \"have\" denotes possession or ownership, we cannot use \"having.\" In other senses, \"having\" is fine (e.g. as a perfect participle).", "ex": ["I am owning a car. [Incorrect]", "I own a car. [Correct]", "I am loving it. [Incorrect]", "I love it. [Correct]", "This sauce is tasting strange. [Incorrect]", "This sauce tastes strange. [Correct]", "This perfume is smelling like roses. [Incorrect]", "This perfume smells like roses. [Correct]", "She has always been hating jazz. [Incorrect]", "She has always hated jazz. [Correct]", "All the luggage is belonging to me. [Incorrect]", "All the luggage belongs to me. [Correct]", "He is a very loving person. [Adjective]", "He described his work in loving detail. [Adjective]", "I am having a book. [Incorrect]", "I have a book. [Correct]", "I am having lunch now. [Correct — not possession]", "Having done the work, he went to play. [Correct — perfect participle]"]}, {"n": 29, "t": "Words always used with the Perfect Tense", "b": "Certain words are always used with a Perfect Tense: {{ever, never, yet, already, now, just now, until now, always, occasionally, often, lately, recently, so far, up to now, up to the present}}.\n\nThe concert had already begun by the time we arrived.\nI went to Paris last summer. Have you ever been there?\nI have not spoken to her yet.\nHe has gone just now.\nHe went there already. [Incorrect]\nHe had gone there already. [Correct]\nAman completed his work up to now. [Incorrect]\nAman has not completed his work up to now. [Correct]\nThe train already left. [Incorrect]\nThe train has already left. [Correct]", "expl": "Certain words are always used with a Perfect Tense: {{ever, never, yet, already, now, just now, until now, always, occasionally, often, lately, recently, so far, up to now, up to the present}}.", "ex": ["The concert had already begun by the time we arrived.", "I went to Paris last summer. Have you ever been there?", "I have not spoken to her yet.", "He has gone just now.", "He went there already. [Incorrect]", "He had gone there already. [Correct]", "Aman completed his work up to now. [Incorrect]", "Aman has not completed his work up to now. [Correct]", "The train already left. [Incorrect]", "The train has already left. [Correct]"]}, {"n": 30, "t": "Subject-verb agreement with collective nouns", "b": "When a collective noun refers to the whole group acting together as one unit, we use a singular verb.\n\nThe audience is watching the movie. [The whole audience watches together]\nThe army is marching towards the Himalayas.\nThe jury is taking a decision. [All members decide together]\n\nWhen a collective noun refers to the group's members acting individually/differently, we use a plural verb.\n\nThe audience are taking their seats.\nThe army are changing their dresses.\nThe jury are divided i
